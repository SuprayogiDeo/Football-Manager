<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>Football Manager Web</title>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0d3b2e" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23fff' stroke='%23222' stroke-width='4'/><polygon points='50,15 62,38 88,38 68,56 76,80 50,64 24,80 32,56 12,38 38,38' fill='%23222'/></svg>">
    <link rel="manifest" id="pwa-manifest" />
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --gd:#0d3b2e;--gm:#1a5c44;--gl:#2d8c63;--gg:#3dba82;
            --bd:#0a1f3c;--bm:#1a3a6b;--bl:#2d6abf;--bg2:#4a9eff;
            --gold:#f0c040;--red:#e85555;--orng:#e67e22;--purp:#9b59b6;
            --bg:#0a1812;--sf:#0f2418;--sf2:#172e20;--card:#1c3828;--brd:#2a5040;
            --txt:#d4eadc;--dim:#7aab8a;--mut:#4a7a5a;--wh:#f0f8f2;
            --shd:0 4px 20px rgba(0,0,0,.5);--r:10px;--rs:6px;
        }
        html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Segoe UI',sans-serif;font-size:14px;overflow-x:hidden;overscroll-behavior:none;}
        #app{display:flex;flex-direction:column;height:100dvh;max-width:540px;margin:0 auto;position:relative;background:var(--bg)}
        @media(min-width:541px){#app{border-left:1px solid var(--brd);border-right:1px solid var(--brd)}}
        #hdr{background:linear-gradient(135deg,var(--gd),var(--bd));border-bottom:2px solid var(--gl);padding:8px 14px 6px;position:sticky;top:0;z-index:100}
        #hdr h1{font-size:.9rem;font-weight:800;color:var(--gg);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
        #hdr-meta{display:flex;gap:6px;align-items:center;margin-top:3px;flex-wrap:wrap;}
        .badge{background:var(--sf2);border:1px solid var(--brd);border-radius:20px;padding:2px 8px;font-size:.68rem;color:var(--dim)}
        .badge.hi{border-color:var(--gl);color:var(--gg)}.badge.gld{border-color:var(--gold);color:var(--gold)}.badge.rep{border-color:var(--purp);color:var(--purp)}
        #bgt{margin-left:auto}
        #tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--brd);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
        #tabs::-webkit-scrollbar{display:none}
        .tb{flex:1;min-width:50px;padding:8px 2px;font-size:.6rem;font-weight:700;color:var(--mut);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:color 0.2s;}
        .tb.active{color:var(--gg);border-bottom-color:var(--gg)}
        .tb.has-notif{position:relative}
        .tb.has-notif::after{content:'';position:absolute;top:5px;right:6px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--sf);}
        
        #main{flex:1;overflow-y:auto;padding:10px;padding-bottom:30px; touch-action: pan-y;}
        .sec{font-size:.72rem;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--brd)}
        .card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:11px;margin-bottom:9px}
        .card.derby{border-color:var(--red);box-shadow:0 0 8px rgba(232,85,85,.3)}
        .card.sponsor{border-color:var(--gold)}
        
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border:none;border-radius:var(--rs);font-size:.78rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s}
        .btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;pointer-events:none}
        .btn-p{background:var(--gl);color:#fff}.btn-s{background:var(--bm);color:#fff}
        .btn-g{background:var(--gold);color:#1a1200}.btn-d{background:var(--red);color:#fff}
        .btn-pu{background:var(--purp);color:#fff}
        .btn-sm{padding:4px 9px;font-size:.68rem}.btn-blk{width:100%}
        
        .row{display:flex;gap:8px;align-items:center}.row.bt{justify-content:space-between}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
        .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
        
        .ovr{display:inline-block;min-width:30px;text-align:center;padding:2px 4px;border-radius:4px;font-size:.78rem;font-weight:800}
        .ovr-h{background:#1a5c1a;color:#6eff6e}.ovr-m{background:#4a3a00;color:var(--gold)}.ovr-l{background:#4a1515;color:#ff7777}
        .pill{background:var(--sf2);border-radius:20px;padding:2px 8px;font-size:.7rem;font-weight:600;border:1px solid var(--brd)}
        .input-text{background:var(--sf);color:var(--wh);border:1px solid var(--brd);padding:8px 12px;border-radius:var(--rs);width:100%;font-weight:bold;font-size:1rem}
        .select-text{background:var(--sf);color:var(--wh);border:1px solid var(--brd);padding:6px 8px;border-radius:var(--rs);font-size:.75rem;width:100%}
        
        .tbl{width:100%;border-collapse:collapse;font-size:.7rem}
        .tbl th{color:var(--mut);text-align:left;padding:4px;border-bottom:1px solid var(--brd)}
        .tbl td{padding:4px;border-bottom:1px solid var(--sf2)}
        .tbl tr.me td{color:var(--gg);font-weight:700}
        .tbl td.n,.tbl th.n{text-align:right}
        .team-link{color:var(--bg2);cursor:pointer;text-decoration:underline;font-weight:600}
        
        .mlog{list-style:none}
        .mlog li{padding:6px 9px;background:var(--sf2);border-radius:var(--rs);margin-bottom:4px;font-size:.76rem;border-left:3px solid var(--brd)}
        .mlog li.win{border-left-color:var(--gg)}.mlog li.draw{border-left-color:var(--gold)}.mlog li.loss{border-left-color:var(--red)}
        
        .selected-swap{border:2px dashed var(--gold)!important;background-color:rgba(240,192,64,0.2)!important;box-shadow:0 0 12px var(--gold)!important}
        .plc{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--sf2);border-radius:var(--rs);border:1px solid var(--brd);margin-bottom:5px;cursor:pointer;transition:all .15s}
        .pln{font-weight:700;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .info-btn{background:var(--brd);color:var(--wh);border:none;border-radius:50%;width:22px;height:22px;font-size:.65rem;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .injured-text{color:var(--red)!important;text-decoration:line-through}
        .loan-badge{background:var(--bg2);color:#fff;font-size:.5rem;padding:1px 3px;border-radius:3px;margin-left:3px}
        
        .chem-bar{height:6px;border-radius:3px;background:var(--sf);overflow:hidden;margin-top:5px;border:1px solid var(--brd)}
        .chem-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--gg));transition:width .3s}
        .prog-bar{height:8px;border-radius:4px;background:var(--sf);overflow:hidden;margin-top:4px;border:1px solid var(--brd)}
        .prog-fill{height:100%;border-radius:4px;transition:width .3s}
        
        .tactic-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
        .tactic-grid .btn-sm{font-size:.6rem;padding:4px 7px;white-space:nowrap}

        /* ====== PITCH ====== */
        .pitch-wrap{position:relative;width:100%;border-radius:8px;overflow:hidden;border:2px solid #3a9a50}
        .pitch-wrap.vertical{aspect-ratio:9/12;background:linear-gradient(180deg,#1a6b30 0%,#1e7a35 50%,#1a6b30 100%)}
        .pitch-wrap.horizontal{aspect-ratio:16/9;min-height:170px;background:linear-gradient(90deg,#1a6b30 0%,#1e7a35 50%,#1a6b30 100%)}
        .pitch-wrap.rain{background:linear-gradient(90deg,#1a4a28 0%,#1c5a30 50%,#1a4a28 100%)!important}
        .pitch-wrap.heavy_rain{background:linear-gradient(90deg,#152e1a 0%,#183520 50%,#152e1a 100%)!important}
        .pitch-wrap.hot{background:linear-gradient(90deg,#3a6b20 0%,#4a7a28 50%,#3a6b20 100%)!important}
        
        .pitch-lines{position:absolute;inset:0;pointer-events:none}
        .pitch-wrap.vertical .pl-hw{top:0;bottom:0;left:50%;width:1px;background:rgba(255,255,255,.22);position:absolute}
        .pitch-wrap.vertical .pl-cc{width:22%;aspect-ratio:1;border-radius:50%;border:1px solid rgba(255,255,255,.22);left:50%;top:50%;transform:translate(-50%,-50%);background:none;position:absolute}
        .pitch-wrap.vertical .pl-pb-top{left:20%;right:20%;top:0;height:16%;border:1px solid rgba(255,255,255,.22);border-top:none;background:none;position:absolute}
        .pitch-wrap.vertical .pl-pb-bot{left:20%;right:20%;bottom:0;height:16%;border:1px solid rgba(255,255,255,.22);border-bottom:none;background:none;position:absolute}
        .pitch-wrap.vertical .pl-gb-top{left:35%;right:35%;top:0;height:6%;border:1px solid rgba(255,255,255,.22);border-top:none;background:none;position:absolute}
        .pitch-wrap.vertical .pl-gb-bot{left:35%;right:35%;bottom:0;height:6%;border:1px solid rgba(255,255,255,.22);border-bottom:none;background:none;position:absolute}

        .pitch-wrap.horizontal .pl-hw{top:0;bottom:0;left:50%;width:1px;background:rgba(255,255,255,.22);position:absolute}
        .pitch-wrap.horizontal .pl-cc{width:18%;aspect-ratio:1;border-radius:50%;border:1px solid rgba(255,255,255,.22);left:50%;top:50%;transform:translate(-50%,-50%);background:none;position:absolute}
        .pitch-wrap.horizontal .pl-pb-top{top:15%;bottom:15%;left:0;width:16%;border:1px solid rgba(255,255,255,.22);border-left:none;background:none;position:absolute;height:auto}
        .pitch-wrap.horizontal .pl-pb-bot{top:15%;bottom:15%;right:0;width:16%;border:1px solid rgba(255,255,255,.22);border-right:none;background:none;position:absolute;height:auto}
        .pitch-wrap.horizontal .pl-gb-top{top:30%;bottom:30%;left:0;width:6%;border:1px solid rgba(255,255,255,.22);border-left:none;background:none;position:absolute;height:auto}
        .pitch-wrap.horizontal .pl-gb-bot{top:30%;bottom:30%;right:0;width:6%;border:1px solid rgba(255,255,255,.22);border-right:none;background:none;position:absolute;height:auto}

        .rain-overlay{position:absolute;inset:0;pointer-events:none;z-index:10;background:repeating-linear-gradient(170deg,transparent 0px,transparent 3px,rgba(120,180,255,.08) 3px,rgba(120,180,255,.08) 4px)}
        
        .pdot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;z-index:2;transition:left .4s ease,top .4s ease;cursor:pointer}
        .pdot-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:800;border:2px solid rgba(255,255,255,.5);background:var(--bl);color:#fff;transition:all .15s}
        .pdot-circle.home-dot{background:#1a5c96;border-color:#60b0ff}
        .pdot-circle.away-dot{background:#8b1a1a;border-color:#ff8060}
        .pdot-name{font-size:.45rem;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);white-space:nowrap;max-width:40px;overflow:hidden;text-overflow:ellipsis}
        .pdot-ovr{font-size:.5rem;color:var(--gold);font-weight:bold;text-shadow:0 1px 2px rgba(0,0,0,.8);background:#0008;padding:1px 3px;border-radius:3px}
        
        .match-ball{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;z-index:5;transition:left .35s ease,top .35s ease;box-shadow:0 2px 5px rgba(0,0,0,.6);border:1px solid #999;transform:translate(-50%,-50%)}
        .goal-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.8rem;font-weight:900;color:#ffd700;text-shadow:0 0 20px #000;z-index:20;animation:goalPop 1s ease-out forwards;pointer-events:none}
        @keyframes goalPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(2)}}

        /* ====== LIVE BOARD ====== */
        #live-board{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:600;display:none;flex-direction:column;overflow-y:auto}
        #live-board.show{display:flex}
        .lb-header{padding:8px 10px;text-align:center;font-weight:bold;color:var(--wh);font-size:.9rem}
        #live-board.theme-league .lb-header{background:linear-gradient(135deg,var(--gd),var(--bd))}
        #live-board.theme-cup .lb-header{background:linear-gradient(135deg,var(--orng),#c0392b)}
        #live-board.theme-acl .lb-header{background:linear-gradient(135deg,#2980b9,#2c3e50)}
        .lb-score{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 10px;flex-shrink:0}
        .lb-team{flex:1;text-align:center}
        .lb-tgoals{font-size:2.2rem;font-weight:900;color:var(--wh)}
        .event-log{padding:5px 10px;font-size:.66rem;max-height:72px;overflow-y:auto;background:var(--sf);border-radius:6px;margin:3px 10px}
        .event-item{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--sf2)}
        .yellow-card{color:#f0c040;font-weight:bold}
        .red-card{color:#e85555;font-weight:bold}
        .injury-event{color:#ff9090}

        .match-queue-bar{display:flex;gap:5px;justify-content:center;padding:5px 10px;background:var(--sf2);flex-shrink:0;flex-wrap:wrap}
        .mq-item{padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:700;border:1px solid var(--brd);color:var(--mut)}
        .mq-item.active{border-color:var(--gg);color:var(--gg);background:rgba(61,186,130,.12)}
        .mq-item.done{border-color:var(--dim);color:var(--dim);text-decoration:line-through}
        
        .bench-strip{display:flex;flex-wrap:wrap;gap:3px;padding:4px 8px;background:var(--sf);border-top:1px solid var(--brd)}
        .bench-pill{padding:2px 6px;border-radius:12px;font-size:.58rem;font-weight:700;border:1px solid var(--brd);background:var(--sf2);cursor:pointer;display:flex;align-items:center;gap:3px;color:var(--txt)}
        .bench-pill.selected-swap{border-color:var(--gold);background:rgba(240,192,64,.15);color:var(--gold)}

        /* ====== MODALS & OTHERS ====== */
        #mov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:800;display:none;align-items:center;justify-content:center;padding:14px}
        #mov.show{display:flex}
        #mbox{background:var(--card);border:1px solid var(--gl);border-radius:var(--r);padding:18px;width:100%;max-width:480px;max-height:88dvh;overflow-y:auto}
        #toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--gl);border-radius:30px;padding:9px 18px;font-size:.78rem;font-weight:600;color:var(--wh);z-index:9999;transition:all .3s ease;opacity:0;visibility:hidden;box-shadow:var(--shd)}
        #toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible}
        
        .weather-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:.65rem;font-weight:700;background:var(--sf2);border:1px solid var(--brd)}
        .rating-bar{display:flex;align-items:center;gap:4px;margin:2px 0}
        .rating-num{font-size:.85rem;font-weight:900;min-width:24px;text-align:center}
        .rating-10{color:var(--gg)}.rating-7{color:var(--gold)}.rating-5{color:var(--orng)}.rating-low{color:var(--red)}
        
        .slot-card{background:var(--sf2);border:1px solid var(--brd);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .15s}
        .slot-card:active{transform:scale(.98)}.slot-card.active-slot{border-color:var(--gg)}.slot-card.empty-slot{border-style:dashed;opacity:.6}
        
        .obj-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:.65rem;font-weight:700}
        .obj-badge.met{background:#1a5c1a;color:#6eff6e}.obj-badge.miss{background:#4a1515;color:#ff7777}.obj-badge.pend{background:var(--sf2);color:var(--dim)}
    </style>
</head>
<body>
<div id="app">
    <div id="hdr">
        <h1>⚽ Football Manager Web</h1>
        <div id="hdr-meta">
            <span class="badge hi" id="wk-badge">📍 Pre-Season</span>
            <span class="badge" id="tm-badge">–</span>
            <span class="badge rep" id="rep-badge">⭐ 40</span>
            <span class="badge gld" id="bgt">€ 0 M</span>
        </div>
    </div>
    <nav id="tabs">
        <button class="tb active" data-tab="dash">🏠</button>
        <button class="tb" data-tab="squad">👥</button>
        <button class="tb" data-tab="league">📊</button>
        <button class="tb" data-tab="sched">🗓️</button>
        <button class="tb" data-tab="cup">🏆</button>
        <button class="tb" data-tab="acl">🌏</button>
        <button class="tb" data-tab="transfer">💰</button>
        <button class="tb" data-tab="club">🏟️</button>
        <button class="tb" data-tab="stats">📈</button>
        <button class="tb" data-tab="manager">👔</button>
    </nav>
    <main id="main"></main>
    <div id="live-board"></div>
    <div id="mov">
        <div id="mbox">
            <h2 id="mtitle" style="color:var(--gold);margin-bottom:10px"></h2>
            <div id="mbody"></div>
            <div id="mfoot" style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap"></div>
        </div>
    </div>
    <div id="toast"></div>
</div>

<script>
// ─── PWA MANIFEST ───────────────────────────────────────────────
(function(){
  const icon = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23fff' stroke='%23222' stroke-width='4'/><polygon points='50,15 62,38 88,38 68,56 76,80 50,64 24,80 32,56 12,38 38,38' fill='%23222'/></svg>`;
  const manifest = {
      name:"Football Manager Web", short_name:"FM Web", start_url:".", display:"standalone",
      background_color:"#0a1812", theme_color:"#0d3b2e",
      icons:[{src:`data:image/svg+xml,${icon}`, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"}]
  };
  const blob = new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
})();

// ─── SWIPE NAVIGATION ──────────────────────────────────────────
let touchStartX = 0;
let touchEndX = 0;
const TABS_ORDER = ['dash', 'squad', 'league', 'sched', 'cup', 'acl', 'transfer', 'club', 'stats', 'manager'];

document.getElementById('main').addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
}, false);

document.getElementById('main').addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    handleSwipe();
}, false);

function handleSwipe() {
    const swipeThreshold = 50; 
    if (touchEndX < touchStartX - swipeThreshold) {
        // Swipe Left (Go to next tab)
        const curIdx = TABS_ORDER.indexOf(activeTab);
        if(curIdx < TABS_ORDER.length - 1) switchTab(TABS_ORDER[curIdx + 1]);
    }
    if (touchEndX > touchStartX + swipeThreshold) {
        // Swipe Right (Go to prev tab)
        const curIdx = TABS_ORDER.indexOf(activeTab);
        if(curIdx > 0) switchTab(TABS_ORDER[curIdx - 1]);
    }
}

// ─── AUDIO ──────────────────────────────────────────────────────
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playCrowdCheer(){try{const c=getAudio(),d=2.5,b=c.createBuffer(1,c.sampleRate*d,c.sampleRate),dt=b.getChannelData(0);for(let i=0;i<dt.length;i++)dt[i]=(Math.random()*2-1)*Math.min(1,i/(c.sampleRate*.3));for(let i=Math.floor(dt.length*.6);i<dt.length;i++)dt[i]*=1-(i-dt.length*.6)/(dt.length*.4);const s=c.createBufferSource();s.buffer=b;const f=c.createBiquadFilter();f.type='bandpass';f.frequency.value=800;f.Q.value=.5;const g=c.createGain();g.gain.value=.5;s.connect(f);f.connect(g);g.connect(c.destination);s.start();const o=c.createOscillator(),og=c.createGain();o.frequency.setValueAtTime(120,c.currentTime);o.frequency.linearRampToValueAtTime(220,c.currentTime+.4);og.gain.setValueAtTime(.15,c.currentTime);og.gain.linearRampToValueAtTime(0,c.currentTime+d);o.connect(og);og.connect(c.destination);o.start();o.stop(c.currentTime+d);}catch(e){}}
function playWhistle(){try{const c=getAudio(),o=c.createOscillator(),g=c.createGain();o.frequency.setValueAtTime(2800,c.currentTime);o.frequency.linearRampToValueAtTime(2600,c.currentTime+.15);g.gain.setValueAtTime(.25,c.currentTime);g.gain.linearRampToValueAtTime(0,c.currentTime+.2);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.25);}catch(e){}}

// ─── CONSTANTS ──────────────────────────────────────────────────

function getEffOvr(p,slotPos,trainBonus={}){
  if(p.injury>0)return 0;
  let eff=p.ovr;
  if(slotPos&&p.pos!==slotPos){
    if(POS_MAP[p.pos].s.includes(slotPos))eff=Math.floor(eff*.9);
    else eff=Math.floor(eff*.7);
  }
  if(p.moral<40)eff-=Math.floor((40-p.moral)/5);
  else if(p.moral>85)eff+=1;
  if(trainBonus.attack&&['ST','LW','RW','CAM'].includes(p.pos))eff+=trainBonus.attack;
  if(trainBonus.defense&&['CB','LB','RB','CDM'].includes(p.pos))eff+=trainBonus.defense;
  return Math.max(1,eff);
}

function calcTeamChemistry(teamIdx,tactic){
  const squad=G.squads[teamIdx];if(!squad)return 50;
  const xi=squad.filter(p=>p.inXI);if(xi.length<11)return 40;
  const avgChem=xi.reduce((s,p)=>s+p.chem,0)/xi.length;
  let posBonus=0;
  const slots=FORMATIONS[tactic||G.tactics[teamIdx]||'4-3-3'];
  const sc={};slots.forEach(s=>sc[s]=(sc[s]||0)+1);
  Object.entries(sc).forEach(([pos,need])=>{const have=xi.filter(p=>p.pos===pos).length;if(have===need)posBonus+=4;else posBonus-=Math.abs(have-need)*2;});
  let chemBonus=G.training&&G.training.lastEffect==='chem'?(G.training.chemBonus||0):0;
  return clamp(avgChem+posBonus+chemBonus,0,100);
}

function teamStrength(teamIdx,tactic){
  if(typeof teamIdx==='string')return G.acl.teams[teamIdx].ovr+rnd(-5,5);
  if(teamIdx>=16)return 65+rnd(-5,5);
  const squad=G.squads[teamIdx];const xi=squad.filter(p=>p.inXI);
  if(xi.length<11)return 60;
  const tb=teamIdx===G.playerTeamIdx?(G.training?.bonus||{}):{};
  const effOvrSum=xi.reduce((s,p)=>s+getEffOvr(p,p.slotPos,tb),0);
  let str=effOvrSum/11;
  str+=xi.reduce((s,p)=>s+p.moral,0)/11*.05;
  const avgEn=xi.reduce((s,p)=>s+p.energy,0)/11;
  if(avgEn>80)str+=2;else if(avgEn<40)str-=4;
  str+=calcTeamChemistry(teamIdx,tactic)*.08;
  if(G.training?.lastEffect==='energy'&&teamIdx===G.playerTeamIdx)str+=2;
  return str;
}

function simulateMatch(hIdx,aIdx){
  const ht=typeof hIdx==='number'&&hIdx<16?(G.tactics[hIdx]||'4-3-3'):'4-3-3';
  const at=typeof aIdx==='number'&&aIdx<16?(G.tactics[aIdx]||'4-3-3'):'4-3-3';
  const wx=getWeather();const we=WEATHER_EFFECTS[wx];
  const hStr=teamStrength(hIdx,ht)+we.str+(Math.random()<.5?we.str*.5:0)+2+rnd(-4,4);
  const aStr=teamStrength(aIdx,at)+we.str;
  const diff=hStr-aStr;
  let h,a;
  if(diff>8){h=rnd(2,4);a=rnd(0,1);}else if(diff>4){h=rnd(1,3);a=rnd(0,1);}
  else if(diff>1){h=rnd(0,2);a=rnd(0,2);}else if(diff>-4){h=rnd(0,2);a=rnd(0,2);}
  else if(diff>-8){h=rnd(0,1);a=rnd(1,3);}else{h=rnd(0,1);a=rnd(2,4);}
  return{home:h,away:a,events:generateEvents(hIdx,aIdx,h,a),weather:wx};
}

function generateEvents(hIdx,aIdx,hGoals,aGoals){
  const evs=[];
  const addGoals=(team,count,idx)=>{for(let i=0;i<count;i++){let scorer='?';if(typeof idx==='number'&&idx<16){const fwds=G.squads[idx].filter(p=>p.inXI&&['ST','LW','RW','CAM','LM','RM'].includes(p.slotPos));if(fwds.length){const s=pick(fwds);scorer=s.name;if(s.teamIndex===G.playerTeamIdx){s.goals=s.goals||0;s.goals++;}}}else scorer='Star Player';evs.push({type:'goal',min:rnd(5,89),team,player:scorer});}};
  addGoals('home',hGoals,hIdx);addGoals('away',aGoals,aIdx);
  for(let i=0;i<rnd(1,4);i++){const team=Math.random()<.5?'home':'away';const idx=team==='home'?hIdx:aIdx;let pn='?';if(typeof idx==='number'&&idx<16&&G.squads[idx]){const pool=G.squads[idx].filter(p=>p.inXI);if(pool.length)pn=pick(pool).name;}evs.push({type:'card',min:rnd(5,89),team,player:pn,card:Math.random()<.1?'red':'yellow'});}
  if(Math.random()<.15){const team=Math.random()<.5?'home':'away';const idx=team==='home'?hIdx:aIdx;let pn='?',pid=null;if(typeof idx==='number'&&idx<16&&G.squads[idx]){const pool=G.squads[idx].filter(p=>p.inXI);if(pool.length){const p=pick(pool);pn=p.name;pid=p.id;}}if(pid)evs.push({type:'injury',min:rnd(5,89),team,player:pn,playerId:pid,teamIdx:idx});}
  return evs.sort((a,b)=>a.min-b.min);
}

function calcPlayerRating(p,myGoals,oppGoals,myTeamWon,isHome){
  if(!p.inXI)return null;
  let r=6.0;
  const cat=p.mainCat;
  if(myTeamWon)r+=rnd(5,10)*.1;else if(!myTeamWon&&myGoals<oppGoals)r-=rnd(3,8)*.1;
  if(cat==='FWD'&&p.goals>0)r+=p.goals*.8;
  if(cat==='GK'&&myGoals<2&&myTeamWon)r+=.7;
  if(cat==='GK'&&oppGoals===0)r+=1.2;
  if(cat==='DEF'&&oppGoals===0)r+=.6;
  r+=Math.random()*.8-.4;
  if(p.moral>85)r+=.2;else if(p.moral<50)r-=.3;
  return parseFloat(clamp(r,4,10).toFixed(1));
}

function generateMatchRatings(myMatch,isHome){
  const sq=G.squads[G.playerTeamIdx];
  const myGoals=isHome?myMatch.homeScore:myMatch.awayScore;
  const oppGoals=isHome?myMatch.awayScore:myMatch.homeScore;
  const won=myGoals>oppGoals;
  const ratings={};
  sq.filter(p=>p.inXI).forEach(p=>{ratings[p.id]=calcPlayerRating(p,myGoals,oppGoals,won,isHome);});
  return ratings;
}

function setDefaultXI(squad,tactic){
  squad.forEach(p=>{p.inXI=false;p.slotPos=null;});
  FORMATIONS[tactic].forEach(slot=>{
    let pool=squad.filter(p=>!p.inXI&&p.pos===slot&&p.injury===0).sort((a,b)=>b.ovr-a.ovr);
    if(!pool.length)pool=squad.filter(p=>!p.inXI&&POS_MAP[p.pos].s.includes(slot)&&p.injury===0).sort((a,b)=>b.ovr-a.ovr);
    if(!pool.length)pool=squad.filter(p=>!p.inXI&&p.mainCat===POS_MAP[slot].c&&p.injury===0).sort((a,b)=>b.ovr-a.ovr);
    if(!pool.length)pool=squad.filter(p=>!p.inXI&&p.injury===0).sort((a,b)=>b.ovr-a.ovr);
    if(!pool.length)pool=squad.filter(p=>!p.inXI).sort((a,b)=>b.ovr-a.ovr);
    if(pool.length){pool[0].inXI=true;pool[0].slotPos=slot;}
  });
}

  for(let g=0;g<4;g++){const grp=['A','B','C','D'][g];acl.groups[grp]=[fT(west.pop(),80),fT(west.pop(),78),fT(west.pop(),75),fT(west.pop(),72)];}

function simulateACLGroups(){
  const md=LCA_GROUP_WEEKS.indexOf(G.week);if(md<0||md>=6)return[];
  const res=[];const pairs=G.acl.schedule[md];
  Object.values(G.acl.groups).forEach(gt=>{
    pairs.forEach(pair=>{
      const h=gt[pair[0]],a=gt[pair[1]];const sc=simulateMatch(h,a);
      updateACLTable(h,sc.home,sc.away);updateACLTable(a,sc.away,sc.home);
      const r={homeIdx:h,awayIdx:a,homeScore:sc.home,awayScore:sc.away,events:sc.events};
      if(h===G.playerTeamIdx||a===G.playerTeamIdx)res.push(r);
    });
  });
  if(md===5){
    const g2=(g)=>G.acl.groups[g].map(id=>G.acl.standings[id]).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)).slice(0,2).map(x=>x.id);
    const wA=g2('A'),wB=g2('B'),wC=g2('C'),wD=g2('D'),wE=g2('E'),wF=g2('F'),wG=g2('G'),wH=g2('H');
    G.acl.knockout['Round of 16']=[[wA[0],wB[1]],[wB[0],wA[1]],[wC[0],wD[1]],[wD[0],wC[1]],[wE[0],wF[1]],[wF[0],wE[1]],[wG[0],wH[1]],[wH[0],wG[1]]];
    const myGroup=Object.values(G.acl.groups).find(g=>g.includes(G.playerTeamIdx));
    if(myGroup){const st=myGroup.map(id=>G.acl.standings[id]).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));if(st.findIndex(s=>s.id===G.playerTeamIdx)<2){G.aclQualified=true;}}
  }
  return res;
}

function buildSchedule(){
  const tms=[...Array(16).keys()];const rds=[];
  for(let r=0;r<15;r++){const pairs=[[tms[0],tms[1]]];for(let i=1;i<8;i++)pairs.push([tms[i+1],tms[16-i]]);rds.push(pairs);tms.splice(1,0,tms.pop());}
  return[...rds,...rds.map(r=>r.map(([a,b])=>[b,a]))];
}

function assignBoardObjective(){
  const row=G.leagueTable.find(x=>x.teamIdx===G.playerTeamIdx);
  const pos=G.leagueTable.indexOf(row)+1;
  let pool;
  if(pos<=4)pool=[BOARD_OBJECTIVES_POOL[2],BOARD_OBJECTIVES_POOL[3]];
  else if(pos<=8)pool=[BOARD_OBJECTIVES_POOL[1],BOARD_OBJECTIVES_POOL[4]];
  else pool=[BOARD_OBJECTIVES_POOL[0],BOARD_OBJECTIVES_POOL[4]];
  G.boardObjective=pick(pool);
  G.objectiveMet=false;
}

function generateSponsorOffer(){
  if(G.sponsors.length>=2)return;
  if(Math.random()>.35)return;
  const type=pick(SPONSOR_TYPES);
  const weekly=Math.random()>.5;
  const value=weekly?parseFloat((Math.random()*(.5-.15)+.15).toFixed(2)):rnd(3,10);
  const duration=rnd(8,16);
  const cond=Math.random()>.6?{type:'position',value:rnd(3,8)}:null;
  G.inbox.unshift({id:Math.random().toString(36).slice(2,8),type:'sponsor_offer',isRead:false,title:`💼 Sponsor Offer: ${type}`,body:`A company wants to sponsor your club for ${duration} weeks.`,sponsorData:{type,weekly,value,duration,weeksLeft:duration,cond}});
}

function applyPostMatchEvents(events,baseDate){
  events.forEach(e=>{
    if(e.type==='injury'&&typeof e.teamIdx==='number'&&e.teamIdx<16){
      const p=G.squads[e.teamIdx].find(x=>x.id===e.playerId);
      if(p&&p.injury===0){p.injury=rnd(1,4);}
    }
  });
}

function processInjuriesAndAutoSub(){
  G.squads.forEach(sq=>{
    sq.forEach(p=>{if(p.injury>0)p.injury--;});
    sq.filter(p=>p.inXI&&p.injury>0).forEach(p=>{
      const bench=sq.filter(b=>!b.inXI&&b.injury===0&&POS_MAP[b.pos].c===p.mainCat).sort((a,b)=>b.ovr-a.ovr);
      const sub=bench.length?bench[0]:sq.filter(b=>!b.inXI&&b.injury===0).sort((a,b)=>b.ovr-a.ovr)[0];
      if(sub){sub.inXI=true;sub.slotPos=p.slotPos;p.inXI=false;p.slotPos=null;}
    });
  });
}

// ─── TRAINING ────────────────────────────────────────────────────
function doTraining(effectId){
  const opt=TRAINING_OPTIONS.find(o=>o.id===effectId);if(!opt)return;
  G.training={lastEffect:effectId,bonus:{},chemBonus:0,energyBonus:0};
  const sq=G.squads[G.playerTeamIdx];
  if(effectId==='fitness'){sq.filter(p=>p.inXI).forEach(p=>p.energy=clamp(p.energy+15,0,100));G.training.bonus.energy=1;}
  if(effectId==='tactics'){G.training.chemBonus=8;}
  if(effectId==='attack'){G.training.bonus.attack=3;}
  if(effectId==='defense'){G.training.bonus.defense=3;}
  if(effectId==='rest'){sq.forEach(p=>{p.energy=clamp(p.energy+25,0,100);p.moral=clamp(p.moral+8,0,100);});}
  saveState();closeModal();showToast(`✅ ${opt.label} completed!`);renderAll();
}

function acceptSponsor(msgId){

function processSponsors(){
  G.sponsors=G.sponsors.filter(s=>s.active&&s.weeksLeft>0);

    s.weeksLeft--;
    if(s.weekly){G.budget=parseFloat((G.budget+s.value).toFixed(2));G.log.unshift({cls:'info',text:`💼 Sponsor income: +${fmt(s.value)}`});}

// ─── STADIUM ──────────────────────────────────────────────────────
function upgradeStadium(){
  const next=G.stadium.tier+1;if(next>=STADIUM_TIERS.length){showToast('Max tier reached!');return;}
  const t=STADIUM_TIERS[next];
  if(G.budget<t.cost){showToast(`❌ Need ${fmt(t.cost)}!`);return;}

  G.stadium.tier=next;G.stadium.income=t.income;
  saveState();showToast(`🏟️ Stadium upgraded to ${t.name}!`);renderAll();
}
function applyMatchdayIncome(hIdx){
  if(hIdx===G.playerTeamIdx){
    const inc=G.stadium.income;
    G.budget=parseFloat((G.budget+inc).toFixed(2));
    G.log.unshift({cls:'info',text:`🏟️ Matchday income: +${fmt(inc)}`});

// ─── MAIN WEEK ADVANCE ───────────────────────────────────────────
function playLeagueWeek(){
  if(!G.acl)G.acl=buildACL();
  if(!G.boardObjective)assignBoardObjective();
  rollWeather();
  processSponsors();
  generateSponsorOffer();
  
  if(G.phase==='preseason'){
    G.preseasonWeeksLeft--;G.currentDate=addDays(G.currentDate,7);
    if(G.preseasonWeeksLeft<=0){G.phase='league';G.log.unshift({cls:'info',text:'🏁 League started!'});}
    else G.log.unshift({cls:'info',text:`⏳ Pre-Season: ${G.preseasonWeeksLeft} weeks left`});
    processInjuriesAndAutoSub();saveState();renderAll();showToast('Advanced 1 week!');return;
  }
  
  if(G.week>=SEASON_WEEKS){showEndSeason();return;}
  G.week++;
  const baseDate=addDays(G.startDate,14+(G.week-1)*7);
  weekPendingMatches=[];weekPendingIndex=0;
  
  const myLeagueMatch=_simulateLeagueWeek(G.schedule[G.week-1],baseDate);
  if(myLeagueMatch)weekPendingMatches.push({compType:'league',label:'⚽ League',dateStr:baseDate,myMatch:myLeagueMatch});
  
  const cupRound=Object.keys(CUP_ROUND_WEEKS).find(k=>CUP_ROUND_WEEKS[k]===G.week);
  if(cupRound&&!G.cupRoundsPlayed[cupRound])weekPendingMatches.push({compType:'cup',label:`🏆 Cup: ${cupRound}`,dateStr:addDays(baseDate,4),_cupRound:cupRound});
  
  if(LCA_GROUP_WEEKS.includes(G.week))weekPendingMatches.push({compType:'acl',label:'🌏 ACL Group',dateStr:addDays(baseDate,2),_aclGroup:true});
  
  const lcaKnock=Object.keys(LCA_KNOCKOUT_WEEKS).find(k=>LCA_KNOCKOUT_WEEKS[k]===G.week);
  if(lcaKnock)weekPendingMatches.push({compType:'acl',label:`🌏 ACL: ${lcaKnock}`,dateStr:addDays(baseDate,5),_aclKnock:lcaKnock});
  
  G.currentDate=addDays(baseDate,6);
  processInjuriesAndAutoSub();
  saveState();
  if(!weekPendingMatches.length){renderAll();showToast("No matches this week.");return;}
  playNextPendingMatch();
}

function _simulateLeagueWeek(leagueMatches,baseDate){
  let myMatch=null;
  leagueMatches.forEach(([h,a])=>{
    const isDerby=isRivalMatch(h,a);
    const sc=simulateMatch(h,a);
    updateTable(h,sc.home,sc.away);updateTable(a,sc.away,sc.home);
    const r={week:G.week,homeIdx:h,awayIdx:a,homeScore:sc.home,awayScore:sc.away,events:sc.events,weather:sc.weather,isDerby};
    G.leagueResults.push(r);
    applyPostMatchEvents(sc.events,baseDate);
    applyMatchdayIncome(h);
    [G.squads[h],G.squads[a]].forEach((sq,si)=>{
      const myTeam=si===0?sc.home>sc.away:sc.away>sc.home;
      sq.forEach(p=>{
        p.energy=clamp(p.energy-rnd(10,15)-WEATHER_EFFECTS[sc.weather].energy,0,100);
        if(p.inXI){
          if(myTeam)p.moral=clamp(p.moral+rnd(3,7),0,100);
          else p.moral=clamp(p.moral-rnd(2,5),0,100);
          p.appearances++;p.chem=clamp(p.chem+rnd(0,2),0,100);
          if((si===0?h:a)===G.playerTeamIdx){
            G.seasonStats.appearances[p.id]=(G.seasonStats.appearances[p.id]||0)+1;
          }
        } else p.moral=clamp(p.moral-rnd(1,4),0,100);
      });
    });
    if(h===G.playerTeamIdx||a===G.playerTeamIdx){
      const isH=h===G.playerTeamIdx,my=isH?sc.home:sc.away,op=isH?sc.away:sc.home;
      const res=my>op?'win':my<op?'loss':'draw';
      G.log.unshift({cls:res,text:`W${G.week}: ${TEAMS[G.playerTeamIdx]} ${my}–${op} ${TEAMS[isH?a:h]}${isDerby?' 🔥 Derby!':''}`});
      if(isDerby){const bonus=my>op?12:-8;G.squads[G.playerTeamIdx].forEach(p=>p.moral=clamp(p.moral+bonus,0,100));}
      if(my>op)G.reputation=clamp(G.reputation+1,0,100);
      else if(my<op)G.reputation=clamp(G.reputation-.5,0,100);
      myMatch=r;
    }
  });
  G.leagueTable.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));
  return myMatch;
}

function playNextPendingMatch(){
  if(weekPendingIndex>=weekPendingMatches.length){renderAll();showToast("All matches this week done!");return;}
  const item=weekPendingMatches[weekPendingIndex];
  if(item._cupRound){
    const cr=item._cupRound,next={"Round of 16":"Quarter Final","Quarter Final":"Semi Final","Semi Final":"Final"}[cr];
    const res=playKnockout(G.cupBracket,G.cupResults,G.cupRoundsPlayed,cr,next);
    if(!next&&res.length)G.cupWinner=res[0].winner;
    res.forEach(m=>applyPostMatchEvents(m.events,item.dateStr));
    item.myMatch=res.find(m=>m.homeIdx===G.playerTeamIdx||m.awayIdx===G.playerTeamIdx)||null;
    delete item._cupRound;saveState();
  }
  if(item._aclGroup){
    const ar=simulateACLGroups();ar.forEach(m=>applyPostMatchEvents(m.events,item.dateStr));
    item.myMatch=ar.length?ar[0]:null;delete item._aclGroup;saveState();
  }
  if(item._aclKnock){
    const lk=item._aclKnock,nr={"Round of 16":"Quarter Final","Quarter Final":"Semi Final","Semi Final":"Final"}[lk];
    const ar=playKnockout(G.acl.knockout,G.acl.knockout,G.acl.played,lk,nr);
    if(!nr&&ar.length)G.acl.winner=ar[0].winner;
    ar.forEach(m=>applyPostMatchEvents(m.events,item.dateStr));
    item.myMatch=ar.find(r=>r.homeIdx===G.playerTeamIdx||r.awayIdx===G.playerTeamIdx)||null;
    delete item._aclKnock;saveState();
  }
  if(!item.myMatch){weekPendingIndex++;renderAll();showToast(`${item.label} — No match for your team.`);return;}
  liveMatchState.min=0;liveMatchState.myMatch=item.myMatch;
  liveMatchState.compType=item.compType;liveMatchState.label=item.label;
  liveMatchState.dateStr=item.dateStr;liveMatchState.subsLeft=5;liveMatchState.isPaused=false;
  const lb=document.getElementById('live-board');lb.className=`show theme-${item.compType}`;
  clearInterval(liveInterval);renderLiveBoardFull();
  liveInterval=setInterval(()=>{
    if(liveMatchState.isPaused)return;
    liveMatchState.min=Math.min(liveMatchState.min+rnd(3,8),90);
    updateLiveBoardDynamic();
    if(liveMatchState.min>=90){clearInterval(liveInterval);playWhistle();setTimeout(()=>renderLiveBoardFull(),400);}
  },600);
}

let liveMatchState={min:0,myMatch:null,isPaused:false,subsLeft:5,compType:'league',label:'League',dateStr:''};

function continueToNext(){
  const my=liveMatchState.myMatch;
  if(my){
    const isHome=my.homeIdx===G.playerTeamIdx;
    const myGoals=isHome?my.homeScore:my.awayScore;
    const oppGoals=isHome?my.awayScore:my.homeScore;
    const ratings=generateMatchRatings(my,isHome);
    G.matchRatings={ratings,motm:getMotm(ratings),myGoals,oppGoals,isHome};
    Object.entries(ratings).forEach(([id,r])=>{if(!G.seasonStats.ratings[id])G.seasonStats.ratings[id]=[];G.seasonStats.ratings[id].push(r);});
    const qs=[];for(let i=0;i<2;i++){const q=pick(PRESS_QUESTIONS.filter(pq=>!qs.includes(pq)));qs.push(q);}
    G.pendingPressConf={questions:qs};
    saveState();
    weekPendingIndex++;
    document.getElementById('live-board').classList.remove('show','theme-league','theme-cup','theme-acl');
    showMatchReport(my,ratings,isHome,myGoals,oppGoals);
  } else {
    weekPendingIndex++;
    document.getElementById('live-board').classList.remove('show','theme-league','theme-cup','theme-acl');
    playNextPendingMatch();
  }
}

function showMatchReport(my,ratings,isHome,myGoals,oppGoals){
  const motmId=getMotm(ratings);

    const r=ratings[p.id];if(!r)return'';
    return`<div class="row bt" style="padding:4px 0;border-bottom:1px solid var(--sf2);font-size:.75rem">
      <span><b style="color:var(--gold);width:34px;display:inline-block">${p.slotPos}</b>${p.name}${p.id===motmId?' 🌟':''}</span>
      <span class="${ratingCls(r)}" style="font-weight:900;font-size:.85rem">${r}</span>
    </div>`;}).join('');
  document.getElementById('mbody').innerHTML=`
  <div style="text-align:center;padding:10px 0">
    <div style="font-size:1.8rem;font-weight:900">${myGoals} <span style="color:var(--dim)">-</span> ${oppGoals}</div>
    <div style="font-size:.7rem;color:var(--dim);margin-top:3px">${TEAMS[G.playerTeamIdx]} vs ${getTeamName(isHome?my.awayIdx:my.homeIdx)}</div>
    <div style="margin-top:5px">${WEATHER_ICONS[wx]} <span style="font-size:.65rem;color:var(--dim)">${wx.replace('_',' ')}</span></div>
  </div>
  ${motmPlayer?`<div class="card" style="text-align:center;border-color:var(--gold);margin-bottom:10px"><div style="font-size:.65rem;color:var(--gold);font-weight:bold">🌟 MAN OF THE MATCH</div><div style="font-size:1rem;font-weight:bold;margin-top:4px">${motmPlayer.name}</div><div style="font-size:1.4rem;font-weight:900;color:var(--gg)">${ratings[motmId]}</div></div>`:''}
  <div class="sec">Player Ratings</div>
  <div class="card">${ratingRows}</div>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-g btn-blk" onclick="goToPressConf(${myGoals},${oppGoals})">🎤 Press Conference</button>`;

function goToPressConf(myGoals,oppGoals){
  closeModal();
  setTimeout(()=>{openPressConf(myGoals,oppGoals);setTimeout(()=>playNextPendingMatch(),100);},200);
}

function skipMatch(){if(liveInterval){clearInterval(liveInterval);liveInterval=null;}liveMatchState.min=90;playWhistle();renderLiveBoardFull();}

function playKnockout(bracketObj,resObj,playedTracker,roundName,nextRoundName){
  if(!bracketObj[roundName]||playedTracker[roundName])return[];
  const results=[];const winners=[];
  bracketObj[roundName].forEach(m=>{const h=m[0],a=m[1];const sc=simulateMatch(h,a);let win=h;if(sc.away>sc.home||(sc.away===sc.home&&Math.random()>.5))win=a;results.push({homeIdx:h,awayIdx:a,homeScore:sc.home,awayScore:sc.away,winner:win,events:sc.events});winners.push(win);});
  resObj[roundName]=results;playedTracker[roundName]=true;
  if(nextRoundName){const np=[];for(let i=0;i<winners.length;i+=2)np.push([winners[i],winners[i+1]]);bracketObj[nextRoundName]=np;}
  return results;
}

// ─── LIVE BOARD ──────────────────────────────────────────────────
function renderLiveBoardFull(){
  const st=liveMatchState,lb=document.getElementById('live-board'),my=st.myMatch,isFT=st.min>=90;
  const qBar=weekPendingMatches.map((item,i)=>`<span class="mq-item ${i<weekPendingIndex?'done':i===weekPendingIndex?'active':'pending'}">${item.label}</span>`).join('');
  const wx=my?.weather||getWeather();
  let pitchHtml='';
  if(my){
    const isHome=my.homeIdx===G.playerTeamIdx;
    const mySq=G.squads[G.playerTeamIdx],oppSq=getTeamSquad(isHome?my.awayIdx:my.homeIdx);
    pitchHtml=renderHorizontalPitch(isHome?mySq:oppSq,isHome?G.tactics[G.playerTeamIdx]:getTeamTactic(my.homeIdx),isHome?oppSq:mySq,isHome?getTeamTactic(my.awayIdx):G.tactics[G.playerTeamIdx],isHome,wx);
  }
  const evLog=my?my.events.filter(e=>e.min<=st.min).sort((a,b)=>a.min-b.min).map(e=>{
    if(e.type==='goal')return`<div class="event-item"><span>⚽ ${e.min}' ${e.player}</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;
    if(e.type==='card')return`<div class="event-item"><span class="${e.card==='red'?'red-card':'yellow-card'}">${e.card==='red'?'🟥':'🟨'} ${e.min}' ${e.player}</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;
    if(e.type==='injury')return`<div class="event-item"><span class="injury-event">🚑 ${e.min}' ${e.player}</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;
    return'';}).join(''):'';
  lb.innerHTML=`
  <div class="lb-header">${st.label}${my?.isDerby?' 🔥 DERBY':''} · ${st.dateStr?formatDate(st.dateStr):''}${WEATHER_ICONS[wx]?` ${WEATHER_ICONS[wx]}`:''}</div>
  ${weekPendingMatches.length>1?`<div class="match-queue-bar">${qBar}</div>`:''}
  <div style="background:var(--card);padding:6px;text-align:center;font-weight:bold;color:var(--gold)" id="lb-min-display">${isFT?'FT — FULL TIME':`LIVE — ${st.min}'`}</div>
  ${my?`<div class="lb-score">
    <div class="lb-team"><div style="font-size:.7rem;color:var(--dim)">${getTeamName(my.homeIdx)}</div><div class="lb-tgoals" id="lb-h-score">0</div></div>
    <div style="font-size:1.4rem;color:var(--mut)">-</div>
    <div class="lb-team"><div style="font-size:.7rem;color:var(--dim)">${getTeamName(my.awayIdx)}</div><div class="lb-tgoals" id="lb-a-score">0</div></div>
  </div>${pitchHtml}<div class="event-log" id="event-log">${evLog}</div>`:`<div style="padding:20px;text-align:center;color:var(--dim)">No match for your team.</div>`}
  <div style="padding:8px 10px;display:flex;gap:7px" id="lb-actions">
    ${isFT?`<button class="btn btn-p btn-blk" onclick="continueToNext()">${weekPendingIndex+1<weekPendingMatches.length?'Next Match ➔':'View Report ✓'}</button>`
          :`<button class="btn btn-g btn-sm" onclick="openSubModal(true)">🔄 Subs (${st.subsLeft})</button><button class="btn btn-s" style="flex:1" onclick="skipMatch()">⏩ Skip</button>`}
  </div>`;
  updateLiveBoardDynamic();
}

function renderHorizontalPitch(homeSq,homeTac,awaySq,awayTac,homeIsPlayer,wx='sunny'){
  const hSlots=FORMATIONS[homeTac||'4-3-3'],aSlots=FORMATIONS[awayTac||'4-3-3'];
  const hC=H_POS[homeTac]||H_POS['4-3-3'],aC=H_POS[awayTac]||H_POS['4-3-3'];
  let dots='';let pH=new Set();
  hSlots.forEach((slot,i)=>{const p=homeSq.find&&homeSq.find(x=>x.inXI&&x.slotPos===slot&&!pH.has(x.id));const bx=hC.x[i],by=hC.y[i];if(p){pH.add(p.id);const eff=getEffOvr(p,slot,G.training?.bonus||{});const isSel=swapIdA===p.id;dots+=`<div class="pdot pdot-live ${isSel?'selected-swap':''}" data-bx="${bx}" data-by="${by}" style="left:${bx}%;top:${by}%" onclick="handleSwapClick('${p.id}',true)"><div class="pdot-circle home-dot ${isSel?'selected-swap':''}">${eff}</div><div class="pdot-name">${p.name.split(' ')[0]}${p.isStar?'⭐':''}${p.injury>0?' 🚑':''}</div><div class="pdot-ovr">${slot}</div></div>`;} else {dots+=`<div class="pdot" style="left:${bx}%;top:${by}%;opacity:.5"><div class="pdot-circle" style="background:#555">-</div><div class="pdot-ovr">${slot}</div></div>`;}});
  let pA=new Set();
  aSlots.forEach((slot,i)=>{const p=awaySq.find&&awaySq.find(x=>x.inXI&&x.slotPos===slot&&!pA.has(x.id));const bx=100-aC.x[i],by=100-aC.y[i];if(p){pA.add(p.id);const eff=getEffOvr(p,slot);dots+=`<div class="pdot pdot-live" data-bx="${bx}" data-by="${by}" style="left:${bx}%;top:${by}%"><div class="pdot-circle away-dot">${eff}</div><div class="pdot-name">${p.name.split(' ')[0]}${p.isStar?'⭐':''}${p.injury>0?' 🚑':''}</div><div class="pdot-ovr">${slot}</div></div>`;} else if(!awaySq.find){dots+=`<div class="pdot" style="left:${bx}%;top:${by}%;"><div class="pdot-circle away-dot" style="font-size:.4rem">?</div><div class="pdot-ovr">${slot}</div></div>`;}});
  const bench=homeIsPlayer?homeSq.filter(p=>!p.inXI):(awaySq.filter?awaySq.filter(p=>!p.inXI):[]);
  const benchHtml=bench.length?`<div class="bench-strip"><span style="font-size:.58rem;color:var(--dim);align-self:center;margin-right:3px">🪑</span>${bench.map(p=>`<div class="bench-pill ${swapIdA===p.id?'selected-swap':''}" onclick="handleSwapClick('${p.id}',true)"><span style="color:var(--gold)">${p.pos}</span><span class="${p.injury>0?'injured-text':''}">${p.name.split(' ')[0]}</span><span class="${ovrCls(p.ovr)}">${p.ovr}</span></div>`).join('')}</div>`:'';
  const rainOverlay=(['rain','heavy_rain'].includes(wx))?`<div class="rain-overlay"></div>`:'';
  return`<div style="padding:0 8px"><div class="pitch-wrap horizontal ${wx}" id="live-pitch-wrap"><div class="pitch-lines"><div class="pl-hw"></div><div class="pl-cc"></div><div class="pl-pb-top"></div><div class="pl-pb-bot"></div><div class="pl-gb-top"></div><div class="pl-gb-bot"></div></div>${rainOverlay}<div id="live-ball" class="match-ball" style="left:50%;top:50%"></div>${dots}</div></div>${benchHtml}`;
}

function updateLiveBoardDynamic(){
  const st=liveMatchState,my=st.myMatch;
  const md=document.getElementById('lb-min-display');if(md)md.innerHTML=st.min>=90?'FT — FULL TIME':`LIVE — ${st.min}'`;
  if(my){
    const evs=my.events.filter(e=>e.min<=st.min);
    const h=st.min>=90?my.homeScore:evs.filter(e=>e.team==='home'&&e.type==='goal').length;
    const a=st.min>=90?my.awayScore:evs.filter(e=>e.team==='away'&&e.type==='goal').length;
    const hEl=document.getElementById('lb-h-score'),aEl=document.getElementById('lb-a-score');
    if(hEl)hEl.innerText=h;if(aEl)aEl.innerText=a;
    const logEl=document.getElementById('event-log');
    if(logEl)logEl.innerHTML=evs.sort((a,b)=>a.min-b.min).map(e=>{if(e.type==='goal')return`<div class="event-item"><span>⚽ ${e.min}' ${e.player}</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;if(e.type==='card')return`<div class="event-item"><span class="${e.card==='red'?'red-card':'yellow-card'}">${e.card==='red'?'🟥':'🟨'} ${e.min}' ${e.player}</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;if(e.type==='injury')return`<div class="event-item"><span class="injury-event">🚑 ${e.min}' ${e.player}</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;return'';}).join('');
    if(st.min<90&&!st.isPaused){
      document.querySelectorAll('.pdot-live').forEach(dot=>{const bx=parseFloat(dot.dataset.bx),by=parseFloat(dot.dataset.by);dot.style.left=`${clamp(bx+rnd(-3,3),2,98)}%`;dot.style.top=`${clamp(by+rnd(-3,3),2,98)}%`;});
      const ball=document.getElementById('live-ball');
      if(ball){const dots=document.querySelectorAll('.pdot-live');if(dots.length&&Math.random()>.2){const t=dots[rnd(0,dots.length-1)];ball.style.left=`${clamp(parseFloat(t.style.left)+rnd(-4,4),5,95)}%`;ball.style.top=`${clamp(parseFloat(t.style.top)+rnd(-4,4),5,95)}%`;}else{ball.style.left=`${rnd(10,90)}%`;ball.style.top=`${rnd(10,90)}%`;}}
    }
    const lastGoal=evs.filter(e=>e.type==='goal').slice(-1)[0];
    if(lastGoal&&lastGoal.min===st.min&&st.min>0){const pitch=document.getElementById('live-pitch-wrap');if(pitch&&!document.getElementById('goal-flash')){const fl=document.createElement('div');fl.className='goal-flash';fl.id='goal-flash';fl.textContent='⚽ GOAL!';pitch.appendChild(fl);playCrowdCheer();setTimeout(()=>fl.remove&&fl.remove(),1200);}}
  }
}

function handleSwapClick(pid,isLive=false){
  if(!swapIdA){swapIdA=pid;showToast("Select second player to swap...");}
  else if(swapIdA===pid){swapIdA=null;}
  else{
    const sq=G.squads[G.playerTeamIdx];const p1=sq.find(x=>x.id===swapIdA),p2=sq.find(x=>x.id===pid);
    if(p1&&p2){
      if(p1.injury>0&&!p1.inXI===false||p2.injury>0&&!p2.inXI===false){showToast("❌ Injured player can't play!");swapIdA=null;if(isLive)openSubModal(false);else renderTab(activeTab);return;}
      if(isLive&&((p1.inXI&&!p2.inXI)||(!p1.inXI&&p2.inXI))){if(liveMatchState.subsLeft<=0){showToast("❌ No subs left!");swapIdA=null;return;}liveMatchState.subsLeft--;}
      const tX=p1.inXI,tS=p1.slotPos;p1.inXI=p2.inXI;p1.slotPos=p2.slotPos;p2.inXI=tX;p2.slotPos=tS;
      showToast("🔄 Swapped!");swapIdA=null;
      if(isLive){closeSubModal();return;}
    } else swapIdA=null;
  }
  if(isLive)openSubModal(false);else renderTab(activeTab);
}

function openSubModal(reset=true){
  liveMatchState.isPaused=true;if(reset)swapIdA=null;
  const sq=G.squads[G.playerTeamIdx];
  document.getElementById('mtitle').innerHTML='🔄 Substitutions';
  document.getElementById('mbody').innerHTML=`<p style="font-size:.68rem;color:var(--dim);text-align:center;margin-bottom:8px">Subs left: <b>${liveMatchState.subsLeft}</b>. Tap player on pitch then bench.</p><div style="transform:scale(.85);transform-origin:top center;margin-bottom:-25px">${renderSquadPitchVertical(sq,G.tactics[G.playerTeamIdx],'sub')}</div>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-p btn-sm" onclick="closeSubModal()">Back to Match</button>`;
  document.getElementById('mov').classList.add('show');
}
function closeSubModal(){swapIdA=null;document.getElementById('mov').classList.remove('show');liveMatchState.isPaused=false;}

// ─── SQUAD TAB (VERTICAL PITCH) ────────────────
function renderSquadPitchVertical(squad,tactic,mode){
  const slots=FORMATIONS[tactic];
  const yM={'4-3-3':[90,72,72,72,72,50,50,50,20,20,20],'4-3-3 Attack':[90,72,72,72,72,55,40,55,20,20,20],'4-4-2':[90,72,72,72,72,50,50,50,50,20,20],'4-2-3-1':[90,75,75,75,75,58,58,40,40,40,20],'4-2-3-1 Wide':[90,75,75,75,75,58,58,35,40,35,20],'3-5-2':[90,75,75,75,55,55,55,55,55,20,20],'3-4-3':[90,75,75,75,50,50,50,50,20,20,20],'5-3-2':[90,72,72,72,72,72,50,50,50,20,20]}[tactic];
  const xM={'4-3-3':[50,85,65,35,15,80,50,20,80,50,20],'4-3-3 Attack':[50,85,65,35,15,65,50,35,80,50,20],'4-4-2':[50,85,65,35,15,85,60,40,15,60,40],'4-2-3-1':[50,85,65,35,15,65,35,80,50,20,50],'4-2-3-1 Wide':[50,85,65,35,15,65,35,85,50,15,50],'3-5-2':[50,75,50,25,90,70,50,30,10,60,40],'3-4-3':[50,75,50,25,85,65,35,15,80,50,20],'5-3-2':[50,90,70,50,30,10,80,50,20,60,40]}[tactic];
  const isLiveSub=mode==='sub';let placed=new Set();
  const dots=slots.map((s,i)=>{const p=squad.find(x=>x.inXI&&x.slotPos===s&&!placed.has(x.id));if(p){placed.add(p.id);const isSel=swapIdA===p.id;const eff=getEffOvr(p,s,G.training?.bonus||{});return`<div class="pdot ${isSel?'selected-swap':''}" data-bx="${xM[i]}" data-by="${yM[i]}" style="left:${xM[i]}%;top:${yM[i]}%" onclick="handleSwapClick('${p.id}',${isLiveSub})"><div class="pdot-circle home-dot ${isSel?'selected-swap':''}">${eff}</div><div class="pdot-name">${p.name.split(' ')[0]}${p.isStar?'⭐':''}${p.injury>0?' 🚑':''}</div><div class="pdot-ovr" style="${eff<p.ovr?'color:var(--red)':''}">${s}</div></div>`;}return`<div class="pdot" style="left:${xM[i]}%;top:${yM[i]}%;opacity:.5"><div class="pdot-circle" style="background:#555">-</div><div class="pdot-ovr">${s}</div></div>`;}).join('');
  const bench=squad.filter(p=>!p.inXI);
  return`<div class="pitch-wrap vertical"><div class="pitch-lines"><div class="pl pl-hw"></div><div class="pl pl-cc"></div><div class="pl pl-pb-top"></div><div class="pl pl-pb-bot"></div><div class="pl pl-gb-top"></div><div class="pl pl-gb-bot"></div></div>${dots}</div><div style="margin-top:8px"><div style="font-size:.62rem;color:var(--dim);margin-bottom:4px">🪑 Bench (${bench.length})</div><div style="display:flex;flex-wrap:wrap;gap:4px">${bench.map(p=>`<div class="pill ${swapIdA===p.id?'selected-swap':''}" style="cursor:pointer;font-size:.62rem;display:flex;align-items:center;gap:3px;padding:3px 7px" onclick="handleSwapClick('${p.id}',${isLiveSub})"><span style="color:var(--gold);font-weight:bold">${p.pos}</span><span class="${p.injury>0?'injured-text':''}">${p.name.split(' ')[0]}</span><span class="${ovrCls(p.ovr)}">${p.ovr}</span>${p.injury>0?'🚑':''}</div>`).join('')}</div></div>`;
}

}

  const tac=G.tactics[G.playerTeamIdx];

    <div class="card" style="text-align:center;padding:9px 3px"><div style="font-size:1.1rem;font-weight:900;color:var(--gg)">${effOvr}</div><div style="font-size:.55rem;color:var(--dim)">OVR XI</div></div>
    <div class="card" style="text-align:center;padding:9px 3px"><div style="font-size:1.1rem;font-weight:900;color:var(--purp)">${G.reputation||40}</div><div style="font-size:.55rem;color:var(--dim)">Rep</div></div>
  </div>
  
  <div class="card" style="margin-bottom:8px">
    <div class="row bt"><span style="font-size:.68rem;color:var(--dim);font-weight:bold">CHEMISTRY</span><span style="font-weight:bold;color:var(--gg)">${chem}%</span></div>

function playerCardHTML(p){
  const isSel=swapIdA===p.id;
  const eff=getEffOvr(p,p.slotPos,G.training?.bonus||{});
  const injStr=p.injury>0?`<b style="color:var(--red)">🚑 ${p.injury}w</b>`:`En:${p.energy}%`;

function buyPlayer(id,isFree){
  const idx=G.transferMarket.findIndex(p=>p.id===id);if(idx<0)return;
  const p=G.transferMarket[idx];if(!isFree&&G.budget<p.price){showToast('❌ Not enough budget!');return;}
  if(!isFree)G.budget=parseFloat((G.budget-p.price).toFixed(2));
  p.teamIndex=G.playerTeamIdx;p.contract=rnd(2,4);p.isLoan=false;p.originalTeamIdx=-1;
  G.squads[G.playerTeamIdx].push(p);G.transferMarket.splice(idx,1);
  saveState();showToast(`✅ ${p.name} signed!`);renderAll();
}

function sellPlayer(id){
  const sq=G.squads[G.playerTeamIdx];const idx=sq.findIndex(p=>p.id===id);if(idx<0)return;
  const p=sq[idx];
  if(p.inXI){showToast('❌ Remove from XI first!');return;}
  const healthyAfter=sq.filter((pl,i)=>i!==idx&&pl.injury===0);
  if(healthyAfter.length<11){showToast('❌ Not enough healthy players to field a XI!');return;}
  if(sq.length<=16){showToast('❌ Minimum squad size is 16!');return;}
  const sp=Math.max(1,getPrice(p.ovr,p.age)-rnd(0,1));
  G.budget=parseFloat((G.budget+sp).toFixed(2));
  p.teamIndex=rnd(0,15);G.transferMarket.push(p);sq.splice(idx,1);
  saveState();showToast(`✅ ${p.name} sold for ${fmt(sp)}!`);renderAll();
}

function scoutYouth(){
  if(G.budget<2){showToast('❌ Need €2M!');return;}
  G.budget=parseFloat((G.budget-2).toFixed(2));G.scoutQueue=G.scoutQueue||[];
  G.scoutQueue.push({weeksLeft:rnd(2,4)});saveState();showToast('🔍 Scout dispatched!');renderAll();
}

  </div>
  <div class="card" style="border-color:var(--gold)"><div class="sec" style="color:var(--gold)">💼 Finance</div>
    <div class="row bt" style="margin-bottom:8px"><span style="color:var(--dim)">Budget:</span><span style="font-size:1.1rem;font-weight:900;color:var(--gold)">${fmt(G.budget)}</span></div>
    <button class="btn btn-p btn-blk" ${(G.budgetRequestsUsed||0)>=2?'disabled':''} onclick="requestBudget()">📝 Request Funds (${2-(G.budgetRequestsUsed||0)} left)</button>
  </div>
  <div class="card"><div class="sec">📧 Inbox (${G.inbox.length})</div>${inboxHtml}</div>
  <div class="card" style="border-color:var(--red)"><div class="sec">Danger Zone</div><button class="btn btn-d btn-blk" onclick="hardReset()">🛑 Retire / New Career</button></div>`;
}

function showSaveSlots(){
  const slots=getAllSlots();
  document.getElementById('mtitle').innerHTML='🗂️ Save Slots';
  document.getElementById('mbody').innerHTML=slots.map(s=>`
  <div class="slot-card ${s.key===currentSlot?'active-slot':''} ${s.empty?'empty-slot':''}" onclick="selectSlot('${s.key}')">
    <div class="row bt"><b style="font-size:.8rem">${s.key.replace('fm_slot_','Slot ')}</b>${s.key===currentSlot?'<span style="color:var(--gg);font-size:.65rem">ACTIVE</span>':''}</div>
    ${s.empty?`<div style="font-size:.7rem;color:var(--dim)">Empty — click to start new career here</div>`:`<div style="font-size:.72rem;color:var(--txt);margin-top:3px">${s.manager} | ${s.team} | S${s.season} W${s.week} | ${s.pts}pts</div>`}
  </div>`).join('');
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-s btn-sm" onclick="closeModal()">Close</button>`;
  document.getElementById('mov').classList.add('show');
}
function selectSlot(k){
  if(k===currentSlot){closeModal();return;}
  if(!confirm(`Switch to ${k.replace('fm_slot_','Slot ')}? Unsaved progress in current slot is saved automatically.`))return;
  saveState();switchSlot(k);
  if(!loadState()){G=freshState();selectTeamPrompt();}else{weekPendingMatches=[];weekPendingIndex=0;renderAll();}
  closeModal();showToast(`Switched to ${k.replace('fm_slot_','Slot ')}!`);
}

function exportSave(){
  const data=btoa(encodeURIComponent(JSON.stringify(G)));
  document.getElementById('mtitle').innerHTML='📤 Export Save';
  document.getElementById('mbody').innerHTML=`<p style="font-size:.72rem;color:var(--dim);margin-bottom:8px">Copy and save this code safely.</p><textarea id="export-text" style="width:100%;height:130px;background:var(--bg);color:var(--gg);padding:8px;font-family:monospace;font-size:.6rem;border:1px solid var(--brd);border-radius:4px;" readonly>${data}</textarea>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-p btn-sm" onclick="document.getElementById('export-text').select();document.execCommand('copy');showToast('Copied!')">Copy</button><button class="btn btn-s btn-sm" onclick="closeModal()">Close</button>`;
  document.getElementById('mov').classList.add('show');
}
function importSave(){
  document.getElementById('mtitle').innerHTML='📥 Import Save';
  document.getElementById('mbody').innerHTML=`<textarea id="import-text" style="width:100%;height:130px;background:var(--sf);color:var(--wh);padding:8px;font-family:monospace;font-size:.6rem;border:1px solid var(--brd);border-radius:4px" placeholder="Paste code..."></textarea>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-p btn-sm" onclick="processImport()">Load</button><button class="btn btn-s btn-sm" onclick="closeModal()">Cancel</button>`;
  document.getElementById('mov').classList.add('show');
}
function processImport(){
  try{const p=JSON.parse(decodeURIComponent(atob(document.getElementById('import-text').value.trim())));if(p?.season){G=p;saveState();closeModal();renderAll();showToast('✅ Save loaded!');}}catch(e){showToast('❌ Invalid code!');}
}
function signProspect(msgId,pid){
  const msg=G.inbox.find(m=>m.id===msgId);if(!msg)return;
  const pIdx=msg.players.findIndex(p=>p.id===pid);if(pIdx<0)return;
  const p=msg.players[pIdx];p.teamIndex=G.playerTeamIdx;p.contract=3;G.squads[G.playerTeamIdx].push(p);
  msg.players.splice(pIdx,1);if(!msg.players.length)G.inbox=G.inbox.filter(m=>m.id!==msgId);
  saveState();showToast(`✅ ${p.name} signed!`);renderAll();
}
function dismissMsg(msgId){G.inbox=G.inbox.filter(m=>m.id!==msgId);saveState();renderAll();}
function requestBudget(){
  if((G.budgetRequestsUsed||0)>=2)return;
  const pos=G.leagueTable.indexOf(G.leagueTable.find(x=>x.teamIdx===G.playerTeamIdx))+1;
  let chance=40;if(pos<=3)chance+=30;else if(pos<=8)chance+=10;else if(pos>=13)chance-=30;if(G.budget>30)chance-=20;if(G.budget<10)chance+=20;
  G.budgetRequestsUsed=(G.budgetRequestsUsed||0)+1;
  if(Math.random()*100<chance){const g=rnd(5,15);G.budget=parseFloat((G.budget+g).toFixed(2));G.inbox.unshift({id:Math.random().toString(36).slice(2,8),title:'Budget Approved ✅',body:`Board allocated ${fmt(g)} extra.`,action:null,isRead:false});showToast(`✅ +${fmt(g)} approved!`);}
  else{G.inbox.unshift({id:Math.random().toString(36).slice(2,8),title:'Budget Rejected ❌',body:`Board declined your request.`,action:null,isRead:false});showToast('❌ Rejected.');}
  saveState();renderAll();
}
function acceptJob(newTeamIdx,msgIdx){
  if(confirm(`Leave ${TEAMS[G.playerTeamIdx]} for ${TEAMS[newTeamIdx]}?`)){
    G.playerTeamIdx=newTeamIdx;G.budget=Math.min(50,BASE_BUDGETS[newTeamIdx]);G.inbox.splice(msgIdx,1);
    weekPendingMatches=[];weekPendingIndex=0;G.log.unshift({cls:'info',text:`👔 Joined ${TEAMS[newTeamIdx]}!`});
    saveState();renderAll();showToast(`Welcome to ${TEAMS[newTeamIdx]}!`);
  }
}
function openPlayerModal(pid){
  let p=null;for(let i=0;i<G.squads.length;i++){p=G.squads[i].find(x=>x.id===pid);if(p)break;}if(!p)p=G.transferMarket.find(x=>x.id===pid);if(!p)return;
  const avgR=G.seasonStats?.ratings[pid]?.length?(G.seasonStats.ratings[pid].reduce((s,r)=>s+r,0)/G.seasonStats.ratings[pid].length).toFixed(1):'—';
  document.getElementById('mtitle').innerHTML='🔍 Player Info';
  document.getElementById('mbody').innerHTML=`
  <div style="text-align:center;margin-bottom:12px"><div style="font-size:1.8rem;font-weight:900"><span class="${p.injury>0?'injured-text':''}">${p.name}</span>${p.isStar?' ⭐':''}</div>
  <div style="font-size:.75rem;color:var(--dim);margin-top:3px">${p.teamIndex>=0?TEAMS[p.teamIndex]:'Free Agent'}${p.injury>0?` | <span style="color:var(--red)">🚑 ${p.injury}w injured</span>`:''}</div></div>
  <div class="g4"><div class="card" style="text-align:center;padding:9px 3px"><div style="font-weight:bold;color:var(--gold)">${p.pos}</div><div style="font-size:.55rem;color:var(--dim)">POS</div></div><div class="card" style="text-align:center;padding:9px 3px"><div style="font-weight:bold;color:var(--gg)">${p.ovr}</div><div style="font-size:.55rem;color:var(--dim)">OVR</div></div><div class="card" style="text-align:center;padding:9px 3px"><div style="font-weight:bold;color:var(--bg2)">${p.pot}</div><div style="font-size:.55rem;color:var(--dim)">POT</div></div><div class="card" style="text-align:center;padding:9px 3px"><div style="font-weight:bold;color:var(--wh)">${p.age}</div><div style="font-size:.55rem;color:var(--dim)">AGE</div></div></div>
  <div class="card"><div class="row bt" style="font-size:.75rem"><span>Contract</span><b style="color:${p.contract<=1?'var(--red)':'var(--gg)'}">${p.contract}y</b></div><div class="row bt" style="font-size:.75rem;margin-top:5px"><span>Appearances</span><b>${p.appearances}</b></div><div class="row bt" style="font-size:.75rem;margin-top:5px"><span>Goals</span><b style="color:var(--gold)">${p.goals||0}</b></div><div class="row bt" style="font-size:.75rem;margin-top:5px"><span>Avg Rating</span><b class="${avgR!=='—'?ratingCls(parseFloat(avgR)):''}">${avgR}</b></div></div>`;
  document.getElementById('mfoot').innerHTML=`${p.teamIndex===G.playerTeamIdx&&!p.isLoan&&p.contract<=1?`<button class="btn btn-g btn-sm" onclick="renewContract('${p.id}')">📝 Renew</button>`:''}
  <button class="btn btn-s btn-sm" onclick="closeModal()">Close</button>`;
  document.getElementById('mov').classList.add('show');
}
function renewContract(id){
  const p=G.squads[G.playerTeamIdx].find(x=>x.id===id);if(!p)return;
  const cost=p.ovr<70?1:p.ovr<80?rnd(2,3):rnd(5,8);
  if(G.budget<cost){showToast(`❌ Need ${fmt(cost)}`);return;}
  G.budget=parseFloat((G.budget-cost).toFixed(2));p.contract+=rnd(2,3);
  saveState();closeModal();openPlayerModal(id);showToast(`✅ Renewed for ${fmt(cost)}!`);
}
function openTeamModal(tid){
  const sq=G.squads[tid];const xi=sq.filter(p=>p.inXI).sort((a,b)=>POS_ORDER[a.pos]-POS_ORDER[b.pos]);
  let html=`<div style="font-size:.72rem;color:var(--dim);margin-bottom:8px">Tactic: ${G.tactics[tid]}</div><div class="sec">Starting XI</div>`;
  xi.forEach(p=>{html+=`<div class="row bt" style="font-size:.73rem;border-bottom:1px solid var(--sf2);padding:4px 0;cursor:pointer" onclick="openPlayerModal('${p.id}')"><span><b style="color:var(--gold);width:30px;display:inline-block">${p.slotPos}</b><span class="${p.injury>0?'injured-text':''}">${p.name}</span></span><b class="${ovrCls(p.ovr)}">${p.ovr}</b></div>`;});
  document.getElementById('mtitle').innerHTML=`🛡️ ${TEAMS[tid]}`;
  document.getElementById('mbody').innerHTML=html;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-s btn-sm" onclick="closeModal()">Close</button>`;
  document.getElementById('mov').classList.add('show');
}
function showEndSeason(){
  const row=G.leagueTable.find(x=>x.teamIdx===G.playerTeamIdx);const pos=G.leagueTable.indexOf(row)+1;
  let reward=5;if(pos===1)reward=40;else if(pos===2)reward=30;else if(pos===3)reward=20;else if(pos<=5)reward=10;
  if(G.cupWinner===G.playerTeamIdx)reward+=15;if(G.acl?.winner===G.playerTeamIdx)reward+=50;
  let objHtml='';
  if(G.boardObjective){
    const met=G.boardObjective.check(pos,G.cupWinner===G.playerTeamIdx,G.aclQualified||false);
    if(met){reward+=G.boardObjective.budget;G.reputation=clamp((G.reputation||40)+G.boardObjective.rep,0,100);objHtml=`<div class="obj-badge met">✅ Board Objective Met: ${G.boardObjective.label}</div>`;}
    else{G.reputation=clamp((G.reputation||40)-15,0,100);objHtml=`<div class="obj-badge miss">❌ Objective Missed: ${G.boardObjective.label}</div>`;}
  }
  G.sponsors.filter(s=>s.active&&!s.weekly&&s.weeksLeft>0).forEach(s=>{if(!s.cond||pos<=s.cond.value){reward+=s.value;objHtml+=`<div style="font-size:.7rem;color:var(--gold);margin-top:3px">💼 Sponsor bonus: +${fmt(s.value)}</div>`;}});
  G.historyRecords=G.historyRecords||[];G.historyRecords.push({season:G.season,position:pos,pts:row?.pts||0,cupWinner:G.cupWinner===G.playerTeamIdx,aclWinner:G.acl?.winner===G.playerTeamIdx});
  document.getElementById('mtitle').innerHTML='';
  document.getElementById('mbody').innerHTML=`<div style="text-align:center"><h1 style="font-size:2.5rem;margin:0">🏆</h1><h2 style="color:var(--gold)">Season ${G.season} Done!</h2><p style="font-size:.78rem;color:var(--txt)">League: <b>${G.leagueTable[0].name}</b></p><div style="background:var(--sf2);padding:10px;border-radius:8px;margin:12px 0"><div style="font-size:.72rem;color:var(--dim)">${TEAMS[G.playerTeamIdx]}</div><div style="font-size:1.1rem;font-weight:bold">Final: #${pos}</div><div style="font-size:.85rem;color:var(--gg);margin-top:4px">Prize: +${fmt(reward)}</div></div>${objHtml}</div>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn btn-p btn-blk" onclick="startNewSeason(${reward},${pos})">Next Season ➔</button>`;
  document.getElementById('mov').classList.add('show');
}
function startNewSeason(reward,finalPos){
  G.budget=parseFloat(Math.min(60,G.budget+reward).toFixed(2));G.budgetRequestsUsed=0;
  G.season++;G.week=0;G.phase='preseason';G.preseasonWeeksLeft=8;
  weekPendingMatches=[];weekPendingIndex=0;G.sponsors=[];G.boardObjective=null;G.objectiveMet=false;G.aclQualified=false;
  G.seasonStats={goals:{},appearances:{},ratings:{}};
  G.leagueTable=TEAMS.map((name,i)=>({teamIdx:i,name,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0}));
  G.leagueResults=[];G.schedule=buildSchedule();G.lcaTeamIndices=G.leagueTable.slice(0,4).map(x=>x.teamIdx);
  G.acl=null;G.cupBracket={"Round of 16":[...Array(16).keys()].sort(()=>Math.random()-.5).reduce((r,k,i,a)=>i%2===0?[...r,[a[i],a[i+1]===15?99:a[i+1]]]:r,[])};G.cupResults={};G.cupRoundsPlayed={};G.cupWinner=null;
  G.squads.forEach((sq,ti)=>{
    sq.forEach(p=>{p.energy=100;p.contract--;p.age++;p.injury=0;let g=0;if(p.age<24&&p.ovr<p.pot)g=rnd(1,3);else if(p.age<30&&p.ovr<p.pot)g=rnd(0,2);else if(p.age>=30)g=rnd(-3,0);if(p.appearances>15&&p.age<30&&p.ovr<p.pot)g++;p.ovr=clamp(p.ovr+g,40,95);if(p.ovr>p.pot)p.pot=p.ovr;p.isStar=p.ovr>=80;p.goals=0;p.appearances=0;p.price=getPrice(p.ovr,p.age);});
    for(let i=sq.length-1;i>=0;i--){const p=sq[i];if(p.isLoan){p.isLoan=false;p.teamIndex=p.originalTeamIdx;G.transferMarket.push(p);sq.splice(i,1);}else if(p.age>=36&&Math.random()<.8){const regen=genPlayer(POS_MAP[p.pos].c,ti,false);regen.age=rnd(17,20);sq.splice(i,1,regen);}else if(p.contract<=0){p.teamIndex=-1;p.price=0;G.transferMarket.push(p);sq.splice(i,1);const np=genPlayer(POS_MAP[p.pos].c,ti,false);sq.push(np);}}
    setDefaultXI(sq,G.tactics[ti]);
  });
  G.transferMarket=G.transferMarket.slice(-180);for(let i=0;i<40;i++){const cat=pick(['GK','DEF','MID','FWD']);const np=genPlayer(cat,Math.random()<.3?-1:rnd(0,15),false);const r=Math.random();if(r<.7)np.ovr=rnd(45,65);else if(r<.9)np.ovr=rnd(66,75);else np.ovr=rnd(76,85);if(np.ovr>np.pot)np.pot=np.ovr;np.isStar=np.ovr>=80;np.price=np.teamIndex===-1?0:getPrice(np.ovr,np.age);G.transferMarket.push(np);}
  G.transferMarket.sort((a,b)=>b.ovr-a.ovr);
  G.log=[{cls:'info',text:`🌟 Season ${G.season} starts! Rewards added.`}];
  if(finalPos<=5||Math.random()>.7){let t=rnd(0,15);while(t===G.playerTeamIdx)t=rnd(0,15);G.inbox.unshift({id:Math.random().toString(36).slice(2,8),title:'Job Offer 📄',body:`${TEAMS[t]} wants you as their manager!`,action:true,targetTeamIdx:t,isRead:false});}
  G.reputation=clamp((G.reputation||40)-5,0,100); 
  saveState();closeModal();renderAll();showToast("New Season Started!");
}
let toastTmr;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(()=>t.classList.remove('show'),2500);}
function hardReset(){if(confirm("Delete save and start new career?")){localStorage.removeItem(currentSlot);G=freshState();selectTeamPrompt();}}
function closeModal(){document.getElementById('mov').classList.remove('show');}
function selectTeamPrompt(){
  let html=`<div style="margin-bottom:12px"><div class="sec">1. Manager Name</div><input type="text" id="mgrNameInp" class="input-text" placeholder="Enter name..." value="Manager"></div><div class="sec">2. Choose Club</div><div style="display:flex;flex-direction:column;gap:5px;max-height:44vh;overflow-y:auto;padding-right:4px">`;
  TEAMS.forEach((name,i)=>{const bgt=Math.min(50,BASE_BUDGETS[i]+rnd(-5,5));const sq=G.squads[i];const eff=Math.round(sq.filter(p=>p.inXI).reduce((s,p)=>s+getEffOvr(p,p.slotPos),0)/11)||0;html+=`<button class="btn btn-s" style="justify-content:space-between;padding:9px 11px;display:flex;align-items:center" onclick="applyTeam(${i},${bgt})"><div style="text-align:left;flex:1"><div style="font-weight:700;font-size:.88rem">${i+1}. ${name}</div><div style="font-size:.62rem;color:var(--wh);margin-top:3px">OVR: <b style="color:var(--gg)">${eff}</b></div></div><div style="text-align:right"><div style="font-size:.6rem;color:var(--dim)">Budget</div><div style="font-size:.9rem;font-weight:900;color:var(--gold)">${bgt}M</div></div></button>`;});
  html+=`</div>`;
  document.getElementById('mtitle').innerHTML=`<h2 style="color:var(--gold);margin:0">⚽ Start Career</h2>`;
  document.getElementById('mbody').innerHTML=html;document.getElementById('mfoot').innerHTML='';
  document.getElementById('mov').classList.add('show');
}
function applyTeam(idx,budget){
  const mName=document.getElementById('mgrNameInp').value.trim()||'Manager';
  G.managerName=mName;G.playerTeamIdx=idx;G.budget=parseFloat(budget.toFixed(1));
  G.tactics[idx]='4-3-3';setDefaultXI(G.squads[idx],'4-3-3');
  assignBoardObjective();
  saveState();closeModal();renderAll();showToast(`Welcome to ${TEAMS[idx]}, ${mName}!`);
}
const RENDERERS={dash:renderDash,squad:renderSquad,league:renderLeague,sched:renderSched,cup:renderCup,acl:renderAcl,transfer:renderTransfer,club:renderClub,stats:renderStats,manager:renderManager};
function renderTab(tab){
  try{
    const mv=document.getElementById('mov');
    if(mv.classList.contains('show')&&document.getElementById('mtitle').innerHTML.includes('Start Career'))return;
    if(mv.classList.contains('show')&&document.getElementById('mbody').innerHTML.includes('Season')&&document.getElementById('mbody').innerHTML.includes('Done'))return;
    activeTab=tab;
    document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
    if(RENDERERS[tab])RENDERERS[tab]();
  }catch(e){console.error("Tab Error",e);}
}
function renderAll(){updateHeader();renderTab(activeTab);}
function switchTab(tab){swapIdA=null;renderTab(tab);document.getElementById('main').scrollTop=0;}
document.querySelectorAll('.tb').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));

function migrateState(){
  if(!G.reputation)G.reputation=40;
  if(!G.stadium)G.stadium={tier:0,income:.5};
  if(!G.sponsors)G.sponsors=[];
  if(!G.seasonStats)G.seasonStats={goals:{},appearances:{},ratings:{}};
  if(!G.historyRecords)G.historyRecords=[];
  if(!G.training)G.training={lastEffect:null,bonus:{},chemBonus:0};
  if(!G.scoutQueue)G.scoutQueue=[];
  if(!G.loanBids)G.loanBids=[];
  G.squads.forEach(sq=>sq.forEach(p=>{if(!p.pot)p.pot=Math.min(95,p.ovr+(p.age<25?rnd(3,10):0));if(p.injury===undefined)p.injury=0;if(p.isLoan===undefined)p.isLoan=false;}));
  G.transferMarket.forEach(p=>{if(!p.pot)p.pot=Math.min(95,p.ovr+(p.age<25?rnd(3,10):0));});
}

function init(){
  if(!loadState()){G=freshState();selectTeamPrompt();}
  else{migrateState();weekPendingMatches=[];weekPendingIndex=0;updateHeader();renderTab('dash');}
}
init();
</script>
</body>
</html>
