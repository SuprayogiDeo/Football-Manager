<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
    <title>Football Manager Web</title>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0d3b2e" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>тЪ╜</text></svg>">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --gd:#0d3b2e;--gm:#1a5c44;--gl:#2d8c63;--gg:#3dba82;
            --bd:#0a1f3c;--bm:#1a3a6b;--bl:#2d6abf;--bg2:#4a9eff;
            --gold:#f0c040;--red:#e85555;--orng:#e67e22;
            --bg:#0a1812;--sf:#0f2418;--sf2:#172e20;--card:#1c3828;--brd:#2a5040;
            --txt:#d4eadc;--dim:#7aab8a;--mut:#4a7a5a;--wh:#f0f8f2;
            --shd:0 4px 20px rgba(0,0,0,.5);--r:10px;--rs:6px;
        }
        html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Segoe UI',sans-serif;font-size:14px;overflow-x:hidden;overscroll-behavior:none;}
        #app{display:flex;flex-direction:column;height:100dvh;max-width:540px;margin:0 auto;position:relative;background:var(--bg)}
        @media(min-width:541px){#app{border-left:1px solid var(--brd);border-right:1px solid var(--brd)}}
        #hdr{background:linear-gradient(135deg,var(--gd),var(--bd));border-bottom:2px solid var(--gl);padding:8px 14px 6px;position:sticky;top:0;z-index:100}
        #hdr h1{font-size:.9rem;font-weight:800;color:var(--gg);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
        #hdr-meta{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap;}
        .badge{background:var(--sf2);border:1px solid var(--brd);border-radius:20px;padding:2px 10px;font-size:.72rem;color:var(--dim)}
        .badge.hi{border-color:var(--gl);color:var(--gg)}.badge.gld{border-color:var(--gold);color:var(--gold)}
        #bgt{margin-left:auto}
        #tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--brd);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
        #tabs::-webkit-scrollbar{display:none}
        .tb{flex:1;min-width:58px;padding:8px 2px;font-size:.65rem;font-weight:700;color:var(--mut);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:color 0.2s;}
        .tb.active{color:var(--gg);border-bottom-color:var(--gg)}
        #main{flex:1;overflow-y:auto;padding:10px;padding-bottom:30px}
        .sec{font-size:.72rem;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--brd)}
        .card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:11px;margin-bottom:9px}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border:none;border-radius:var(--rs);font-size:.78rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s}
        .btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;pointer-events:none}
        .btn-p{background:var(--gl);color:#fff}.btn-s{background:var(--bm);color:#fff}
        .btn-g{background:var(--gold);color:#1a1200}.btn-d{background:var(--red);color:#fff}
        .btn-sm{padding:4px 9px;font-size:.68rem}.btn-blk{width:100%}
        .row{display:flex;gap:8px;align-items:center}.row.bt{justify-content:space-between}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
        .ovr{display:inline-block;min-width:30px;text-align:center;padding:2px 4px;border-radius:4px;font-size:.78rem;font-weight:800}
        .ovr-h{background:#1a5c1a;color:#6eff6e}.ovr-m{background:#4a3a00;color:var(--gold)}.ovr-l{background:#4a1515;color:#ff7777}
        .pos{font-size:.6rem;font-weight:800;padding:2px 5px;border-radius:3px}
        .pos-GK{background:#2a1a5a;color:#c0a0ff}.pos-DEF{background:#1a3a5a;color:#80c0ff}
        .pos-MID{background:#1a4a2a;color:#80ff90}.pos-FWD{background:#5a2020;color:#ff9090}
        .pill{background:var(--sf2);border-radius:20px;padding:2px 8px;font-size:.7rem;font-weight:600;border:1px solid var(--brd)}
        .input-text{background:var(--sf);color:var(--wh);border:1px solid var(--brd);padding:8px 12px;border-radius:var(--rs);width:100%;font-weight:bold;font-size:1rem}
        .tbl{width:100%;border-collapse:collapse;font-size:.7rem}
        .tbl th{color:var(--mut);text-align:left;padding:4px;border-bottom:1px solid var(--brd)}
        .tbl td{padding:4px;border-bottom:1px solid var(--sf2)}
        .tbl tr.me td{color:var(--gg);font-weight:700}
        .tbl td.n,.tbl th.n{text-align:right}
        .team-link{color:var(--bg2);cursor:pointer;text-decoration:underline;font-weight:600}
        .mlog{list-style:none}
        .mlog li{padding:6px 9px;background:var(--sf2);border-radius:var(--rs);margin-bottom:4px;font-size:.76rem;border-left:3px solid var(--brd)}
        .mlog li.win{border-left-color:var(--gg)}.mlog li.draw{border-left-color:var(--gold)}.mlog li.loss{border-left-color:var(--red)}
        .selected-swap{border:2px dashed var(--gold)!important;background-color:rgba(240,192,64,0.2)!important;box-shadow:0 0 12px var(--gold)!important;opacity:0.9;}
        .pdot-circle.selected-swap{border:3px dashed var(--gold)!important;transform:scale(1.15)!important;}
        .plc{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--sf2);border-radius:var(--rs);border:1px solid var(--brd);margin-bottom:5px;cursor:pointer;transition:all .15s}
        .pln{font-weight:700;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .info-btn{background:var(--brd);color:var(--wh);border:none;border-radius:50%;width:22px;height:22px;font-size:.65rem;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center}

        /* ====== HORIZONTAL PITCH ====== */
        .pitch-wrap{position:relative;width:100%;background:linear-gradient(90deg,#1a6b30 0%,#1e7a35 50%,#1a6b30 100%);border-radius:8px;overflow:hidden;border:2px solid #3a9a50}
        /* Squad view: vertical */
        .pitch-wrap.vertical{aspect-ratio:9/12}
        /* Live view: horizontal */
        .pitch-wrap.horizontal{aspect-ratio:16/9;min-height:180px}

        .pitch-lines{position:absolute;inset:0;pointer-events:none}

        /* Vertical lines */
        .pitch-wrap.vertical .pl-hw{top:0;bottom:0;left:50%;width:1px;height:auto;background:rgba(255,255,255,.22)}
        .pitch-wrap.vertical .pl-cc{width:22%;aspect-ratio:1;border-radius:50%;border:1px solid rgba(255,255,255,.22);left:50%;top:50%;transform:translate(-50%,-50%);background:none;position:absolute}
        .pitch-wrap.vertical .pl-pb-top{left:20%;right:20%;top:0;height:16%;border:1px solid rgba(255,255,255,.22);border-top:none;background:none;position:absolute}
        .pitch-wrap.vertical .pl-pb-bot{left:20%;right:20%;bottom:0;height:16%;border:1px solid rgba(255,255,255,.22);border-bottom:none;background:none;position:absolute}
        .pitch-wrap.vertical .pl-gb-top{left:35%;right:35%;top:0;height:6%;border:1px solid rgba(255,255,255,.22);border-top:none;background:none;position:absolute}
        .pitch-wrap.vertical .pl-gb-bot{left:35%;right:35%;bottom:0;height:6%;border:1px solid rgba(255,255,255,.22);border-bottom:none;background:none;position:absolute}

        /* Horizontal lines */
        .pitch-wrap.horizontal .pl-hw{top:0;bottom:0;left:50%;width:1px;height:auto;background:rgba(255,255,255,.22);position:absolute}
        .pitch-wrap.horizontal .pl-cc{width:18%;aspect-ratio:1;border-radius:50%;border:1px solid rgba(255,255,255,.22);left:50%;top:50%;transform:translate(-50%,-50%);background:none;position:absolute}
        .pitch-wrap.horizontal .pl-pb-top{top:15%;bottom:15%;left:0;width:16%;border:1px solid rgba(255,255,255,.22);border-left:none;background:none;position:absolute;height:auto}
        .pitch-wrap.horizontal .pl-pb-bot{top:15%;bottom:15%;right:0;width:16%;border:1px solid rgba(255,255,255,.22);border-right:none;background:none;position:absolute;height:auto}
        .pitch-wrap.horizontal .pl-gb-top{top:30%;bottom:30%;left:0;width:6%;border:1px solid rgba(255,255,255,.22);border-left:none;background:none;position:absolute;height:auto}
        .pitch-wrap.horizontal .pl-gb-bot{top:30%;bottom:30%;right:0;width:6%;border:1px solid rgba(255,255,255,.22);border-right:none;background:none;position:absolute;height:auto}

        .pdot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;z-index:2;transition:left 0.4s ease-in-out,top 0.4s ease-in-out;cursor:pointer}
        .pdot-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:800;border:2px solid rgba(255,255,255,.5);background:var(--bl);color:#fff;transition:all 0.15s;}
        .pdot-circle.home-dot{background:#1a5c96;border-color:#60b0ff}
        .pdot-circle.away-dot{background:#8b1a1a;border-color:#ff8060}
        .pdot-name{font-size:.45rem;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);white-space:nowrap;max-width:40px;overflow:hidden;text-overflow:ellipsis}
        .pdot-ovr{font-size:.5rem;color:var(--gold);font-weight:bold;text-shadow:0 1px 2px rgba(0,0,0,.8);background:#0008;padding:1px 3px;border-radius:3px}

        .match-ball{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;z-index:5;transition:left 0.5s ease,top 0.5s ease;box-shadow:0 2px 5px rgba(0,0,0,0.5);border:1px solid #ccc;transform:translate(-50%,-50%);}

        .goal-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.8rem;font-weight:900;color:#ffd700;text-shadow:0 0 20px black;z-index:20;animation:goalPop 1s ease-out forwards;pointer-events:none;}
        @keyframes goalPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(2)}}

        /* Live board */
        #live-board{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:600;display:none;flex-direction:column;overflow-y:auto}
        #live-board.show{display:flex}
        .lb-header{padding:8px 10px;text-align:center;font-weight:bold;color:var(--wh);font-size:.95rem}
        #live-board.theme-league .lb-header{background:linear-gradient(135deg,var(--gd),var(--bd));}
        #live-board.theme-cup .lb-header{background:linear-gradient(135deg,var(--orng),#c0392b);}
        #live-board.theme-acl .lb-header{background:linear-gradient(135deg,#2980b9,#2c3e50);}
        .lb-score{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 10px;flex-shrink:0}
        .lb-team{flex:1;text-align:center}
        .lb-tgoals{font-size:2.2rem;font-weight:900;color:var(--wh)}
        .event-log{padding:6px 10px;font-size:0.68rem;max-height:80px;overflow-y:auto;background:var(--sf);border-radius:6px;margin:4px 10px;}
        .event-item{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--sf2);}
        .yellow-card{color:#f0c040;font-weight:bold}.red-card{color:#e85555;font-weight:bold}

        /* Match queue status bar */
        .match-queue-bar{display:flex;gap:6px;justify-content:center;padding:6px 10px;background:var(--sf2);flex-shrink:0}
        .mq-item{padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:700;border:1px solid var(--brd);color:var(--mut)}
        .mq-item.active{border-color:var(--gg);color:var(--gg);background:rgba(61,186,130,.12)}
        .mq-item.done{border-color:var(--dim);color:var(--dim);text-decoration:line-through}
        .mq-item.pending{border-color:var(--brd);color:var(--mut)}

        #mov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:800;display:none;align-items:center;justify-content:center;padding:14px}
        #mov.show{display:flex}
        #mbox{background:var(--card);border:1px solid var(--gl);border-radius:var(--r);padding:18px;width:100%;max-width:480px;max-height:88dvh;overflow-y:auto;position:relative;}
        #toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--gl);border-radius:30px;padding:9px 18px;font-size:.78rem;font-weight:600;color:var(--wh);z-index:9999;transition:all .3s ease;opacity:0;visibility:hidden;box-shadow:var(--shd)}
        #toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible}

        /* Bench strip below live pitch */
        .bench-strip{display:flex;flex-wrap:wrap;gap:3px;padding:5px 10px;background:var(--sf);border-top:1px solid var(--brd)}
        .bench-pill{padding:3px 7px;border-radius:12px;font-size:.6rem;font-weight:700;border:1px solid var(--brd);background:var(--sf2);cursor:pointer;display:flex;align-items:center;gap:3px;color:var(--txt)}
        .bench-pill.selected-swap{border-color:var(--gold);background:rgba(240,192,64,.15);color:var(--gold)}
    </style>
</head>

<script>
// тФАтФАтФА Audio Context тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
let audioCtx = null;
function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}
function playCrowdCheer() {
    try {
        const ctx = getAudio();
        // Multi-layered crowd cheer using noise + filtering
        const duration = 2.5;
        const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.min(1, (i / (ctx.sampleRate * 0.3)));
        }
        // Fade out
        for (let i = Math.floor(data.length * 0.6); i < data.length; i++) {
            data[i] *= 1 - (i - data.length * 0.6) / (data.length * 0.4);
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        // Bandpass to make it sound like crowd
        const bp = ctx.createBiquadFilter();
        bp.type = 'bandpass'; bp.frequency.value = 800; bp.Q.value = 0.5;
        const gain = ctx.createGain();
        gain.gain.value = 0.6;
        src.connect(bp); bp.connect(gain); gain.connect(ctx.destination);
        src.start();

        // Add a "roar" tone
        const osc = ctx.createOscillator();
        const oGain = ctx.createGain();
        osc.frequency.setValueAtTime(120, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(200, ctx.currentTime + 0.3);
        oGain.gain.setValueAtTime(0.18, ctx.currentTime);
        oGain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration);
        osc.connect(oGain); oGain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + duration);
    } catch(e) {}
}
function playWhistle() {
    try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.setValueAtTime(2800, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(2600, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.25);
    } catch(e) {}
}

// тФАтФАтФА Data Constants тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
const TEAMS = ["Persija","Persib","Arema FC","Bali Utd","PSM","Borneo FC","Persebaya","Madura Utd",
    "PSIS","Dewa Utd","Barito Putera","PSS","Persik","RANS","Persita","Malut Utd"];

const FN = ["Andi","Budi","Candra","Deni","Eko","Fajar","Gilang","Hendra","Iwan","Joko","Kevin","Lukman","Novan","Rizki","Sandi","Taufik","Victor","Wahyu","Zaki","Putu"];

const POS_MAP = {

// тФАтФАтФА HORIZONTAL PITCH COORDINATES тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
// For home team (attacks LEFT тЖТ RIGHT), positions as % of horizontal pitch
// GK is on left side, strikers on right
// x = left%, y = top%

function getEffOvr(p,slotPos){
    if(!slotPos||p.pos===slotPos)return p.ovr;
    if(POS_MAP[p.pos].s.includes(slotPos))return Math.floor(p.ovr*0.9);
    return Math.floor(p.ovr*0.7);
}
function updateTable(teamIdx,gf,ga){
    const row=G.leagueTable.find(x=>x.teamIdx===teamIdx);
    if(!row)return;
    row.played++;row.gf+=gf;row.ga+=ga;row.gd=row.gf-row.ga;
    if(gf>ga){row.won++;row.pts+=3;}else if(gf===ga){row.drawn++;row.pts+=1;}else{row.lost++;}
}
function genPlayer(posReq,teamIndex,isInitial=false){
    let pos=posReq;
    if(posReq=='DEF')pos=pick(['CB','CB','LB','RB']);
    if(posReq=='MID')pos=pick(['CDM','CM','CAM','RM','LM']);
    if(posReq=='FWD')pos=pick(['ST','ST','LW','RW']);
    const ovrBase=isInitial?rnd(50,70):rnd(50,75);
    const chemBase=isInitial?rnd(30,60):rnd(50,80);
    return{id:Math.random().toString(36).slice(2,10),name:randName(),pos,mainCat:POS_MAP[pos].c,
        ovr:ovrBase,isStar:ovrBase>=80,age:rnd(17,33),energy:100,moral:80+rnd(0,20),
        contract:rnd(1,3),goals:0,appearances:0,teamIndex,inXI:false,slotPos:null,chem:chemBase};
}
function genSquad(teamIndex,isInitial=false){
    const sq=[];
    ['GK','GK','GK','DEF','DEF','DEF','DEF','DEF','DEF','DEF',
     'MID','MID','MID','MID','MID','MID','MID','FWD','FWD','FWD','FWD','FWD'].forEach(c=>sq.push(genPlayer(c,teamIndex,isInitial)));
    setDefaultXI(sq,'4-3-3');return sq;
}
function setDefaultXI(squad,tactic){
    squad.forEach(p=>{p.inXI=false;p.slotPos=null;});
    const slots=[...FORMATIONS[tactic]];
    slots.forEach(slot=>{
        let pool=squad.filter(p=>!p.inXI&&p.pos===slot).sort((a,b)=>b.ovr-a.ovr);
        if(!pool.length)pool=squad.filter(p=>!p.inXI&&POS_MAP[p.pos].s.includes(slot)).sort((a,b)=>b.ovr-a.ovr);
        if(!pool.length)pool=squad.filter(p=>!p.inXI&&p.mainCat===POS_MAP[slot].c).sort((a,b)=>b.ovr-a.ovr);
        if(!pool.length)pool=squad.filter(p=>!p.inXI).sort((a,b)=>b.ovr-a.ovr);
        if(pool.length){pool[0].inXI=true;pool[0].slotPos=slot;}
    });
}
function getPrice(ovr){
    if(ovr<60)return rnd(1,3);if(ovr<70)return rnd(4,9);if(ovr<80)return rnd(10,25);return rnd(26,48);
}
function genMarket(){
    const ps=[];
    for(let i=0;i<150;i++){
        const cat=pick(['GK','DEF','MID','FWD']);const p=genPlayer(cat,-1,false);
        const r=Math.random();
        if(r<0.7)p.ovr=rnd(45,65);else if(r<0.9)p.ovr=rnd(66,75);else p.ovr=rnd(76,85);
        p.isStar=p.ovr>=80;p.price=getPrice(p.ovr);ps.push(p);
    }
    return ps.sort((a,b)=>b.ovr-a.ovr);
}

function calcTeamChemistry(teamIdx,tactic){
    const squad=G.squads[teamIdx];if(!squad)return 50;
    const xi=squad.filter(p=>p.inXI);if(xi.length<11)return 40;
    const avgChem=xi.reduce((s,p)=>s+p.chem,0)/xi.length;
    let posBonus=0;
    const slots=FORMATIONS[tactic||G.tactics[teamIdx]||'4-3-3'];
    const slotCounts={};slots.forEach(s=>slotCounts[s]=(slotCounts[s]||0)+1);
    Object.entries(slotCounts).forEach(([pos,need])=>{
        const have=xi.filter(p=>p.pos===pos).length;
        if(have===need)posBonus+=8;else posBonus-=Math.abs(have-need)*4;
    });
    return clamp(avgChem+posBonus,0,100);
}
function teamStrength(teamIdx,tactic){
    if(typeof teamIdx==='string')return G.acl.teams[teamIdx].ovr+rnd(-5,5);
    if(teamIdx>=16)return 65+rnd(-5,5);
    const squad=G.squads[teamIdx];const xi=squad.filter(p=>p.inXI);
    if(xi.length<11)return 60;
    const effOvrSum=xi.reduce((s,p)=>s+getEffOvr(p,p.slotPos),0);
    let str=effOvrSum/11;
    str+=xi.reduce((s,p)=>s+p.moral,0)/11*0.05;
    const avgEn=xi.reduce((s,p)=>s+p.energy,0)/11;
    if(avgEn>80)str+=2;else if(avgEn<40)str-=4;
    str+=calcTeamChemistry(teamIdx,tactic)*0.08;
    return str;
}
function simulateMatch(hIdx,aIdx){
    const ht=typeof hIdx==='number'&&hIdx<16?(G.tactics[hIdx]||'4-3-3'):'4-3-3';
    const at=typeof aIdx==='number'&&aIdx<16?(G.tactics[aIdx]||'4-3-3'):'4-3-3';
    const hStr=teamStrength(hIdx,ht);const aStr=teamStrength(aIdx,at);
    const diff=(hStr)-(aStr)+2+rnd(-4,4);
    let h,a;
    if(diff>8){h=rnd(2,4);a=rnd(0,1);}else if(diff>4){h=rnd(1,3);a=rnd(0,1);}
    else if(diff>1){h=rnd(0,2);a=rnd(0,2);}else if(diff>-4){h=rnd(0,2);a=rnd(0,2);}
    else if(diff>-8){h=rnd(0,1);a=rnd(1,3);}else{h=rnd(0,1);a=rnd(2,4);}
    return{home:h,away:a,events:generateEvents(hIdx,aIdx,h,a)};
}
function generateEvents(hIdx,aIdx,hGoals,aGoals){
    const evs=[];
    const addGoals=(team,count,idx)=>{
        for(let i=0;i<count;i++){
            let scorer='?';
            if(typeof idx==='number'&&idx<16){
                const fwds=G.squads[idx].filter(p=>p.inXI&&['ST','LW','RW','CAM','LM','RM'].includes(p.slotPos));
                if(fwds.length)scorer=pick(fwds).name;
            }else scorer="Star Player";
            evs.push({type:'goal',min:rnd(5,89),team,player:scorer});
        }
    };
    addGoals('home',hGoals,hIdx);addGoals('away',aGoals,aIdx);
    const totalCards=rnd(1,4);
    for(let i=0;i<totalCards;i++){
        const team=Math.random()<0.5?'home':'away';
        const idx=team==='home'?hIdx:aIdx;
        let playerName='?';
        if(typeof idx==='number'&&idx<16&&G.squads[idx]){
            const pool=G.squads[idx].filter(p=>p.inXI);
            if(pool.length)playerName=pick(pool).name;
        }
        const isRed=Math.random()<0.1;
        evs.push({type:'card',min:rnd(5,89),team,player:playerName,card:isRed?'red':'yellow'});
    }
    return evs.sort((a,b)=>a.min-b.min);
}

function buildACL(){
    const acl={teams:{},groups:{},standings:{},schedule:[],knockout:{},played:{}};
    let tCounter=0;
    const getFTeam=(name,baseOvr)=>{const id='F'+(tCounter++);acl.teams[id]={id,name,ovr:baseOvr+rnd(-2,4)};return id;};
    const west=[...ASIAN_LEAGUES['Saudi Pro']].sort(()=>Math.random()-0.5);
    const east1=[...ASIAN_LEAGUES['J-League']].sort(()=>Math.random()-0.5);
    const east2=[...ASIAN_LEAGUES['K-League']].sort(()=>Math.random()-0.5);
    for(let g=0;g<4;g++){
        const grp=['A','B','C','D'][g];
        acl.groups[grp]=[getFTeam(west.pop(),80),getFTeam(west.pop(),78),getFTeam(west.pop(),75),getFTeam(west.pop(),72)];
    }
    const indo=[...G.lcaTeamIndices];
    for(let g=0;g<4;g++){
        const grp=['E','F','G','H'][g];
        acl.groups[grp]=[indo.pop(),getFTeam(east1.pop(),77),getFTeam(east2.pop(),76),getFTeam(east1.pop(),74)];
    }
    Object.values(acl.groups).flat().forEach(tId=>{acl.standings[tId]={id:tId,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
    acl.schedule=[[[[0,1],[2,3]]],[[[0,2],[1,3]]],[[[0,3],[1,2]]],[[[1,0],[3,2]]],[[[2,0],[3,1]]],[[[3,0],[2,1]]]].map(x=>x[0]);
    return acl;
}
function simulateACLGroups(){
    const matchday=LCA_GROUP_WEEKS.indexOf(G.week);
    if(matchday<0||matchday>=6)return[];
    const results=[];const pairs=G.acl.schedule[matchday];
    Object.values(G.acl.groups).forEach(grpTeams=>{
        pairs.forEach(pair=>{
            const h=grpTeams[pair[0]],a=grpTeams[pair[1]];
            const score=simulateMatch(h,a);
            updateACLTable(h,score.home,score.away);updateACLTable(a,score.away,score.home);
            const res={homeIdx:h,awayIdx:a,homeScore:score.home,awayScore:score.away,events:score.events};
            if(h===G.playerTeamIdx||a===G.playerTeamIdx)results.push(res);
        });
    });
    if(matchday===5){
        const getTop2=(g)=>G.acl.groups[g].map(id=>G.acl.standings[id]).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)).slice(0,2).map(x=>x.id);
        const wA=getTop2('A'),wB=getTop2('B'),wC=getTop2('C'),wD=getTop2('D');
        const wE=getTop2('E'),wF=getTop2('F'),wG=getTop2('G'),wH=getTop2('H');
        G.acl.knockout["Round of 16"]=[
            [wA[0],wB[1]],[wB[0],wA[1]],[wC[0],wD[1]],[wD[0],wC[1]],
            [wE[0],wF[1]],[wF[0],wE[1]],[wG[0],wH[1]],[wH[0],wG[1]]
        ];
    }
    return results;
}

// Now builds weekPendingMatches but only simulates League immediately.
// Cup & ACL are played separately when user clicks "Play Cup/ACL".
function playLeagueWeek(){
    if(!G.acl)G.acl=buildACL();
    if(G.phase==='preseason'){
        G.preseasonWeeksLeft--;G.currentDate=addDays(G.currentDate,7);
        if(G.preseasonWeeksLeft<=0){G.phase='league';G.log.unshift({cls:'info',text:'ЁЯПБ Liga dimulai!'});}
        else G.log.unshift({cls:'info',text:`тП│ Pra-musim: ${G.preseasonWeeksLeft} minggu lagi!`});
        saveState();renderAll();showToast('Lanjut 1 minggu!');return;
    }
    if(G.week>=SEASON_WEEKS){showEndSeason();return;}
    G.week++;
    const baseDate=addDays(G.startDate,14+(G.week-1)*7);
    weekPendingMatches=[];weekPendingIndex=0;

    // 1. LIGA (Sabtu - day 0 of week)
    const leagueMatches=G.schedule[G.week-1];
    const myLeagueMatch=_simulateLeagueWeek(leagueMatches,baseDate);
    if(myLeagueMatch){
        weekPendingMatches.push({compType:'league',label:'тЪ╜ Liga',dateStr:baseDate,myMatch:myLeagueMatch});
    }

    // 2. CUP (Rabu - day +4) тАФ store pending, simulate later
    const cupRound=Object.keys(CUP_ROUND_WEEKS).find(k=>CUP_ROUND_WEEKS[k]===G.week);
    if(cupRound&&!G.cupRoundsPlayed[cupRound]){
        weekPendingMatches.push({compType:'cup',label:`ЁЯПЖ Cup: ${cupRound}`,dateStr:addDays(baseDate,4),_cupRound:cupRound});
    }

    // 3. ACL Group (Selasa - day +2)
    if(LCA_GROUP_WEEKS.includes(G.week)){
        weekPendingMatches.push({compType:'acl',label:'ЁЯМП ACL Grup',dateStr:addDays(baseDate,2),_aclGroup:true});
    }

    // 4. ACL Knockout (Kamis - day +5)
    const lcaKnock=Object.keys(LCA_KNOCKOUT_WEEKS).find(k=>LCA_KNOCKOUT_WEEKS[k]===G.week);
    if(lcaKnock){
        weekPendingMatches.push({compType:'acl',label:`ЁЯМП ACL: ${lcaKnock}`,dateStr:addDays(baseDate,5),_aclKnock:lcaKnock});
    }

    G.currentDate=addDays(baseDate,6);
    saveState();

    if(weekPendingMatches.length===0){renderAll();showToast("Tidak ada pertandingan minggu ini.");return;}
    // Start with first match
    playNextPendingMatch();
}

function _simulateLeagueWeek(leagueMatches,baseDate){
    let myMatch=null;
    leagueMatches.forEach(([h,a])=>{
        const score=simulateMatch(h,a);
        updateTable(h,score.home,score.away);updateTable(a,score.away,score.home);
        const r={week:G.week,homeIdx:h,awayIdx:a,homeScore:score.home,awayScore:score.away,events:score.events};
        G.leagueResults.push(r);
        const hT=G.squads[h],aT=G.squads[a];
        hT.forEach(p=>{p.energy=clamp(p.energy-rnd(10,15),0,100);if(score.home>score.away)p.moral=clamp(p.moral+5,0,100);});
        aT.forEach(p=>{p.energy=clamp(p.energy-rnd(10,15),0,100);if(score.away>score.home)p.moral=clamp(p.moral+5,0,100);});
        hT.filter(p=>p.inXI).forEach(p=>p.appearances++);
        aT.filter(p=>p.inXI).forEach(p=>p.appearances++);
        if(h===G.playerTeamIdx||a===G.playerTeamIdx){
            const isH=h===G.playerTeamIdx;
            const my=isH?score.home:score.away,op=isH?score.away:score.home;
            G.log.unshift({cls:my>op?'win':my<op?'loss':'draw',text:`W${G.week}: ${TEAMS[G.playerTeamIdx]} ${my}тАУ${op} ${TEAMS[isH?a:h]}`});
            if(h===G.playerTeamIdx||a===G.playerTeamIdx)myMatch=r;
        }
    });
    G.leagueTable.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));
    return myMatch;
}

function playNextPendingMatch(){
    if(weekPendingIndex>=weekPendingMatches.length){
        // All done
        renderAll();showToast("Semua pertandingan minggu ini selesai!");return;
    }
    const item=weekPendingMatches[weekPendingIndex];

    // Simulate the match data if not yet done
    if(item._cupRound){
        // Simulate cup
        const cupRound=item._cupRound;
        const next={"Round of 16":"Quarter Final","Quarter Final":"Semi Final","Semi Final":"Final"}[cupRound];
        const res=playKnockout(G.cupBracket,G.cupResults,G.cupRoundsPlayed,cupRound,next);
        if(!next&&res.length)G.cupWinner=res[0].winner;
        const myMatch=res.find(m=>m.homeIdx===G.playerTeamIdx||m.awayIdx===G.playerTeamIdx);
        item.myMatch=myMatch||null;
        delete item._cupRound;
        saveState();
    }
    if(item._aclGroup){
        const aclRes=simulateACLGroups();
        item.myMatch=aclRes.length?aclRes[0]:null;
        delete item._aclGroup;
        saveState();
    }
    if(item._aclKnock){
        const lcaKnock=item._aclKnock;
        const nextR={"Round of 16":"Quarter Final","Quarter Final":"Semi Final","Semi Final":"Final"}[lcaKnock];
        const aclRes=playKnockout(G.acl.knockout,G.acl.knockout,G.acl.played,lcaKnock,nextR);
        if(!nextR&&aclRes.length)G.acl.winner=aclRes[0].winner;
        const myAcl=aclRes.find(r=>r.homeIdx===G.playerTeamIdx||r.awayIdx===G.playerTeamIdx);
        item.myMatch=myAcl||null;
        delete item._aclKnock;
        saveState();
    }

    if(!item.myMatch){
        // Skip тАУ no match for player's team, continue
        weekPendingIndex++;
        renderAll(); // Update dash with new action buttons
        showToast(`${item.label} тАФ Tidak ada pertandingan untuk timmu.`);
        return;
    }

    // Start live board
    liveMatchState.min=0;liveMatchState.myMatch=item.myMatch;
    liveMatchState.compType=item.compType;liveMatchState.label=item.label;
    liveMatchState.dateStr=item.dateStr;liveMatchState.subsLeft=5;liveMatchState.isPaused=false;

    const lb=document.getElementById('live-board');
    lb.className=`show theme-${item.compType}`;
    clearInterval(liveInterval);
    renderLiveBoardFull();
    liveInterval=setInterval(()=>{
        if(liveMatchState.isPaused)return;
        liveMatchState.min=Math.min(liveMatchState.min+rnd(3,8),90);
        updateLiveBoardDynamic();
        if(liveMatchState.min>=90){
            clearInterval(liveInterval);
            playWhistle();
            setTimeout(()=>renderLiveBoardFull(),400);
        }
    },600);
}

function continueToNext(){
    weekPendingIndex++;
    document.getElementById('live-board').classList.remove('show','theme-league','theme-cup','theme-acl');
    playNextPendingMatch();
}

function skipMatch(){
    if(liveInterval){clearInterval(liveInterval);liveInterval=null;}
    liveMatchState.min=90;
    playWhistle();
    renderLiveBoardFull();
}

function playKnockout(bracketObj,resObj,playedTracker,roundName,nextRoundName){
    if(!bracketObj[roundName]||playedTracker[roundName])return[];
    const results=[];const winners=[];
    bracketObj[roundName].forEach(m=>{
        const h=m[0],a=m[1];const score=simulateMatch(h,a);
        let win=h;
        if(score.away>score.home||(score.away===score.home&&Math.random()>0.5))win=a;
        results.push({homeIdx:h,awayIdx:a,homeScore:score.home,awayScore:score.away,winner:win,events:score.events});
        winners.push(win);
    });
    resObj[roundName]=results;playedTracker[roundName]=true;
    if(nextRoundName){
        const nextPairs=[];
        for(let i=0;i<winners.length;i+=2)nextPairs.push([winners[i],winners[i+1]]);
        bracketObj[nextRoundName]=nextPairs;
    }
    return results;
}

        </div>

// тФАтФАтФА HORIZONTAL PITCH RENDERER тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function renderHorizontalPitch(homeSq, homeTac, awaySq, awayTac, homeIsPlayer){
    const hSlots = FORMATIONS[homeTac || '4-3-3'];
    const aSlots = FORMATIONS[awayTac || '4-3-3'];
    const hCoords = H_POS[homeTac] || H_POS['4-3-3'];
    const aCoords = H_POS[awayTac] || H_POS['4-3-3'];

    let dots = '';
    // Home team dots (left side, attacking right)
    let placedH = new Set();
    hSlots.forEach((slot, i) => {
        const p = homeSq.find(x => x.inXI && x.slotPos === slot && !placedH.has(x.id));
        const bx = hCoords.x[i], by = hCoords.y[i];
        if(p){ placedH.add(p.id);
            const eff=getEffOvr(p,slot);
            const isSel=swapIdA===p.id;
            const isPlayerTeam=homeIsPlayer;
            dots+=`<div class="pdot pdot-live ${isSel?'selected-swap':''}" data-bx="${bx}" data-by="${by}" style="left:${bx}%;top:${by}%;" onclick="handleSwapClick('${p.id}',true)">
              <div class="pdot-circle home-dot${isSel?' selected-swap':''}">${eff}</div>
              <div class="pdot-name">${p.name.split(' ')[0]}${p.isStar?'тнР':''}</div>
              <div class="pdot-ovr">${slot}</div>
            </div>`;
        }
    });
    // Away team dots (right side, attacking left) тАФ mirror coordinates
    let placedA = new Set();
    aSlots.forEach((slot, i) => {
        const p = awaySq.find && awaySq.find(x => x.inXI && x.slotPos === slot && !placedA.has(x.id));
        const raw_bx = aCoords.x[i], raw_by = aCoords.y[i];
        const bx = 100 - raw_bx, by = 100 - raw_by; // mirror
        if(p){ placedA.add(p.id);
            const eff=getEffOvr(p,slot);
            dots+=`<div class="pdot pdot-live" data-bx="${bx}" data-by="${by}" style="left:${bx}%;top:${by}%;">
              <div class="pdot-circle away-dot">${eff}</div>
              <div class="pdot-name">${p.name.split(' ')[0]}${p.isStar?'тнР':''}</div>
              <div class="pdot-ovr">${slot}</div>
            </div>`;
        } else if(!awaySq.find){
            // External team (no squad data)
            dots+=`<div class="pdot" style="left:${bx}%;top:${by}%;"><div class="pdot-circle away-dot" style="font-size:.45rem">?</div><div class="pdot-ovr">${slot}</div></div>`;
        }
    });

    // Bench strip (player's XI bench only)
    const bench = homeIsPlayer ? homeSq.filter(p=>!p.inXI) : awaySq.filter ? awaySq.filter(p=>!p.inXI) : [];
    const benchHtml = bench.length ? `<div class="bench-strip">
      <span style="font-size:.6rem;color:var(--dim);align-self:center;margin-right:4px">ЁЯкС</span>
      ${bench.map(p=>`<div class="bench-pill ${swapIdA===p.id?'selected-swap':''}" onclick="handleSwapClick('${p.id}',true)">
        <span style="color:var(--gold)">${p.pos}</span>${p.name.split(' ')[0]}
        <span class="${ovrCls(p.ovr)}">${p.ovr}</span>
      </div>`).join('')}
    </div>` : '';

    return `
    <div style="padding:0 8px">
      <div class="pitch-wrap horizontal" id="live-pitch-wrap">
        <div class="pitch-lines">
          <div class="pl-hw"></div><div class="pl-cc"></div>
          <div class="pl-pb-top"></div><div class="pl-pb-bot"></div>
          <div class="pl-gb-top"></div><div class="pl-gb-bot"></div>
        </div>
        <div id="live-ball" class="match-ball" style="left:50%;top:50%"></div>
        ${dots}
      </div>
    </div>
    ${benchHtml}`;
}

function updateLiveBoardDynamic(){
    const st=liveMatchState;const my=st.myMatch;
    const minDisplay=document.getElementById('lb-min-display');
    if(minDisplay)minDisplay.innerHTML=st.min>=90?'FT тАФ SELESAI':`LIVE тАФ MENIT ${st.min}'`;
    if(my){
        const myEvs=my.events.filter(e=>e.min<=st.min);
        const hScore=st.min>=90?my.homeScore:myEvs.filter(e=>e.team==='home'&&e.type==='goal').length;
        const aScore=st.min>=90?my.awayScore:myEvs.filter(e=>e.team==='away'&&e.type==='goal').length;
        const hEl=document.getElementById('lb-h-score');const aEl=document.getElementById('lb-a-score');
        if(hEl)hEl.innerText=hScore;if(aEl)aEl.innerText=aScore;

        const logEl=document.getElementById('event-log');
        if(logEl){
            logEl.innerHTML=myEvs.sort((a,b)=>a.min-b.min).map(e=>{
                if(e.type==='goal')return`<div class="event-item"><span>тЪ╜ ${e.min}' ${e.player}</span><span>${e.team==='home'?'ЁЯПа':'тЬИя╕П'}</span></div>`;
                if(e.type==='card')return`<div class="event-item"><span class="${e.card==='red'?'red-card':'yellow-card'}">${e.card==='red'?'ЁЯЯе':'ЁЯЯи'} ${e.min}' ${e.player}</span><span>${e.team==='home'?'ЁЯПа':'тЬИя╕П'}</span></div>`;
                return'';
            }).join('');
        }

        if(st.min<90&&!st.isPaused){
            // Animate player dots
            document.querySelectorAll('.pdot-live').forEach(dot=>{
                const bx=parseFloat(dot.dataset.bx),by=parseFloat(dot.dataset.by);
                dot.style.left=`${bx+rnd(-3,3)}%`;dot.style.top=`${by+rnd(-3,3)}%`;
            });
            // Ball moves toward current action area
            const ball=document.getElementById('live-ball');
            if(ball){ball.style.left=`${rnd(20,80)}%`;ball.style.top=`${rnd(20,80)}%`;}
        }

        // Goal flash + crowd sound
        const lastGoalEvent=myEvs.filter(e=>e.type==='goal').slice(-1)[0];
        if(lastGoalEvent&&lastGoalEvent.min===st.min&&st.min>0){
            const pitch=document.getElementById('live-pitch-wrap');
            if(pitch&&!document.getElementById('goal-flash')){
                const flash=document.createElement('div');
                flash.className='goal-flash';flash.id='goal-flash';flash.textContent='тЪ╜ GOAL!';
                pitch.appendChild(flash);
                playCrowdCheer();
                setTimeout(()=>{if(flash)flash.remove();},1200);
            }
        }
    }
}

function renderSquadPitchVertical(squad,tactic,mode){
    const slots=FORMATIONS[tactic];
    const yMap={'4-3-3':[90,72,72,72,72,50,50,50,20,20,20],'4-4-2':[90,72,72,72,72,50,50,50,50,20,20],'4-2-3-1':[90,75,75,75,75,58,58,40,40,40,20],'3-5-2':[90,75,75,75,55,55,55,55,55,20,20],'5-3-2':[90,72,72,72,72,72,50,50,50,20,20]}[tactic];
    const xMap={'4-3-3':[50,85,65,35,15,80,50,20,80,50,20],'4-4-2':[50,85,65,35,15,85,60,40,15,60,40],'4-2-3-1':[50,85,65,35,15,65,35,80,50,20,50],'3-5-2':[50,75,50,25,90,70,50,30,10,60,40],'5-3-2':[50,90,70,50,30,10,80,50,20,60,40]}[tactic];
    let placedIds=new Set();
    const isLiveSub=mode==='sub';
    let dots=slots.map((slotName,i)=>{
        const p=squad.find(x=>x.inXI&&x.slotPos===slotName&&!placedIds.has(x.id));
        if(p){
            placedIds.add(p.id);const isSel=swapIdA===p.id;const eff=getEffOvr(p,slotName);
            return`<div class="pdot ${isSel?'selected-swap':''}" data-bx="${xMap[i]}" data-by="${yMap[i]}" style="left:${xMap[i]}%;top:${yMap[i]}%;" onclick="handleSwapClick('${p.id}',${isLiveSub})">
              <div class="pdot-circle home-dot ${isSel?'selected-swap':''}">${eff}</div>
              <div class="pdot-name">${p.name.split(' ')[0]}${p.isStar?'тнР':''}</div>
              <div class="pdot-ovr" style="${eff<p.ovr?'color:var(--red)':''}">${slotName}</div>
            </div>`;
        }else{
            return`<div class="pdot" style="left:${xMap[i]}%;top:${yMap[i]}%;opacity:0.5"><div class="pdot-circle" style="background:#555;border-color:#777">-</div><div class="pdot-ovr">${slotName}</div></div>`;
        }
    }).join('');
    const bench=squad.filter(p=>!p.inXI);
    return`

      <div class="pitch-lines"><div class="pl pl-hw"></div><div class="pl pl-cc"></div><div class="pl pl-pb-top"></div><div class="pl pl-pb-bot"></div><div class="pl pl-gb-top"></div><div class="pl pl-gb-bot"></div></div>

function renderSchedule(){
    let html=`<div class="sec">ЁЯЧУя╕П Jadwal Musim</div>`;
    const lgStarts=new Date(G.startDate);lgStarts.setDate(lgStarts.getDate()+14);
    for(let w=1;w<=30;w++){
        const d=new Date(lgStarts);d.setDate(d.getDate()+w*7);
        const dateStr=formatDate(d);const isCurr=w===G.week;
        let myLgMatch=G.leagueResults.find(m=>m.week===w&&(m.homeIdx===G.playerTeamIdx||m.awayIdx===G.playerTeamIdx));
        let scStr='vs';let opName='?';
        if(!myLgMatch){const sch=G.schedule[w-1]?.find(m=>m[0]===G.playerTeamIdx||m[1]===G.playerTeamIdx);if(sch)opName=TEAMS[sch[0]==G.playerTeamIdx?sch[1]:sch[0]];}
        else{scStr=`${myLgMatch.homeScore} - ${myLgMatch.awayScore}`;opName=TEAMS[myLgMatch.homeIdx===G.playerTeamIdx?myLgMatch.awayIdx:myLgMatch.homeIdx];}
        html+=`<div class="card" style="${isCurr?'border-color:var(--gg)':''}">
          <div class="row bt" style="font-size:.65rem;color:var(--dim);margin-bottom:4px"><span>Minggu ${w} &bull; ${dateStr}</span>${isCurr?'<span style="color:var(--gg);font-weight:bold">MINGGU INI</span>':''}</div>
          <div class="row bt" style="font-weight:bold;font-size:.8rem"><span><span style="color:var(--gold);margin-right:5px">LIG</span> ${opName}</span><span style="background:var(--sf);padding:2px 6px;border-radius:4px">${scStr}</span></div>`;
        const cupR=Object.keys(CUP_ROUND_WEEKS).find(k=>CUP_ROUND_WEEKS[k]===w);
        if(cupR){
            let cRes=G.cupResults[cupR]?.find(m=>m.homeIdx===G.playerTeamIdx||m.awayIdx===G.playerTeamIdx);
            let cSc=cRes?`${cRes.homeScore} - ${cRes.awayScore}`:'vs';
            let cOp=cRes?getTeamName(cRes.homeIdx===G.playerTeamIdx?cRes.awayIdx:cRes.homeIdx):'TBD';
            html+=`<div class="row bt" style="font-weight:bold;font-size:.8rem;margin-top:6px;border-top:1px solid var(--sf2);padding-top:6px"><span><span style="color:var(--orng);margin-right:5px">CUP</span> [${cupR}] ${cOp}</span><span style="background:var(--sf);padding:2px 6px;border-radius:4px">${cSc}</span></div>`;
        }
        html+=`</div>`;
    }
    document.getElementById('main').innerHTML=html;
}

function buyPlayer(id){
    const idx=G.transferMarket.findIndex(p=>p.id===id);if(idx<0)return;
    const p=G.transferMarket[idx];if(G.budget<p.price){showToast('тЭМ Budget kurang!');return;}
    G.budget-=p.price;p.teamIndex=G.playerTeamIdx;G.squads[G.playerTeamIdx].push(p);G.transferMarket.splice(idx,1);
    saveState();showToast(`тЬЕ ${p.name} berhasil direkrut!`);renderAll();
}
function sellPlayer(id){
    const sq=G.squads[G.playerTeamIdx];const idx=sq.findIndex(p=>p.id===id);if(idx<0)return;
    const p=sq[idx];
    if(p.inXI){showToast('тЭМ Keluarkan dari XI dulu!');return;}
    if(sq.length<=16){showToast('тЭМ Minimum skuad 16 pemain!');return;}
    const sp=Math.max(1,getPrice(p.ovr)-rnd(0,1));G.budget+=sp;sq.splice(idx,1);
    saveState();showToast(`тЬЕ ${p.name} dijual ${fmt(sp)}!`);renderAll();
}

function acceptJob(newTeamIdx,msgIdx){
    if(confirm(`Yakin meninggalkan ${TEAMS[G.playerTeamIdx]} untuk ${TEAMS[newTeamIdx]}?`)){
        G.playerTeamIdx=newTeamIdx;G.budget=Math.min(50,BASE_BUDGETS[newTeamIdx]);G.inbox.splice(msgIdx,1);
        G.log.unshift({cls:'info',text:`ЁЯСФ Manajer bergabung dengan ${TEAMS[newTeamIdx]}!`});
        saveState();renderAll();showToast(`Selamat datang di ${TEAMS[newTeamIdx]}!`);
    }
}
function showEndSeason(){
    const row=G.leagueTable.find(x=>x.teamIdx===G.playerTeamIdx);const pos=G.leagueTable.indexOf(row)+1;
    let reward=5;
    if(pos===1)reward=40;else if(pos===2)reward=30;else if(pos===3)reward=20;else if(pos<=5)reward=10;
    if(G.cupWinner===G.playerTeamIdx)reward+=15;if(G.acl&&G.acl.winner===G.playerTeamIdx)reward+=50;
    document.getElementById('mtitle').innerHTML=``;
    document.getElementById('mbody').innerHTML=`<div style="text-align:center"><h1 style="font-size:3rem;margin:0">ЁЯПЖ</h1><h2 style="color:var(--gold)">Musim ${G.season} Selesai!</h2><p style="font-size:.8rem;color:var(--txt)">Juara Liga: <b>${G.leagueTable[0].name}</b></p><div style="background:var(--sf2);padding:10px;border-radius:8px;margin:15px 0"><div style="font-size:.75rem;color:var(--dim)">Timmu (${TEAMS[G.playerTeamIdx]}):</div><div style="font-size:1.2rem;font-weight:bold;color:var(--wh)">Posisi Akhir: #${pos}</div><div style="font-size:.9rem;color:var(--gg);margin-top:5px">Hadiah: + ${fmt(reward)}</div></div></div>`;
    document.getElementById('mfoot').innerHTML=`<button class="btn btn-p btn-blk" onclick="startNewSeason(${reward},${pos})">Mulai Musim Berikutnya тЮФ</button>`;
    document.getElementById('mov').classList.add('show');
}
function startNewSeason(reward,finalPos){
    G.budget=Math.min(50,G.budget+reward);G.season++;G.week=0;G.phase='preseason';G.preseasonWeeksLeft=2;
    weekPendingMatches=[];weekPendingIndex=0;
    G.leagueTable=TEAMS.map((name,i)=>({teamIdx:i,name,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0}));
    G.leagueResults=[];G.schedule=buildSchedule();G.lcaTeamIndices=G.leagueTable.slice(0,4).map(x=>x.teamIdx);
    G.acl=null;
    G.cupBracket={"Round of 16":[...Array(16).keys()].sort(()=>Math.random()-.5).reduce((res,k,i,arr)=>i%2===0?[...res,[arr[i],arr[i+1]==15?99:arr[i+1]]]:res,[])};
    G.cupResults={};G.cupRoundsPlayed={};G.cupWinner=null;
    G.squads.forEach((sq,ti)=>{
        sq.forEach(p=>{p.energy=100;p.moral=85;p.contract--;p.age++;
            let gro=0;if(p.age<24)gro=rnd(0,2);else if(p.age>30)gro=rnd(-3,-1);else gro=rnd(-1,1);
            if(p.appearances>15)gro+=1;if(p.goals>10)gro+=1;
            p.ovr=clamp(p.ovr+gro,40,95);p.isStar=p.ovr>=80;p.goals=0;p.appearances=0;
        });
        const expired=sq.filter(p=>p.contract<=0);
        expired.forEach(p=>{const idx=sq.indexOf(p);sq[idx]=genPlayer(POS_MAP[p.pos].c,ti,false);});
        setDefaultXI(sq,G.tactics[ti]);
    });
    G.transferMarket=genMarket();
    G.log=[{cls:'info',text:`ЁЯМЯ Musim ${G.season} dimulai! Hadiah telah ditambahkan.`}];
    if(finalPos<=5||Math.random()>0.6){
        let target=rnd(0,15);while(target===G.playerTeamIdx)target=rnd(0,15);
        G.inbox.unshift({id:Math.random(),title:'Tawaran Kerja',body:`Dewan ${TEAMS[target]} terkesan dengan penampilanmu. Mereka ingin kamu jadi manajer!`,action:true,targetTeamIdx:target});
    }
    saveState();closeModal();renderAll();showToast("Musim Baru Dimulai!");
}

function selectTeamPrompt(){
    let html=`<div style="margin-bottom:15px"><div class="sec">1. Nama Manajer</div><input type="text" id="mgrNameInp" class="input-text" placeholder="Masukkan Nama..." value="Manager"></div><div class="sec">2. Pilih Klubmu</div><div style="display:flex;flex-direction:column;gap:5px;max-height:45vh;overflow-y:auto;padding-right:5px">`;
    TEAMS.forEach((name,i)=>{
        const bgt=Math.min(50,BASE_BUDGETS[i]+rnd(-5,5));const sq=G.squads[i];
        const effOvr=Math.round(sq.filter(p=>p.inXI).reduce((s,p)=>s+getEffOvr(p,p.slotPos),0)/11)||0;
        html+=`<button class="btn btn-s" style="justify-content:space-between;padding:10px 12px;display:flex;align-items:center;" onclick="applyTeam(${i},${bgt})"><div style="text-align:left;flex:1"><div style="font-weight:700;font-size:.9rem">${i+1}. ${name}</div><div style="font-size:.65rem;color:var(--wh);margin-top:4px">OVR: <b style="color:var(--gg)">${effOvr}</b></div></div><div style="text-align:right"><div style="font-size:.65rem;color:var(--dim)">Anggaran</div><div style="font-size:.9rem;font-weight:900;color:var(--gold)">${bgt} M</div></div></button>`;
    });
    html+=`</div>`;
    document.getElementById('mtitle').innerHTML=`<h2 style="color:var(--gold);margin:0">тЪ╜ Mulai Karier</h2>`;
    document.getElementById('mbody').innerHTML=html;document.getElementById('mfoot').innerHTML='';
    document.getElementById('mov').classList.add('show');
}
function applyTeam(idx,budget){
    const mName=document.getElementById('mgrNameInp').value.trim()||'Manager';
    G.managerName=mName;G.playerTeamIdx=idx;G.budget=budget;
    G.tactics[idx]='4-3-3';setDefaultXI(G.squads[idx],'4-3-3');
    saveState();closeModal();renderAll();showToast(`Selamat datang di ${TEAMS[idx]}, ${mName}!`);
}
function closeModal(){document.getElementById('mov').classList.remove('show');}

let activeTab='dash';
const RENDERERS={dash:renderDash,squad:renderSquad,league:renderLeague,schedule:renderSchedule,cup:renderCup,lca:renderLCA,transfer:renderTransfer,manager:renderManager};
function renderTab(tab){
    try{
        const movEl=document.getElementById('mov');
        if(movEl.classList.contains('show')&&document.getElementById('mtitle').innerHTML.includes('Mulai Karier'))return;
        if(movEl.classList.contains('show')&&document.getElementById('mbody').innerHTML.includes('Musim')&&document.getElementById('mbody').innerHTML.includes('Selesai'))return;
        activeTab=tab;
        document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
        if(RENDERERS[tab])RENDERERS[tab]();
    }catch(e){console.error("Tab Error",e);}
}
function renderAll(){updateHeader();renderTab(activeTab);}
function switchTab(tab){swapIdA=null;renderTab(tab);document.getElementById('main').scrollTop=0;}
document.querySelectorAll('.tb').forEach(btn=>{btn.addEventListener('click',()=>switchTab(btn.dataset.tab));});

function init(){
    if(!loadState()){G=freshState();selectTeamPrompt();}
    else{weekPendingMatches=[];weekPendingIndex=0;updateHeader();renderTab('dash');}
}
init();
</script>
</body>
</html>
