    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --gd:#0d3b2e;--gm:#1a5c44;--gl:#2d8c63;--gg:#3dba82;
            --bd:#0a1f3c;--bm:#1a3a6b;--bl:#2d6abf;--bg2:#4a9eff;
            --gold:#f0c040;--red:#e85555;--orng:#e67e22;
            --bg:#0a1812;--sf:#0f2418;--sf2:#172e20;--card:#1c3828;--brd:#2a5040;
            --txt:#d4eadc;--dim:#7aab8a;--mut:#4a7a5a;--wh:#f0f8f2;
            --shd:0 4px 20px rgba(0,0,0,.5);--r:10px;--rs:6px;
        }
        html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Segoe UI',sans-serif;font-size:14px;overflow-x:hidden;overscroll-behavior:none;}
        #app{display:flex;flex-direction:column;height:100dvh;max-width:540px;margin:0 auto;position:relative;background:var(--bg)}
        @media(min-width:541px){#app{border-left:1px solid var(--brd);border-right:1px solid var(--brd)}}
        #hdr{background:linear-gradient(135deg,var(--gd),var(--bd));border-bottom:2px solid var(--gl);padding:8px 14px 6px;position:sticky;top:0;z-index:100}
        #hdr h1{font-size:.9rem;font-weight:800;color:var(--gg);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
        #hdr-meta{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap;}
        .badge{background:var(--sf2);border:1px solid var(--brd);border-radius:20px;padding:2px 10px;font-size:.72rem;color:var(--dim)}
        .badge.hi{border-color:var(--gl);color:var(--gg)}.badge.gld{border-color:var(--gold);color:var(--gold)}
        .badge.wthr{border-color:var(--bg2);color:var(--bg2)}
        #bgt{margin-left:auto}
        #tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--brd);overflow-x:auto;scrollbar-width:none;flex-shrink:0;position:relative;}
        #tabs::-webkit-scrollbar{display:none}
        .tb{flex:1;min-width:58px;padding:8px 2px;font-size:.65rem;font-weight:700;color:var(--mut);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:color 0.2s;}
        .tb.active{color:var(--gg);border-bottom-color:var(--gg)}
        #main{flex:1;overflow-y:auto;padding:10px;padding-bottom:30px;position:relative;}
        #swipe-hint{display:flex;justify-content:center;gap:4px;padding:4px 0 8px;}
        #swipe-hint span{width:5px;height:5px;border-radius:50%;background:var(--brd);transition:all .2s}
        #swipe-hint span.cur{background:var(--gg);width:14px;border-radius:4px}
        .sec{font-size:.72rem;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--brd)}
        .card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:11px;margin-bottom:9px}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 14px;border:none;border-radius:var(--rs);font-size:.78rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s}
        .btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;pointer-events:none}
        .btn-p{background:var(--gl);color:#fff}.btn-s{background:var(--bm);color:#fff}
        .btn-g{background:var(--gold);color:#1a1200}.btn-d{background:var(--red);color:#fff}
        .btn-sm{padding:4px 9px;font-size:.68rem}.btn-blk{width:100%}
        .row{display:flex;gap:8px;align-items:center}.row.bt{justify-content:space-between}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
        .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}

function calcTeamChemistry(teamIdx,tactic){
    const squad=G.squads[teamIdx];if(!squad)return 50;
    const xi=squad.filter(p=>p.inXI);if(xi.length<11)return 40;
    const avgChem=xi.reduce((s,p)=>s+p.chem,0)/xi.length;
    let posBonus=0;
    const slots=FORMATIONS[tactic||G.tactics[teamIdx]||'4-3-3'];
    const slotCounts={};slots.forEach(s=>slotCounts[s]=(slotCounts[s]||0)+1);
    Object.entries(slotCounts).forEach(([pos,need])=>{
        const have=xi.filter(p=>p.pos===pos).length;
        if(have===need)posBonus+=4;else posBonus-=Math.abs(have-need)*2;
    });
    return clamp(avgChem+posBonus,0,100);
}

function teamStrength(teamIdx,tactic){
    if(typeof teamIdx==='string')return G.acl.teams[teamIdx].ovr+rnd(-5,5);
    if(teamIdx>=16)return 65+rnd(-5,5);
    const squad=G.squads[teamIdx];const xi=squad.filter(p=>p.inXI);
    if(xi.length<11)return 60;
    const effOvrSum=xi.reduce((s,p)=>s+getEffOvr(p,p.slotPos),0);
    let str=effOvrSum/11;
    str+=xi.reduce((s,p)=>s+p.moral,0)/11*0.05;
    const avgEn=xi.reduce((s,p)=>s+p.energy,0)/11;
    if(avgEn>80)str+=2;else if(avgEn<40)str-=4;
    str+=calcTeamChemistry(teamIdx,tactic)*0.08;
    str+=getTrainingBonus(teamIdx);
    if(G.stadium && teamIdx===G.playerTeamIdx) str += (G.stadium.trainingLevel||1)*0.4;
    return str;
}
function simulateMatch(hIdx,aIdx,weatherKey,derby){
    const ht=typeof hIdx==='number'&&hIdx<16?(G.tactics[hIdx]||'4-3-3'):'4-3-3';
    const at=typeof aIdx==='number'&&aIdx<16?(G.tactics[aIdx]||'4-3-3'):'4-3-3';
    const hStr=teamStrength(hIdx,ht);const aStr=teamStrength(aIdx,at);
    let diff=(hStr)-(aStr)+2+rnd(-4,4);
    if(weatherKey) diff = weatherDiffAdjust(weatherKey, diff);
    if(derby) diff = diff*0.6 + rnd(-3,3);
    let h,a;
    if(diff>8){h=rnd(2,4);a=rnd(0,1);}else if(diff>4){h=rnd(1,3);a=rnd(0,1);}
    else if(diff>1){h=rnd(0,2);a=rnd(0,2);}else if(diff>-4){h=rnd(0,2);a=rnd(0,2);}
    else if(diff>-8){h=rnd(0,1);a=rnd(1,3);}else{h=rnd(0,1);a=rnd(2,4);}
    const events=generateEvents(hIdx,aIdx,h,a);
    const ratingData=computeMatchRatings(hIdx,aIdx,h,a,events);
    return{home:h,away:a,events,ratings:ratingData.ratings,motm:ratingData.motm};
}
function generateEvents(hIdx,aIdx,hGoals,aGoals){

        for(let i=0;i<count;i++){
            let scorer='?';let scorerId=null;
            if(typeof idx==='number'&&idx<16){
                const fwds=G.squads[idx].filter(p=>p.inXI&&['ST','LW','RW','CAM','LM','RM'].includes(p.slotPos));
                if(fwds.length){const sc=pick(fwds);scorer=sc.name;scorerId=sc.id;}
            }else scorer="Star Player";
            evs.push({type:'goal',min:rnd(5,89),team,player:scorer,playerId:scorerId,teamIdx:idx});
        }
    };
    addGoals('home',hGoals,hIdx);addGoals('away',aGoals,aIdx);
    
    const totalCards=rnd(1,4);
    for(let i=0;i<totalCards;i++){
        const team=Math.random()<0.5?'home':'away';
        const idx=team==='home'?hIdx:aIdx;
        let playerName='?';
        if(typeof idx==='number'&&idx<16&&G.squads[idx]){
            const pool=G.squads[idx].filter(p=>p.inXI);
            if(pool.length)playerName=pick(pool).name;
        }
        const isRed=Math.random()<0.1;
        evs.push({type:'card',min:rnd(5,89),team,player:playerName,card:isRed?'red':'yellow'});
    }
    const totalInjuries = Math.random() < 0.15 ? 1 : 0; 
    for(let i=0; i<totalInjuries; i++){
        const team = Math.random() < 0.5 ? 'home' : 'away';
        const idx = team === 'home' ? hIdx : aIdx;
        let playerName = '?'; let playerId = null;
        if(typeof idx === 'number' && idx < 16 && G.squads[idx]){
            const pool = G.squads[idx].filter(p => p.inXI);
            if(pool.length) {
                const p = pick(pool);
                playerName = p.name; playerId = p.id;
            }
        }
        if(playerId) evs.push({type:'injury', min:rnd(5,89), team, player:playerName, playerId, teamIdx: idx});
    }
    return evs.sort((a,b)=>a.min-b.min);
}
function computeMatchRatings(hIdx,aIdx,hGoals,aGoals,events){
    const ratings={};let motm=null;let bestScore=-1;
    const sides=[{idx:hIdx,goalsFor:hGoals,goalsAgainst:aGoals,isHome:true},{idx:aIdx,goalsFor:aGoals,goalsAgainst:hGoals,isHome:false}];
    sides.forEach(side=>{
        if(typeof side.idx!=='number'||side.idx>=16||!G.squads[side.idx])return;
        const xi=G.squads[side.idx].filter(p=>p.inXI);
        const resultMod = side.goalsFor>side.goalsAgainst?0.35:(side.goalsFor<side.goalsAgainst?-0.35:0);
        xi.forEach(p=>{
            const scored=events.filter(e=>e.type==='goal'&&e.playerId===p.id).length;
            const skillMod=(getEffOvr(p,p.slotPos)-68)/30;
            let r=6.2+resultMod+skillMod+scored*1.1+(Math.random()*1.0-0.5);
            if(p.pos==='GK'){ r=6.4+resultMod*0.6+ (side.goalsAgainst===0?1.0:-side.goalsAgainst*0.25) + (Math.random()*0.6-0.3); }
            r=clamp(parseFloat(r.toFixed(1)),3.5,10);
            ratings[p.id]=r;
            if(r>bestScore){bestScore=r;motm={playerId:p.id,name:p.name,rating:r,teamIdx:side.idx,pos:p.slotPos};}

function processInjuriesAndAutoSub() {
    const medLvl = (G.stadium && G.stadium.medicalLevel) || 1;
    G.squads.forEach((sq, idx) => {
        sq.forEach(p => {
            if(p.injury > 0){
                p.injury--;
                if(idx===G.playerTeamIdx && medLvl>=3 && Math.random()<0.25 && p.injury>0) p.injury--;
            }
        });
        const injuredInXI = sq.filter(p => p.inXI && p.injury > 0);
        injuredInXI.forEach(p => {
            const bench = sq.filter(b => !b.inXI && b.injury === 0 && POS_MAP[b.pos].c === p.mainCat).sort((a,b)=>b.ovr-a.ovr);
            if(bench.length > 0) {
                const sub = bench[0]; sub.inXI = true; sub.slotPos = p.slotPos; p.inXI = false; p.slotPos = null;
            } else {
                const anyBench = sq.filter(b => !b.inXI && b.injury === 0).sort((a,b)=>b.ovr-a.ovr);
                if(anyBench.length > 0) {
                    const sub = anyBench[0]; sub.inXI = true; sub.slotPos = p.slotPos; p.inXI = false; p.slotPos = null;
                }
            }
        });
    });

        updateTable(h,score.home,score.away);updateTable(a,score.away,score.home);
        const r={week:G.week,homeIdx:h,awayIdx:a,homeScore:score.home,awayScore:score.away,events:score.events,ratings:score.ratings,motm:score.motm,weather:weather.key,isDerby:derby};
        G.leagueResults.push(r);
        applyMatchRatingsToPlayers(score.ratings);
        const hT=G.squads[h],aT=G.squads[a];
        
        hT.forEach(p=>{
            p.energy=clamp(p.energy-rnd(10,15)-(weather.key==='hot'?6:0),0,100);
            if(p.inXI) {
                if(score.home > score.away) p.moral = clamp(p.moral + rnd(3,7), 0, 100);
                else if(score.home < score.away) p.moral = clamp(p.moral - rnd(2,5), 0, 100);
                p.appearances++; p.chem=clamp(p.chem+rnd(0,2),0,100); 
            } else {
                p.moral = clamp(p.moral - rnd(1,4), 0, 100); 
            }
        });
        
        aT.forEach(p=>{
            p.energy=clamp(p.energy-rnd(10,15)-(weather.key==='hot'?6:0),0,100);
            if(p.inXI) {
                if(score.away > score.home) p.moral = clamp(p.moral + rnd(3,7), 0, 100);
                else if(score.away < score.home) p.moral = clamp(p.moral - rnd(2,5), 0, 100);
                p.appearances++; p.chem=clamp(p.chem+rnd(0,2),0,100); 
            } else {
                p.moral = clamp(p.moral - rnd(1,4), 0, 100);
            }
        });
        
        applyPostMatchEvents(score.events, baseDate);
        if(h===G.playerTeamIdx||a===G.playerTeamIdx){
            const isH=h===G.playerTeamIdx;
            const my=isH?score.home:score.away,op=isH?score.away:score.home;
            const derbyTag = derby?` [DERBY]`:'';
            G.log.unshift({cls:my>op?'win':my<op?'loss':'draw',text:`W${G.week}: ${TEAMS[G.playerTeamIdx]} ${my}–${op} ${TEAMS[isH?a:h]}${derbyTag}`});
            if(derby){
                if(my>op){ G.fanSupport=clamp(G.fanSupport+6,0,100); G.boardConfidence=clamp(G.boardConfidence+3,0,100); G.reputation=clamp(G.reputation+1,0,100);
                    G.news.unshift({date:formatDate(baseDate),title:`🔥 Derby Glory!`,body:`${TEAMS[G.playerTeamIdx]} triumphed in the ${getDerbyName(h,a)}, delighting their fans!`});
                } else if(my<op){ G.fanSupport=clamp(G.fanSupport-6,0,100); G.boardConfidence=clamp(G.boardConfidence-3,0,100);
                    G.news.unshift({date:formatDate(baseDate),title:`💔 Derby Heartbreak`,body:`${TEAMS[G.playerTeamIdx]} suffered a painful defeat in the ${getDerbyName(h,a)}.`});
                }
            } else {
                if(my>op) G.fanSupport=clamp(G.fanSupport+1.5,0,100);
                else if(my<op) G.fanSupport=clamp(G.fanSupport-1.5,0,100);
            }
            if(h===G.playerTeamIdx||a===G.playerTeamIdx)myMatch=r;
        }
    });
    G.leagueTable.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));
    return myMatch;
}
function playNextPendingMatch(){
    if(weekPendingIndex>=weekPendingMatches.length){
        renderAll();showToast("All matches for this week are finished!");return;
    }
    const item=weekPendingMatches[weekPendingIndex];
    if(item._cupRound){
        const cupRound=item._cupRound;
        const next={"Round of 16":"Quarter Final","Quarter Final":"Semi Final","Semi Final":"Final"}[cupRound];
        const res=playKnockout(G.cupBracket,G.cupResults,G.cupRoundsPlayed,cupRound,next);
        if(!next&&res.length)G.cupWinner=res[0].winner;
        res.forEach(m => { applyPostMatchEvents(m.events, item.dateStr); applyMatchRatingsToPlayers(m.ratings); });
        const myMatch=res.find(m=>m.homeIdx===G.playerTeamIdx||m.awayIdx===G.playerTeamIdx);
        item.myMatch=myMatch||null;
        delete item._cupRound;
        saveState();
    }
    if(item._aclGroup){
        const aclRes=simulateACLGroups();
        aclRes.forEach(m => applyPostMatchEvents(m.events, item.dateStr));
        item.myMatch=aclRes.length?aclRes[0]:null;
        delete item._aclGroup;
        saveState();
    }
    if(item._aclKnock){
        const lcaKnock=item._aclKnock;
        const nextR={"Round of 16":"Quarter Final","Quarter Final":"Semi Final","Semi Final":"Final"}[lcaKnock];
        const aclRes=playKnockout(G.acl.knockout,G.acl.knockout,G.acl.played,lcaKnock,nextR);
        if(!nextR&&aclRes.length)G.acl.winner=aclRes[0].winner;
        aclRes.forEach(m => { applyPostMatchEvents(m.events, item.dateStr); applyMatchRatingsToPlayers(m.ratings); });
        const myAcl=aclRes.find(r=>r.homeIdx===G.playerTeamIdx||r.awayIdx===G.playerTeamIdx);
        item.myMatch=myAcl||null;
        delete item._aclKnock;
        saveState();
    }
    if(!item.myMatch){
        weekPendingIndex++;
        renderAll(); 
        showToast(`${item.label} — No match for your team.`);
        return;
    }
    liveMatchState.min=0;liveMatchState.myMatch=item.myMatch;
    liveMatchState.compType=item.compType;liveMatchState.label=item.label;
    liveMatchState.dateStr=item.dateStr;liveMatchState.subsLeft=5;liveMatchState.isPaused=false;
    liveMatchState.weather=item.myMatch.weather?WEATHER_TYPES.find(w=>w.key===item.myMatch.weather):null;
    liveMatchState.isDerbyMatch=!!item.myMatch.isDerby;
    const lb=document.getElementById('live-board');
    lb.className=`show theme-${liveMatchState.isDerbyMatch?'derby':item.compType}`;
    clearInterval(liveInterval);
    renderLiveBoardFull();
    liveInterval=setInterval(()=>{
        if(liveMatchState.isPaused)return;
        liveMatchState.min=Math.min(liveMatchState.min+rnd(3,8),90);
        updateLiveBoardDynamic();
        if(liveMatchState.min>=90){
            clearInterval(liveInterval);
            playWhistle();
            setTimeout(()=>renderLiveBoardFull(),400);
        }
    },600);
}
function continueToNext(){
    weekPendingIndex++;
    document.getElementById('live-board').classList.remove('show','theme-league','theme-cup','theme-acl','theme-derby');
    playNextPendingMatch();
}
function skipMatch(){
    if(liveInterval){clearInterval(liveInterval);liveInterval=null;}
    liveMatchState.min=90;
    playWhistle();
    renderLiveBoardFull();
}
function playKnockout(bracketObj,resObj,playedTracker,roundName,nextRoundName){
    if(!bracketObj[roundName]||playedTracker[roundName])return[];
    const results=[];const winners=[];
    bracketObj[roundName].forEach(m=>{
        const h=m[0],a=m[1];const score=simulateMatch(h,a);
        let win=h;
        if(score.away>score.home||(score.away===score.home&&Math.random()>0.5))win=a;
        results.push({homeIdx:h,awayIdx:a,homeScore:score.home,awayScore:score.away,winner:win,events:score.events,ratings:score.ratings,motm:score.motm});
        winners.push(win);
    });
    resObj[roundName]=results;playedTracker[roundName]=true;
    if(nextRoundName){
        const nextPairs=[];
        for(let i=0;i<winners.length;i+=2)nextPairs.push([winners[i],winners[i+1]]);
        bracketObj[nextRoundName]=nextPairs;
    }
    return results;
}

function renderHorizontalPitch(homeSq, homeTac, awaySq, awayTac, homeIsPlayer){

function initiateLoanBid(pid, defaultFee) {
    const p = G.transferMarket.find(x=>x.id===pid);
    if(!p) return;
    document.getElementById('mtitle').innerHTML = `🤝 Loan Offer: ${p.name}`;
    document.getElementById('mbody').innerHTML = `
        <div style="font-size:.75rem; margin-bottom:10px;">Send a loan offer to <b>${TEAMS[p.teamIndex]}</b> for this player.</div>
        <div class="row bt" style="background:var(--sf2); padding:10px; border-radius:6px;">
            <span style="font-size:.8rem; font-weight:bold; color:var(--dim)">Offer Fee:</span>
            <div class="row">
                <input type="number" step="10" id="user-loan-fee" class="input-text" style="width:80px; padding:6px; font-size:.8rem" value="${Math.round(defaultFee * 1000)}">
                <span style="font-size:.8rem; font-weight:bold;">k</span>
            </div>
        </div>
        <p style="font-size:.65rem; color:var(--dim); margin-top:10px;">The club will review your offer and reply to your Inbox next week.</p>
    `;

    document.getElementById('mov').classList.add('show');

function submitLoanBid(pid) {
    let feeK = parseFloat(document.getElementById('user-loan-fee').value);
    if(isNaN(feeK) || feeK < 100) feeK = 100;
    let feeM = feeK / 1000;
    
    if(G.budget < feeM) { showToast("❌ Not enough budget!"); return; }
    
    G.loanBids.push({ id: pid, fee: feeM });
    closeModal();
    showToast("✅ Offer sent! Check your inbox next week.");
}
function finalizeUserLoan(msgId) {
    let msgIdx = G.inbox.findIndex(m => m.id === msgId);
    if(msgIdx < 0) return;
    let msg = G.inbox[msgIdx];
    
    let pIdx = G.transferMarket.findIndex(x => x.id === msg.playerId);
    if (pIdx < 0) { showToast("Player no longer available."); G.inbox.splice(msgIdx, 1); saveState(); renderAll(); return; }
    
    const p = G.transferMarket[pIdx];
    if (G.budget < msg.fee) { showToast("❌ Not enough budget!"); return; }
    
    G.budget = parseFloat((G.budget - msg.fee).toFixed(2));
    p.originalTeamIdx = p.teamIndex;
    p.teamIndex = G.playerTeamIdx;
    p.isLoan = true; p.loanDuration = 1;
    G.squads[G.playerTeamIdx].push(p);
    G.transferMarket.splice(pIdx, 1);
    
    G.inbox.splice(msgIdx, 1);
    saveState(); showToast(`✅ ${p.name} joined on loan!`); renderAll();
}

function buyPlayer(id, isFree){
    const idx=G.transferMarket.findIndex(p=>p.id===id);if(idx<0)return;
    const p=G.transferMarket[idx];
    if(!isFree && G.budget<p.price){showToast('❌ Not enough budget!');return;}
    
    if(!isFree) G.budget = parseFloat((G.budget - p.price).toFixed(2));
    p.teamIndex=G.playerTeamIdx;
    p.contract = rnd(2, 4);
    p.isLoan = false; p.originalTeamIdx = -1;
    G.squads[G.playerTeamIdx].push(p);
    G.transferMarket.splice(idx,1);
    
    G.news.unshift({
        date: formatDate(G.currentDate),
        title: isFree ? 'Free Transfer' : 'New Signing!',
        body: `${TEAMS[G.playerTeamIdx]} has officially signed ${p.name} ${isFree ? 'on a free transfer' : `for ${fmt(p.price)}`}.`
    });
    saveState();showToast(`✅ ${p.name} successfully signed!`);renderAll();
}
function sellPlayer(id){
    const sq=G.squads[G.playerTeamIdx];const idx=sq.findIndex(p=>p.id===id);if(idx<0)return;
    const p=sq[idx];
    if(p.inXI){showToast('❌ Remove from XI first!');return;}
    const check=checkSquadMinimum(sq,p);
    if(!check.ok){showToast('❌ '+check.reason);return;}
    const sp=Math.max(1,getPrice(p.ovr, p.age)-rnd(0,1));
    G.budget = parseFloat((G.budget + sp).toFixed(2));
    
    p.teamIndex = rnd(1, 15);
    G.transferMarket.push(p);
    sq.splice(idx,1);
    
    saveState();showToast(`✅ ${p.name} sold for ${fmt(sp)}!`);renderAll();
}
function terminateLoan(id) {
    const sq=G.squads[G.playerTeamIdx];const idx=sq.findIndex(p=>p.id===id);if(idx<0)return;
    const p=sq[idx];
    if(p.inXI){showToast('❌ Remove from XI first!');return;}
    const check=checkSquadMinimum(sq,p);
    if(!check.ok){showToast('❌ '+check.reason);return;}
    
    p.isLoan = false; p.teamIndex = p.originalTeamIdx;
    if(p.teamIndex === -1) G.transferMarket.push(p);
    else G.transferMarket.push(p); 
    
    sq.splice(idx,1);
    saveState();showToast(`✅ Loan terminated for ${p.name}.`);renderAll();
}
function scoutYouth() {
    if(G.budget < 2) { showToast('❌ Not enough budget! Costs € 2 M.'); return; }
    G.budget = parseFloat((G.budget - 2).toFixed(2));
    G.scoutQueue.push({ weeksLeft: rnd(2, 4), id: Math.random().toString(36).substr(2,9) });
    
    saveState(); renderAll();
    showToast(`🔍 Scout dispatched! Report expected soon.`);
}
function signProspect(msgId, pid) {
    const msg = G.inbox.find(m => m.id === msgId);
    if (!msg) return;
    const pIdx = msg.players.findIndex(p => p.id === pid);
    if (pIdx < 0) return;
    
    const p = msg.players[pIdx];
    p.teamIndex = G.playerTeamIdx;
    p.contract = 3;
    G.squads[G.playerTeamIdx].push(p);
    
    msg.players.splice(pIdx, 1);
    showToast(`✅ ${p.name} signed to academy!`);
    
    if (msg.players.length === 0) G.inbox = G.inbox.filter(m => m.id !== msgId);
    saveState(); renderAll();
}
function dismissMsg(msgId) {
    G.inbox = G.inbox.filter(m => m.id !== msgId);
    saveState(); renderAll();
}
function renewContract(id, cost) {
    if(G.budget < cost) { showToast(`❌ Need ${fmt(cost)} for Signing Fee!`); return; }
    const p = G.squads[G.playerTeamIdx].find(x => x.id === id);
    if(p) {
        G.budget = parseFloat((G.budget - cost).toFixed(2));
        p.contract += rnd(2, 3);
        saveState();
        closeModal(); openPlayerModal(id);
        showToast(`✅ Contract renewed for ${p.name}!`);
        renderAll();
    }
}

function processImport() {
    const txt = document.getElementById('import-text').value.trim();
    if(!txt) { showToast("❌ Code is empty!"); return; }
    try {
        const parsed = JSON.parse(decodeURIComponent(atob(txt)));
        if(parsed && parsed.season) {
            G = parsed; migrateState();
            saveState(); closeModal(); renderAll();
            showToast("✅ Save loaded successfully!");
        } else throw new Error();
    } catch(e) { showToast("❌ Invalid save code!"); }
}

function updateBudget(val) {
    G.budget = parseFloat(val); saveState(); updateHeader();
}
function processLoanOffer(id, action) {
    let msgIdx = G.inbox.findIndex(m => m.id === id);
    if(msgIdx < 0) return;
    let msg = G.inbox[msgIdx];
    let p = G.squads[G.playerTeamIdx].find(x => x.id === msg.playerId);
    
    if (!p) {
        showToast("Player is no longer at the club.");
        G.inbox.splice(msgIdx, 1); saveState(); renderAll(); return;
    }
    if (action === 'reject') {
        G.inbox.splice(msgIdx, 1);
        saveState(); renderAll(); return;
    }
    
    let inputFee = parseFloat(document.getElementById(`counter-fee-${id}`).value);
    if (isNaN(inputFee) || inputFee < 0.1) inputFee = 0.1;
    if (action === 'counter') {
        let maxWilling = parseFloat((p.price * 0.15).toFixed(1));
        if (maxWilling < 0.5) maxWilling = 0.5;
        if (maxWilling > 2.0) maxWilling = 2.0;
        
        if (inputFee <= maxWilling) {
            showToast(`✅ ${TEAMS[msg.targetTeamIdx]} accepted the counter-offer!`);
            action = 'accept';
            msg.fee = inputFee;
        } else {
            showToast(`❌ ${TEAMS[msg.targetTeamIdx]} rejected the counter-offer of ${fmt(inputFee)}.`);
            G.inbox.splice(msgIdx, 1);
            saveState(); renderAll(); return;
        }
    }
    
    if (action === 'accept') {
        if(p.inXI) { showToast("❌ Remove player from XI first!"); return; }
        const check=checkSquadMinimum(G.squads[G.playerTeamIdx], p);
        if(!check.ok){ showToast('❌ '+check.reason); return; }
        
        G.budget = parseFloat((G.budget + msg.fee).toFixed(2));
        p.isLoan = true;
        p.loanDuration = 1;
        p.originalTeamIdx = G.playerTeamIdx;
        p.teamIndex = msg.targetTeamIdx;
        
        G.squads[G.playerTeamIdx] = G.squads[G.playerTeamIdx].filter(x => x.id !== p.id);
        G.squads[msg.targetTeamIdx].push(p);
        
        G.inbox.splice(msgIdx, 1);
        showToast(`✅ ${p.name} loaned out for ${fmt(msg.fee)}!`);
        saveState(); renderAll();
    }
}
function requestBudget() {
    if ((G.budgetRequestsUsed || 0) >= 2) return;
    const row = G.leagueTable.find(x => x.teamIdx === G.playerTeamIdx);
    const pos = G.leagueTable.indexOf(row) + 1;
    let chance = 40; 
    if (pos <= 3) chance += 30; else if (pos <= 8) chance += 10; else if (pos >= 13) chance -= 30;   
    if (G.budget > 30) chance -= 20; if (G.budget < 10) chance += 20;
    chance += Math.round((G.boardConfidence-50)/4);
    G.budgetRequestsUsed = (G.budgetRequestsUsed || 0) + 1;
    
    if (Math.random() * 100 < chance) {
        const granted = rnd(5, 15); G.budget = parseFloat((G.budget + granted).toFixed(2));
        G.inbox.unshift({id: Math.random().toString(36).substr(2,9), title: 'Budget Request Approved ✅', body: `The board is very pleased with your performance. We agree to allocate an additional ${fmt(granted)} to your transfer budget.`, action: null, isRead: false});
        showToast(`✅ Approved! +${fmt(granted)}`);
    } else {
        let reason = "The club's financial situation doesn't allow it right now.";
        if (pos > 10) reason = "Improve league performance first before asking for more money."; else if (G.budget >= 25) reason = "The current budget is considered more than sufficient.";
        G.inbox.unshift({id: Math.random().toString(36).substr(2,9), title: 'Budget Request Rejected ❌', body: `The board decided to reject your request. ${reason}`, action: null, isRead: false});
        showToast('❌ Request rejected by the board.');
    }
    saveState(); renderAll();
}

    if(newTeamIdx === undefined || newTeamIdx === null) newTeamIdx = rnd(0, 15);
    if(confirm(`Are you sure you want to leave ${TEAMS[G.playerTeamIdx]} for ${TEAMS[newTeamIdx]}?`)){
        G.playerTeamIdx = newTeamIdx; G.budget = Math.min(50, BASE_BUDGETS[newTeamIdx]); G.inbox.splice(msgIdx, 1);
        G.stadium.name = TEAMS[newTeamIdx]+' Stadium';
        weekPendingMatches = []; weekPendingIndex = 0;

        saveState(); renderAll(); showToast(`Welcome to ${TEAMS[newTeamIdx]}!`);
    }
}
function forceRetire(pid) {

function editPlayer(id, stat, amount) {
    let p = null;
    for(let i=0; i<G.squads.length; i++){p=G.squads[i].find(x=>x.id===id);if(p)break;}

function forceMove(id) {

        p=G.squads[i].find(x=>x.id===id); 
        if(p) { sqIdx = i; break; }
    }
    if(!p) {
        p = G.transferMarket.find(x=>x.id===id);

        G.squads[G.playerTeamIdx].push(p);
        saveState(); closeModal(); renderAll(); showToast("⚡ Player forced to your club!");

function startNewSeason(reward,finalPos,objectiveMet){
    const allPlayersHist=[]; G.squads.forEach((sq,ti)=>sq.forEach(p=>allPlayersHist.push({...p,teamIdx:ti})));
    const topScorerPlayer = [...allPlayersHist].sort((a,b)=>b.goals-a.goals)[0];
    G.history.push({
        season:G.season, yourTeam:TEAMS[G.playerTeamIdx], yourPos:finalPos,
        leagueChampion:G.leagueTable[0].name, cupWinner:getTeamName(G.cupWinner), aclWinner:(G.acl&&G.acl.winner!==undefined&&G.acl.winner!==null)?getTeamName(G.acl.winner):'N/A',
        topScorer: (topScorerPlayer&&topScorerPlayer.goals>0)?{name:topScorerPlayer.name,goals:topScorerPlayer.goals,team:TEAMS[topScorerPlayer.teamIdx]}:null,
        reputation: Math.round(G.reputation), objectiveMet
    });
    if(objectiveMet){ G.reputation=clamp(G.reputation+rnd(3,8),0,100); G.objectiveFailStreak=0; G.boardConfidence=clamp(G.boardConfidence+10,0,100); }
    else { G.reputation=clamp(G.reputation-rnd(2,6),0,100); G.objectiveFailStreak=(G.objectiveFailStreak||0)+1; G.boardConfidence=clamp(G.boardConfidence-15,0,100); }
    
    let sackedMsg=null;
    if(G.objectiveFailStreak>=2){
        let newTeam=rnd(0,15); while(newTeam===G.playerTeamIdx) newTeam=rnd(0,15);
        sackedMsg=`🛑 You have been SACKED by ${TEAMS[G.playerTeamIdx]} after repeatedly missing the board's objectives! You land a fresh chance at ${TEAMS[newTeam]}.`;
        G.news.unshift({date:'Pre-season', title:'Manager Sacked!', body:sackedMsg});
        G.playerTeamIdx=newTeam; G.budget=Math.min(40,BASE_BUDGETS[newTeam]); G.objectiveFailStreak=0; G.boardConfidence=55; G.stadium.name=TEAMS[newTeam]+' Stadium';
        weekPendingMatches=[]; weekPendingIndex=0;
    }
    
    G.budget = parseFloat((Math.min(50,G.budget+reward)).toFixed(2));
    G.budgetRequestsUsed = 0; G.season++; G.week=0; G.phase='preseason'; G.preseasonWeeksLeft=8;
    G.boardObjective = generateBoardObjective(finalPos);
    G.pcAvailable = true;
    weekPendingMatches=weekPendingMatches.length?weekPendingMatches:[]; weekPendingIndex=0;
    G.leagueTable=TEAMS.map((name,i)=>({teamIdx:i,name,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0}));
    G.leagueResults=[]; G.schedule=buildSchedule(); G.lcaTeamIndices=G.leagueTable.slice(0,4).map(x=>x.teamIdx);
    G.acl=null; G.cupBracket={"Round of 16":[...Array(16).keys()].sort(()=>Math.random()-.5).reduce((res,k,i,arr)=>i%2===0?[...res,[arr[i],arr[i+1]==15?99:arr[i+1]]]:res,[])}; G.cupResults={}; G.cupRoundsPlayed={}; G.cupWinner=null;
    
    G.squads.forEach((sq,ti)=>{
        for(let i=sq.length-1; i>=0; i--){
            const p = sq[i];
            if(p.isLoan) {
                p.isLoan = false; p.teamIndex = p.originalTeamIdx;
                if(p.teamIndex === -1) G.transferMarket.push(p); else if (G.squads[p.teamIndex]) G.squads[p.teamIndex].push(p);
                sq.splice(i, 1);
            }
        }
        sq.forEach(p=>{
            p.energy=100; p.contract--; p.age++; p.injury=0;
            let gro=0;
            if(p.age < 24 && p.ovr < p.pot) gro = rnd(1, 3);
            else if(p.age >= 24 && p.age < 30 && p.ovr < p.pot) gro = rnd(0, 2);
            else if(p.age >= 30) gro = rnd(-3, 0); 
            
            if(p.appearances > 15 && p.age < 30 && p.ovr < p.pot) gro += 1;
            if(p.goals > 10 && p.ovr < p.pot) gro += 1;
            
            p.ovr = clamp(p.ovr + gro, 40, 95);
            if(p.ovr > p.pot) p.pot = p.ovr;
            p.isStar = p.ovr >= 80;
            p.goals = 0; p.appearances = 0; p.totalRating=0; p.ratingCount=0;
            p.price = getPrice(p.ovr, p.age);
        });
        for(let i=sq.length-1; i>=0; i--){
            const p = sq[i];
            if(p.age >= 34) {
                let chance = p.age === 34 ? 0.3 : (p.age === 35 ? 0.5 : (p.age === 36 ? 0.75 : 1.0));
                if(Math.random() < chance) {
                    if(p.isStar && ti === G.playerTeamIdx) G.news.unshift({ date: 'Pre-season', title: 'Legend Retires', body: `${p.name} (OVR ${p.ovr}) has officially hung up his boots at age ${p.age}.`});
                    const origin = ti < 16 ? (Math.random() < 0.8 ? 'ID' : 'FR') : 'ID';
                    const regen = genPlayer(POS_MAP[p.pos].c, ti, false, origin);
                    regen.age = rnd(17, 21); regen.ovr = rnd(50, 85); regen.isStar = regen.ovr >= 80; regen.price = getPrice(regen.ovr, regen.age);
                    sq.splice(i, 1, regen);
                }
            }
        }
        const expired = sq.filter(p=>p.contract<=0 && !p.isLoan);
        expired.forEach(p=>{
            const idx=sq.indexOf(p); p.teamIndex = -1; p.contract = rnd(1,3); p.price = 0;
            G.transferMarket.push(p); sq.splice(idx, 1);
            if(ti === G.playerTeamIdx) G.news.unshift({ date: 'Pre-season', title: 'Free Transfer', body: `${p.name} has left ${TEAMS[G.playerTeamIdx]} on a free transfer after his contract expired.`});
            const origin = ti < 16 ? (Math.random() < 0.8 ? 'ID' : 'FR') : 'ID';
            const np = genPlayer(POS_MAP[p.pos].c,ti,false, origin); np.price = getPrice(np.ovr, np.age); sq.push(np);
        });
        setDefaultXI(sq,G.tactics[ti]);
    });
    for(let i=G.transferMarket.length-1; i>=0; i--){
         const p = G.transferMarket[i]; p.age++; p.totalRating=0; p.ratingCount=0;
         if(p.age >= 34) {
             let chance = p.age === 34 ? 0.3 : (p.age === 35 ? 0.5 : (p.age === 36 ? 0.75 : 1.0));
             if(Math.random() < chance) {
                 const origin = Math.random() < 0.6 ? 'ID' : (Math.random() < 0.8 ? 'FR' : 'JP'); 
                 const regen = genPlayer(POS_MAP[p.pos].c, -1, false, origin);
                 regen.age = rnd(17, 21); regen.ovr = rnd(50, 85); regen.isStar = regen.ovr >= 80; regen.price = 0; 
                 G.transferMarket.splice(i, 1, regen);
             }
         }
    }
    for(let i=0; i<30; i++) {
        if(G.transferMarket.length > 200) G.transferMarket.shift(); 
        const cat=pick(['GK','DEF','MID','FWD']); const rR = Math.random(); let origin = 'ID';
        if(rR < 0.6) origin = 'ID'; else if(rR < 0.8) origin = 'FR'; else if(rR < 0.86) origin = 'JP'; else if(rR < 0.93) origin = 'KR'; else origin = 'AR';
        const isFreeAgent = Math.random() < 0.25; const tIdx = isFreeAgent ? -1 : rnd(1, 15);
        const np=genPlayer(cat, tIdx, false, origin);
        const r=Math.random(); if(r<0.7)np.ovr=rnd(45,65);else if(r<0.9)np.ovr=rnd(66,75);else np.ovr=rnd(76,85);
        if(np.ovr > np.pot) np.pot = np.ovr;
        np.isStar=np.ovr>=80; np.price = isFreeAgent ? 0 : getPrice(np.ovr, np.age);
        G.transferMarket.push(np);
    }
    G.transferMarket.sort((a,b)=>b.ovr-a.ovr);
    G.log=[{cls:'info',text:`🌟 Season ${G.season} started! Rewards added.`}];
    G.news.unshift({date: formatDate(G.currentDate), title: `Welcome to Season ${G.season}!`, body: `The new season is here. Clubs are preparing their tactics and finalizing transfers for what promises to be an exciting campaign.`});
    if(!sackedMsg && (finalPos<=5||Math.random()>0.6) && G.reputation>=30){
        let target=rnd(0,15);while(target===G.playerTeamIdx)target=rnd(0,15);
        G.inbox.unshift({id:Math.random().toString(36).substr(2,9),title:'Job Offer',body:`The board of ${TEAMS[target]} is impressed with your performance. They want you as their new manager!`,action:true,targetTeamIdx:target, isRead: false});
    }
    saveState();closeModal();renderAll();showToast(sackedMsg||"New Season Started!");
}

function openTeamModal(tid){
    const sq=G.squads[tid];const xi=sq.filter(p=>p.inXI).sort((a,b)=>POS_ORDER[a.pos]-POS_ORDER[b.pos]);
    let html=`<div style="font-size:.75rem;color:var(--dim);margin-bottom:10px">Tactic: ${G.tactics[tid]} ${isDerby(tid,G.playerTeamIdx)?'<span class="derby-badge">YOUR RIVAL</span>':''}</div><div class="sec">Starting XI</div>`;
    xi.forEach(p=>{html+=`<div class="row bt" style="font-size:.75rem;border-bottom:1px solid var(--sf2);padding:4px 0;cursor:pointer" onclick="openPlayerModal('${p.id}')"><span><b style="color:var(--gold);display:inline-block;width:30px">${p.slotPos}</b> <span class="${p.injury>0?'injured-text':''}">${p.name}</span></span><b class="${ovrCls(p.ovr)}">${p.ovr}</b></div>`;});

function selectTeamPrompt(){
    let html=`<div style="margin-bottom:15px"><div class="sec">1. Manager Name</div><input type="text" id="mgrNameInp" class="input-text" placeholder="Enter Name..." value="Manager"></div><div class="sec">2. Select Your Club</div><div style="display:flex;flex-direction:column;gap:5px;max-height:45vh;overflow-y:auto;padding-right:5px">`;
    TEAMS.forEach((name,i)=>{
        const bgt=Math.min(50,BASE_BUDGETS[i]+rnd(-5,5));const sq=G.squads[i];
        const effOvr=Math.round(sq.filter(p=>p.inXI).reduce((s,p)=>s+getEffOvr(p,p.slotPos),0)/11)||0;
        html+=`<button class="btn btn-s" style="justify-content:space-between;padding:10px 12px;display:flex;align-items:center;" onclick="applyTeam(${i},${bgt})"><div style="text-align:left;flex:1"><div style="font-weight:700;font-size:.9rem">${i+1}. ${name}</div><div style="font-size:.65rem;color:var(--wh);margin-top:4px">OVR: <b style="color:var(--gg)">${effOvr}</b></div></div><div style="text-align:right"><div style="font-size:.65rem;color:var(--dim)">Budget</div><div style="font-size:.9rem;font-weight:900;color:var(--gold)">${bgt} M</div></div></button>`;
    });
    html+=`</div>`;
    document.getElementById('mtitle').innerHTML=`<h2 style="color:var(--gold);margin:0">⚽ Start Career</h2>`;

function applyTeam(idx,budget){
    const mName=document.getElementById('mgrNameInp').value.trim()||'Manager';
    G.managerName=mName;G.playerTeamIdx=idx;G.budget=parseFloat(budget.toFixed(1));
    G.tactics[idx]='4-3-3';setDefaultXI(G.squads[idx],'4-3-3');
    G.stadium.name = TEAMS[idx]+' Stadium';
    saveState();closeModal();renderAll();showToast(`Welcome to ${TEAMS[idx]}, ${mName}!`);
}
function closeModal(){document.getElementById('mov').classList.remove('show');}
let activeTab='dash';
const RENDERERS={dash:renderDash,squad:renderSquad,league:renderLeague,stats:renderStats,schedule:renderSchedule,cup:renderCup,lca:renderLCA,transfer:renderTransfer,news:renderNews,manager:renderManager};
function renderTab(tab){
    try{
        const movEl=document.getElementById('mov');
        if(movEl.classList.contains('show')&&document.getElementById('mtitle').innerHTML.includes('Start Career'))return;
        if(movEl.classList.contains('show')&&document.getElementById('mbody').innerHTML.includes('Season')&&document.getElementById('mbody').innerHTML.includes('Finished'))return;
        activeTab=tab;
        document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
        const activeBtn=document.querySelector(`.tb[data-tab="${tab}"]`);
        if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
        if(RENDERERS[tab])RENDERERS[tab]();
        const hint=document.getElementById('swipe-hint');
        if(hint) hint.innerHTML=TAB_ORDER.map(t=>`<span class="${t===activeTab?'cur':''}"></span>`).join('');
    }catch(e){console.error("Tab Error",e);}
}
function renderAll(){updateHeader();renderTab(activeTab);}
function switchTab(tab){swapIdA=null;renderTab(tab);document.getElementById('main').scrollTop=0;}
document.querySelectorAll('.tb').forEach(btn=>{btn.addEventListener('click',()=>switchTab(btn.dataset.tab));});
// ─── NEW: Swipe left/right to change tabs ───────────────────────
(function setupSwipeNav(){
    const mainEl=document.getElementById('main');
    let touchStartX=0, touchStartY=0, touchActive=false, startedOnScrollable=false;
    mainEl.addEventListener('touchstart', e=>{
        if(document.getElementById('mov').classList.contains('show')) { touchActive=false; return; }
        if(document.getElementById('live-board').classList.contains('show')) { touchActive=false; return; }
        const t=e.touches[0];
        touchStartX=t.clientX; touchStartY=t.clientY; touchActive=true;
        let el=e.target;
        startedOnScrollable=false;
        while(el && el!==mainEl){
            if(el.scrollWidth>el.clientWidth+4 && getComputedStyle(el).overflowX!=='visible'){ startedOnScrollable=true; break; }
            el=el.parentElement;
        }
    }, {passive:true});
    mainEl.addEventListener('touchend', e=>{
        if(!touchActive) return;
        touchActive=false;
        if(startedOnScrollable) return;
        const t=e.changedTouches[0];
        const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
        if(Math.abs(dx)>65 && Math.abs(dx)>Math.abs(dy)*1.6){
            const curIdx=TAB_ORDER.indexOf(activeTab);
            if(curIdx<0) return;
            if(dx<0 && curIdx<TAB_ORDER.length-1){ switchTab(TAB_ORDER[curIdx+1]); }
            else if(dx>0 && curIdx>0){ switchTab(TAB_ORDER[curIdx-1]); }
        }
    }, {passive:true});
})();
function init(){
    // migrate legacy single-save key if present and no slots exist yet
    try{
        const legacy=localStorage.getItem('mliv16');
        if(legacy && !localStorage.getItem(slotKey(1))){
            localStorage.setItem(slotKey(1), legacy);
        }
    }catch(e){}
    if(!loadState()){G=freshState();selectTeamPrompt();}
    else{
        migrateState();
        weekPendingMatches=[];weekPendingIndex=0;
        updateHeader();renderTab('dash');
    }
}
