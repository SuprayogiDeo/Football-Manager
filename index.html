    function buyPlayer(id, isFree){
        const idx=G.transferMarket.findIndex(p=>p.id===id);if(idx<0)return;
        const p=G.transferMarket[idx];
        if(!isFree){ initiateTransferBid(id); return; } // paid transfers now go through the BID negotiation flow
        const capCheck=checkSquadMaximum(G.squads[G.playerTeamIdx]);
        if(!capCheck.ok){showToast('❌ '+capCheck.reason);return;}
        
        // If this listing referenced a real Liga 1 club's actual squad player, remove them
        // from that club's real roster first so they don't end up duplicated in two squads.
        if(p.teamIndex >= 0 && p.teamIndex < 16 && Array.isArray(G.squads[p.teamIndex])){
            const origSq = G.squads[p.teamIndex];
            const origIdx = origSq.indexOf(p);
            if(origIdx >= 0){
                origSq.splice(origIdx, 1);
                if(p.inXI) setDefaultXI(origSq, G.tactics[p.teamIndex] || '4-3-3');
            }
        }
        delete p._listed;
        p.teamIndex=G.playerTeamIdx;
        p.contract = rnd(2, 4); // new signings get 2-4 year contracts
        p.isLoan = false; p.originalTeamIdx = -1; p.inXI = false; p.slotPos = null;
        if(Array.isArray(G.squads[G.playerTeamIdx])) G.squads[G.playerTeamIdx].push(p);
        G.transferMarket.splice(idx,1);
        
        G.news.unshift({
            date: formatDate(G.currentDate),
            title: 'Free Transfer Signing',
            body: `${TEAMS[G.playerTeamIdx]} have officially signed ${p.name} on a free transfer.`,
            tags: ['transfer']
        });
        saveState();showToast(`✅ ${p.name} successfully signed!`);renderAll();
    }
    // ─── C1: Transfer Negotiation (BID system, 2-step) ─────────
    // Step 1: user submits an opening bid (initiateTransferBid -> submitTransferBid)
    // Step 2: resolved next week in playLeagueWeek(); selling club accepts / counters / rejects via Inbox
    function initiateTransferBid(pid){
        const p = G.transferMarket.find(x=>x.id===pid);
        if(!p) return;
        if(p.teamIndex === -1){ buyPlayer(pid, true); return; } // safety net: free agents never need bids
        const capCheck=checkSquadMaximum(G.squads[G.playerTeamIdx]);
        if(!capCheck.ok){showToast('❌ '+capCheck.reason);return;}
        const clubName = p.teamIndex >= 16 ? (FOREIGN_CLUBS[p.teamIndex-16]||'European Club') : TEAMS[p.teamIndex];
        const askPrice = p.price;
        document.getElementById('mtitle').innerHTML = `💰 Transfer Bid: ${p.name}`;
        document.getElementById('mbody').innerHTML = `
            <div style="font-size:.75rem; margin-bottom:10px;">Submit an opening bid to <b>${clubName}</b> for <b>${p.name}</b> (${p.pos}, OVR ${p.ovr}).</div>
            <div class="row bt" style="background:var(--sf2); padding:10px; border-radius:6px;">
                <span style="font-size:.8rem; font-weight:bold; color:var(--dim)">Asking Price:</span>
                <span style="font-size:.85rem; font-weight:900; color:var(--gold)">${fmt(askPrice)}</span>
            </div>
            <div class="row bt" style="background:var(--sf2); padding:10px; border-radius:6px; margin-top:8px;">
                <span style="font-size:.8rem; font-weight:bold; color:var(--dim)">Your Bid:</span>
                <div class="row">
                    <span style="font-size:.8rem; font-weight:bold;">€</span>
                    <input type="number" step="0.1" id="user-transfer-bid" class="input-text" style="width:90px; padding:6px; font-size:.8rem" value="${askPrice}">
                    <span style="font-size:.8rem; font-weight:bold;">M</span>
                </div>
            </div>
            <p style="font-size:.65rem; color:var(--dim); margin-top:10px;">Bidding below the asking price may get countered or rejected. The club will respond in your Inbox next week.</p>
        `;
        document.getElementById('mfoot').innerHTML = `<button class="btn btn-p btn-sm" onclick="submitTransferBid('${p.id}')">Send Bid</button> <button class="btn btn-s btn-sm" onclick="closeModal()">Cancel</button>`;
        document.getElementById('mov').classList.add('show');
    }
    function submitTransferBid(pid){
        const p = G.transferMarket.find(x=>x.id===pid);
        if(!p) return;
        let bid = parseFloat(document.getElementById('user-transfer-bid').value);
        if(isNaN(bid) || bid < 0.1) bid = 0.1;
        if(G.budget < bid){ showToast('❌ Not enough budget for this bid!'); return; }
        if(G.transferBids.find(b=>b.id===pid)){ showToast('⏳ A bid for this player is already pending.'); return; }
        G.transferBids.push({ id: pid, bid: parseFloat(bid.toFixed(2)), askPrice: p.price, rounds: 0 });
        closeModal();
        showToast('✅ Bid submitted! Check your inbox next week for the club\'s response.');
    }
    function openBidNegotiationModal(msgId){
        let msgIdx = G.inbox.findIndex(m => m.id === msgId);
        if(msgIdx < 0) return;
        let msg = G.inbox[msgIdx];
        let p = G.transferMarket.find(x => x.id === msg.playerId);
        if(!p){
            showToast('This player is no longer available.');
            G.inbox.splice(msgIdx,1); saveState(); renderInbox(); return;
        }
        const clubName = p.teamIndex >= 16 ? (FOREIGN_CLUBS[p.teamIndex-16]||'European Club') : TEAMS[p.teamIndex];
        document.getElementById('mtitle').innerHTML = `🤝 Counter-Offer: ${p.name}`;
        document.getElementById('mbody').innerHTML = `
            <div style="font-size:.75rem; margin-bottom:10px;"><b>${clubName}</b> has responded to your bid for <b>${p.name}</b>.</div>
            <div class="row bt" style="background:var(--sf2); padding:10px; border-radius:6px;">
                <span style="font-size:.8rem; font-weight:bold; color:var(--dim)">Their Counter:</span>
                <span style="font-size:.85rem; font-weight:900; color:var(--gold)">${fmt(msg.counterFee)}</span>
            </div>
            <div class="row bt" style="background:var(--sf2); padding:10px; border-radius:6px; margin-top:8px;">
                <span style="font-size:.8rem; font-weight:bold; color:var(--dim)">Your New Offer:</span>
                <div class="row">
                    <span style="font-size:.8rem; font-weight:bold;">€</span>
                    <input type="number" step="0.1" id="counter-bid-modal" class="input-text" style="width:90px; padding:6px; font-size:.8rem" value="${msg.counterFee}">
                    <span style="font-size:.8rem; font-weight:bold;">M</span>
                </div>
            </div>
            <p style="font-size:.65rem; color:var(--dim); margin-top:10px;">Accept their price, raise your offer, or walk away from the deal.</p>
        `;
        document.getElementById('mfoot').innerHTML = `
            <button class="btn btn-p btn-sm" onclick="processTransferBid('${msg.id}','accept')">Accept</button>
            <button class="btn btn-g btn-sm" onclick="processTransferBid('${msg.id}','counter')">Raise Offer</button>
            <button class="btn btn-d btn-sm" onclick="processTransferBid('${msg.id}','reject')">Walk Away</button>
            <button class="btn btn-s btn-sm" onclick="closeModal()">Close</button>
        `;
        document.getElementById('mov').classList.add('show');
    }
    function processTransferBid(msgId, action){
        let msgIdx = G.inbox.findIndex(m => m.id === msgId);
        if(msgIdx < 0) return;
        let msg = G.inbox[msgIdx];
        const mIdx = G.transferMarket.findIndex(x => x.id === msg.playerId);
        if(mIdx < 0){
            showToast('This player is no longer available.');
            G.inbox.splice(msgIdx,1); saveState(); closeModal(); renderInbox(); return;
        }
        const p = G.transferMarket[mIdx];
        if(action === 'reject'){
            G.inbox.splice(msgIdx,1);
            saveState(); closeModal(); showToast(`You walked away from the ${p.name} deal.`); renderInbox(); return;
        }
        if(action === 'counter'){
            let newBid = parseFloat(document.getElementById('counter-bid-modal').value);
            if(isNaN(newBid) || newBid < 0.1) newBid = 0.1;
            if(G.budget < newBid){ showToast('❌ Not enough budget!'); return; }
            const rounds = (msg.rounds||0) + 1;
            // Selling club accepts if the new offer meets their counter, or (with diminishing patience) something close to it.
            const tolerance = Math.max(0, 0.06 - rounds*0.02); // patience shrinks each round
            if(newBid >= msg.counterFee * (1 - tolerance)){
                action = 'accept';
                msg.finalFee = Math.max(newBid, msg.counterFee);
            } else if(rounds >= 3){
                // club loses patience after too many rounds
                G.inbox.splice(msgIdx,1);
                saveState(); closeModal();
                showToast(`❌ ${TEAMS[p.teamIndex]||'The club'} ended negotiations — too far apart on price.`);
                renderInbox(); return;
            } else {
                // Club raises their counter slightly, still under the original asking price
                const newCounter = Math.min(msg.askPrice, parseFloat((msg.counterFee - (msg.counterFee-newBid)*0.5).toFixed(2)));
                msg.counterFee = newCounter;
                msg.rounds = rounds;
                msg.body = `${TEAMS[p.teamIndex]||'The club'} reviewed your offer of ${fmt(newBid)} and now wants ${fmt(newCounter)} for ${p.name}.`;
                saveState(); closeModal();
                showToast(`📩 ${TEAMS[p.teamIndex]||'The club'} sent a new counter-offer.`);
                renderInbox(); return;
            }
        }
        if(action === 'accept'){
            const finalFee = msg.finalFee !== undefined ? msg.finalFee : msg.counterFee;
            if(G.budget < finalFee){ showToast('❌ Not enough budget!'); return; }
            const capCheck=checkSquadMaximum(G.squads[G.playerTeamIdx]);
            if(!capCheck.ok){ showToast('❌ '+capCheck.reason); return; }
            G.budget = parseFloat((G.budget - finalFee).toFixed(2));
            if(p.teamIndex >= 0 && p.teamIndex < 16 && Array.isArray(G.squads[p.teamIndex])){
                const origSq = G.squads[p.teamIndex];
                const origIdx = origSq.indexOf(p);
                if(origIdx >= 0){
                    origSq.splice(origIdx, 1);
                    if(p.inXI) setDefaultXI(origSq, G.tactics[p.teamIndex] || '4-3-3');
                }
            }
            const sellerName = p.teamIndex >= 16 ? (FOREIGN_CLUBS[p.teamIndex-16]||'European Club') : TEAMS[p.teamIndex];
            delete p._listed;
            p.teamIndex = G.playerTeamIdx;
            p.contract = rnd(2,4);
            p.isLoan = false; p.originalTeamIdx = -1; p.inXI = false; p.slotPos = null;
            if(Array.isArray(G.squads[G.playerTeamIdx])) G.squads[G.playerTeamIdx].push(p);
            G.transferMarket.splice(mIdx,1);
            G.inbox.splice(msgIdx,1);
            G.news.unshift({
                date: formatDate(G.currentDate),
                title: 'New Signing!',
                body: `${TEAMS[G.playerTeamIdx]} have agreed a deal with ${sellerName} to sign ${p.name} for ${fmt(finalFee)}.`,
                tags: ['transfer']
            });
            saveState(); closeModal();
            showToast(`✅ Deal done! ${p.name} signed for ${fmt(finalFee)}.`);
            renderAll();
        }
    }
    function sellPlayer(id){
        const sq=G.squads[G.playerTeamIdx];const idx=sq.findIndex(p=>p.id===id);if(idx<0)return;
        const p=sq[idx];
        if(p.inXI){showToast('❌ Remove from the Starting XI first!');return;}
        const check=checkSquadMinimum(sq,p);
        if(!check.ok){showToast('❌ '+check.reason);return;}
        const sp=Math.max(1,getPrice(p.ovr, p.age)-rnd(0,1));
        G.budget = parseFloat((G.budget + sp).toFixed(2));
        
        // If this player still has a live transfer-market listing (e.g. they were a real-club
        // listing before the manager took over this squad), remove that stale listing first —
        // otherwise the same object would end up duplicated: once in their new club's squad,
        // and once as a leftover standalone entry in the transfer market.
        if(p._listed){
            const mIdx = G.transferMarket.indexOf(p);
            if(mIdx >= 0) G.transferMarket.splice(mIdx, 1);
            delete p._listed;
        }
        // Sell the player to an actual Liga 1 club: place them in that club's real squad
        // (so the Squad tab for that club genuinely contains them) rather than just tagging
        // a fictional teamIndex onto a free-floating transfer-market entry.
        const buyerCandidates = [];
        for(let i=0;i<16;i++){ if(i!==G.playerTeamIdx && Array.isArray(G.squads[i])) buyerCandidates.push(i); }
        const buyerIdx = buyerCandidates.length ? pick(buyerCandidates) : -1;
        sq.splice(idx,1);
        if(buyerIdx >= 0){
            p.teamIndex = buyerIdx; p.isLoan = false; p.loanDuration = 0; p.originalTeamIdx = -1;
            p.contract = rnd(2,4); p.inXI = false; p.slotPos = null;
            G.squads[buyerIdx].push(p);
            setDefaultXI(G.squads[buyerIdx], G.tactics[buyerIdx] || '4-3-3');
        } else {
            // Extremely unlikely fallback (no other club exists): release as a free agent.
            p.teamIndex = -1;
            G.transferMarket.push(p);
        }
        
        saveState();showToast(`✅ ${p.name} sold for ${fmt(sp)}!`);renderAll();
    }
    function terminateLoan(id) {
        const sq=G.squads[G.playerTeamIdx];const idx=sq.findIndex(p=>p.id===id);if(idx<0)return;
        const p=sq[idx];
        if(p.inXI){showToast('❌ Remove from the Starting XI first!');return;}
        const check=checkSquadMinimum(sq,p);
        if(!check.ok){showToast('❌ '+check.reason);return;}
        
        p.isLoan = false;
        const origTeamIdx = p.originalTeamIdx;
        p.teamIndex = origTeamIdx;
        p.originalTeamIdx = -1; p.inXI = false; p.slotPos = null;
        sq.splice(idx,1);
        if(origTeamIdx >= 0 && origTeamIdx < 16 && Array.isArray(G.squads[origTeamIdx])){
            // Real Liga 1 club: send the player back to their actual squad rather than
            // dropping a free-floating market entry.
            G.squads[origTeamIdx].push(p);
            setDefaultXI(G.squads[origTeamIdx], G.tactics[origTeamIdx] || '4-3-3');
        } else {
            // No real club to return to (shouldn't normally happen) — release as free agent.

    function signProspect(msgId, pid) {
        const msg = G.inbox.find(m => m.id === msgId);
        if (!msg) return;
        const pIdx = msg.players.findIndex(p => p.id === pid);
        if (pIdx < 0) return;
        const capCheck=checkSquadMaximum(G.squads[G.playerTeamIdx]);
        if(!capCheck.ok){showToast('❌ '+capCheck.reason);return;}
        
        const p = msg.players[pIdx];
        p.teamIndex = G.playerTeamIdx;
        p.contract = 3;
        if(Array.isArray(G.squads[G.playerTeamIdx])) G.squads[G.playerTeamIdx].push(p);
        
        msg.players.splice(pIdx, 1);
        showToast(`✅ ${p.name} signed to the academy!`);

    // ─── Press Conference ──────────────────────────────────────
    // type: 'postmatch' (default, generic/result-aware) | 'prematch' | 'transfer'
    function openPressConference(type, resultCtx){
        type = type || 'postmatch';
        if(type==='prematch' && !G.pcPreMatchAvailable){ showToast('No pre-match press conference scheduled yet.'); return; }
        if(type==='transfer' && !G.pcTransferAvailable){ showToast('No transfer press conference scheduled yet.'); return; }
        if(type==='postmatch' && !G.pcAvailable){ showToast('No press conference scheduled right now.'); return; }
    
        let pool = PRESS_QUESTIONS;
        let title = '🎤 Press Conference';
        let q;
        if(type==='prematch'){
            title = '🎤 Pre-Match Press Conference';
            const nextOpp = (G.schedule[G.week] || []).find(m=>m[0]===G.playerTeamIdx||m[1]===G.playerTeamIdx);
            const oppIdx = nextOpp ? (nextOpp[0]===G.playerTeamIdx?nextOpp[1]:nextOpp[0]) : null;
            pool = oppIdx !== null ? getContextualPrematchPool(oppIdx) : PRESS_QUESTIONS_PREMATCH;
            q = JSON.parse(JSON.stringify(pick(pool)));
            const oppName = oppIdx !== null ? TEAMS[oppIdx] : 'the next opponent';
            q.q = q.q.replace(/\{opp\}/g, oppName);
        } else if(type==='transfer'){
            title = '🎤 Transfer Window Press Conference';
            pool = PRESS_QUESTIONS_TRANSFER;
            q = pick(pool);
        } else {
            title = '🎤 Post-Match Press Conference';
            if(!resultCtx){
                const myResults = G.leagueResults.filter(r=>(r.homeIdx===G.playerTeamIdx||r.awayIdx===G.playerTeamIdx)&&!r._pendingReveal);
                const last = myResults[myResults.length-1];
                if(last){
                    const isH = last.homeIdx===G.playerTeamIdx;
                    resultCtx = { myGoals: isH?last.homeScore:last.awayScore, oppGoals: isH?last.awayScore:last.homeScore };
                }
            }
            if(resultCtx && typeof resultCtx.myGoals === 'number' && typeof resultCtx.oppGoals === 'number'){
                if(resultCtx.myGoals > resultCtx.oppGoals) pool = PRESS_QUESTIONS_WIN;
                else if(resultCtx.myGoals < resultCtx.oppGoals) pool = PRESS_QUESTIONS_LOSS;
                else pool = PRESS_QUESTIONS_DRAW;
            }
            q = pick(pool);
        }
    
        document.getElementById('mtitle').innerHTML = title;
        document.getElementById('mbody').innerHTML=`
            <div style="font-size:.82rem;margin-bottom:12px;font-style:italic">"${q.q}"</div>
            ${q.opts.map((o,i)=>`<button class="pcq-opt" onclick="answerPress(${i},'${type}')">${o.label}</button>`).join('')}
        `;
        document.getElementById('mfoot').innerHTML=`<button class="btn btn-s btn-sm" onclick="skipPressConference('${type}')">Skip</button>`;
        document.getElementById('mov').classList.add('show');
        document.getElementById('mov').dataset.pcQuestion = JSON.stringify(q);
    }

    function startLiveMatch(){
        if(weekPendingIndex >= weekPendingMatches.length){
            renderAll(); showToast("All matches for this week are complete!"); return;
        }
        const item = weekPendingMatches[weekPendingIndex];
        if(!item.myMatch){
            weekPendingIndex++;
            playNextPendingMatch();
            return;
        }
        liveMatchState.min=0; liveMatchState.myMatch=item.myMatch;
        liveMatchState.compType=item.compType; liveMatchState.label=item.label;
        liveMatchState.dateStr=item.dateStr; liveMatchState.subsLeft=5; liveMatchState.isPaused=false;
        liveMatchState.weather=item.myMatch.weather?WEATHER_TYPES.find(w=>w.key===item.myMatch.weather):null;
        liveMatchState.isDerbyMatch=!!item.myMatch.isDerby;
        liveMatchState.processedEventIds = new Set();
        liveMatchState.homePossessionTicks = 0;
        liveMatchState.awayPossessionTicks = 0;
        liveMatchState.halftimeDone = false;
        liveMatchState.shout = null;
        liveMatchState.shoutUsed = false;
        liveMatchState.highlightsText = [];
        // Calculate attendance
        const capLvl = (G.stadium && G.stadium.capacityLevel) || 1;
        const baseCapacity = capLvl * 15000;
        const isDerby = liveMatchState.isDerbyMatch;
        const isHome = item.myMatch.homeIdx === G.playerTeamIdx;
        liveMatchState.attendance = isHome ? Math.round(baseCapacity * (G.fanSupport/100) * (isDerby ? 1.15 : 1.0)) : Math.round(baseCapacity * 0.6 * ((G.fanSupport||55)/100));
        const lb=document.getElementById('live-board');
        lb.className=`show theme-${liveMatchState.isDerbyMatch?'derby':item.compType}`;
        clearInterval(liveInterval);
        resetPitchAnim();
        renderLiveBoardFull();
        liveInterval=setInterval(()=>{
            if(liveMatchState.isPaused)return;
            liveMatchState.min=Math.min(liveMatchState.min+rnd(3,8),90);
            // Halftime check
            if (!liveMatchState.halftimeDone && liveMatchState.min >= 45) {
                liveMatchState.halftimeDone = true;
                liveMatchState.isPaused = true;
                clearInterval(liveInterval);
                playLongWhistle();
                const my2 = liveMatchState.myMatch;
                const htIsHome = my2 && my2.homeIdx === G.playerTeamIdx;
                const myScore  = my2 ? my2.events.filter(e=>e.type==='goal'&&e.team===(htIsHome?'home':'away')&&e.min<=45).length : 0;
                const oppScore = my2 ? my2.events.filter(e=>e.type==='goal'&&e.team===(htIsHome?'away':'home')&&e.min<=45).length : 0;
                document.getElementById('mtitle').innerHTML = `⏸️ Half Time — ${myScore} : ${oppScore}`;
                document.getElementById('mbody').innerHTML = `
                    <p style="font-size:.75rem;color:var(--dim);text-align:center;margin-bottom:14px">
                        Pilih pendekatan untuk babak kedua:
                    </p>
                    <div style="display:flex;flex-direction:column;gap:8px">
                        <button class="btn btn-p" onclick="applyTeamTalk('calm')">😌 Tetap Tenang — Jaga Irama (Moral +3)</button>
                        <button class="btn btn-s" onclick="applyTeamTalk('push')">🔥 Kejar / Pertahankan! (Moral +8, Energi -5)</button>
                        <button class="btn btn-g" onclick="applyTeamTalk('praise')">👏 Puji Penampilan (Moral +5, Chemistry +3)</button>
                    </div>`;
                document.getElementById('mfoot').innerHTML = '';
                document.getElementById('mov').classList.add('show');
                return;
            }
            updateLiveBoardDynamic();
            if(liveMatchState.min>=90){
                clearInterval(liveInterval);
                playLongWhistle();
                // Build highlights before rendering FT
                liveMatchState.highlightsText = buildMatchHighlights(liveMatchState.myMatch);
                setTimeout(()=>renderLiveBoardFull(),400);
            }
        },600);
    }

    function upgradeStadium(field){
        const lvl=G.stadium[field];
        if(lvl>=5){ showToast('Already at maximum level!'); return; }
        const cost=stadiumUpgradeCost(lvl);
        if(G.budget<cost){ showToast(`❌ You need ${fmt(cost)} for this upgrade!`); return; }

        showToast(`✅ Upgrade complete! Now Level ${lvl+1}.`);

    function processLoanOffer(id, action) {
        let msgIdx = G.inbox.findIndex(m => m.id === id);
        if(msgIdx < 0) return;
        let msg = G.inbox[msgIdx];
        let p = (G.squads[G.playerTeamIdx]||[]).find(x => x.id === msg.playerId);
        
        if (!p) {
            showToast("This player is no longer at the club.");
            G.inbox.splice(msgIdx, 1); saveState(); closeModal(); renderInbox(); return;
        }
        if (action === 'reject') {
            G.inbox.splice(msgIdx, 1);
            saveState(); closeModal(); renderInbox(); return;
        }
        
        // Read the value from the modal input
        let inputFee = parseFloat(document.getElementById('counter-fee-modal').value);
        if (isNaN(inputFee) || inputFee < 0.1) inputFee = 0.1;
        
        if (action === 'counter') {
            let maxWilling = parseFloat((p.price * 0.15).toFixed(1));
            if (maxWilling < 0.5) maxWilling = 0.5;
            if (maxWilling > 2.0) maxWilling = 2.0;
            
            if (inputFee <= maxWilling) {
                showToast(`✅ ${TEAMS[msg.targetTeamIdx]} accepted your counter-offer!`);
                action = 'accept';
                msg.fee = inputFee;
            } else {
                showToast(`❌ ${TEAMS[msg.targetTeamIdx]} rejected your counter-offer of ${fmt(inputFee)}.`);
                G.inbox.splice(msgIdx, 1);
                saveState(); closeModal(); renderInbox(); return;
            }
        }
        
        if (action === 'accept') {
            if(p.inXI) { showToast("❌ Remove from the Starting XI first!"); return; }
            const check=checkSquadMinimum(G.squads[G.playerTeamIdx], p);
            if(!check.ok){ showToast('❌ '+check.reason); return; }
            
            G.budget = parseFloat((G.budget + msg.fee).toFixed(2));
            p.isLoan = true;
            p.loanDuration = 1;
            p.originalTeamIdx = G.playerTeamIdx;
            p.teamIndex = msg.targetTeamIdx;
            
            if(Array.isArray(G.squads[G.playerTeamIdx])) G.squads[G.playerTeamIdx] = G.squads[G.playerTeamIdx].filter(x => x.id !== p.id);
            if(Array.isArray(G.squads[msg.targetTeamIdx])) G.squads[msg.targetTeamIdx].push(p);
            
            G.inbox.splice(msgIdx, 1);
            showToast(`✅ ${p.name} loaned out for ${fmt(msg.fee)}!`);
            saveState(); closeModal(); renderInbox();
        }
    }
    
    function requestBudget() {
        if ((G.budgetRequestsUsed || 0) >= 2) return;
        const row = G.leagueTable.find(x => x.teamIdx === G.playerTeamIdx);
        const pos = G.leagueTable.indexOf(row) + 1;
        let chance = 40; 
        if (pos <= 3) chance += 30; else if (pos <= 8) chance += 10; else if (pos >= 13) chance -= 30;   
        if (G.budget > 30) chance -= 20; if (G.budget < 10) chance += 20;
        chance += Math.round((G.boardConfidence-50)/4);
        G.budgetRequestsUsed = (G.budgetRequestsUsed || 0) + 1;
        
        if (Math.random() * 100 < chance) {
            const granted = rnd(5, 15); G.budget = parseFloat((G.budget + granted).toFixed(2));
            G.inbox.unshift({id: Math.random().toString(36).substr(2,9), title: 'Budget Request Approved ✅', body: `The board is very pleased with your performance. We have agreed to grant a transfer fund boost of ${fmt(granted)}.`, action: null, isRead: false});
            showToast(`✅ Approved! +${fmt(granted)}`);
        } else {
            let reason = "The club's financial situation does not allow for this right now.";
            if (pos > 10) reason = "Improve the team's league position before asking for more funds."; else if (G.budget >= 25) reason = "The current budget is considered more than sufficient.";
            G.inbox.unshift({id: Math.random().toString(36).substr(2,9), title: 'Budget Request Denied ❌', body: `The board has decided to deny your request. ${reason}`, action: null, isRead: false});
            showToast('❌ Request denied by the board.');
        }
        saveState(); renderManager();
    }
    
    function acceptJob(newTeamIdx, msgIdx){
        if(newTeamIdx === undefined || newTeamIdx === null) newTeamIdx = rnd(0, 15);
        if(confirm(`Are you sure you want to leave ${TEAMS[G.playerTeamIdx]} to join ${TEAMS[newTeamIdx]}?`)){
            G.playerTeamIdx = newTeamIdx; G.budget = Math.min(50, BASE_BUDGETS[newTeamIdx]); G.inbox.splice(msgIdx, 1);
            G.stadium.name = (TEAM_STADIUMS && TEAM_STADIUMS[newTeamIdx]) ? TEAM_STADIUMS[newTeamIdx] : TEAMS[newTeamIdx]+' Stadium';
            weekPendingMatches = []; weekPendingIndex = 0;
            // The squad the manager is taking over may contain players who are currently "for
            // sale" listings (references) left over from when this club was AI-controlled. Clear
            // those listings now — a manager's own players shouldn't be shown as buyable, and
            // leaving the flag set could later desync the listing from the squad (e.g. if the
            // player is sold/loaned through the normal squad-management flow).
            if(Array.isArray(G.squads[newTeamIdx])){
                G.squads[newTeamIdx].forEach(p=>{ if(p._listed){ delete p._listed; } });
            }
            G.transferMarket = G.transferMarket.filter(p => !(p.teamIndex === newTeamIdx && Array.isArray(G.squads[newTeamIdx]) && G.squads[newTeamIdx].includes(p)));
            G.log.unshift({cls:'info', text:`👔 The manager has officially joined ${TEAMS[newTeamIdx]}!`});
            G.news.unshift({date: formatDate(G.currentDate), title: 'Managerial Change!', body: `${TEAMS[newTeamIdx]} are proud to announce ${G.managerName} as their new head coach.`, tags:['club']});
            saveState(); renderAll(); showToast(`Welcome to ${TEAMS[newTeamIdx]}!`);
        }
    }
    
    function forceRetire(pid) {
        const sq = G.squads[G.playerTeamIdx]; const idx = sq.findIndex(p => p.id === pid); if(idx < 0) return;
        const oldP = sq[idx]; if(oldP.inXI) { showToast("❌ Remove from the Starting XI before retiring."); return; }
        // If this player still has a live transfer-market listing, remove it — a retired
        // player can no longer be bought.
        if(oldP._listed){
            const mIdx = G.transferMarket.indexOf(oldP);
            if(mIdx >= 0) G.transferMarket.splice(mIdx, 1);
        }
        const isForeign = Math.random() < 0.2; const origin = isForeign ? 'FR' : 'ID';
        const regen = genPlayer(oldP.pos, G.playerTeamIdx, false, origin);
        regen.age = rnd(17, 21); regen.ovr = rnd(50, 85); regen.isStar = regen.ovr >= 80; regen.price = getPrice(regen.ovr, regen.age);
        sq.splice(idx, 1); sq.push(regen);
        G.news.unshift({date: formatDate(G.currentDate), title: 'Player Hangs Up Boots', body: `${oldP.name} has announced retirement. The club has promptly promoted academy prospect ${regen.name} to the first team.`, tags:['club']});
        saveState(); closeModal(); renderAll(); showToast(`🎲 Gacha! ${regen.name} (OVR ${regen.ovr}) joins the squad!`);
    }
    
    function editPlayer(id, stat, amount) {
        let p = null;
        for(let i=0; i<G.squads.length; i++){if(!Array.isArray(G.squads[i]))continue;p=G.squads[i].find(x=>x.id===id);if(p)break;}
        if(!p) p=G.transferMarket.find(x=>x.id===id);
        if(p) {
            p[stat] = clamp(p[stat] + amount, 1, 99);
            if(stat === 'ovr') p.price = getPrice(p.ovr, p.age);
            if(p.ovr > p.pot) p.pot = p.ovr;
            saveState(); openPlayerModal(id);
        }
    }
    
    function forceMove(id) {
        let p = null; let sqIdx = -1; let inMarket = false;
        for(let i=0; i<G.squads.length; i++){
            if(!Array.isArray(G.squads[i]))continue;
            p=G.squads[i].find(x=>x.id===id); 
            if(p) { sqIdx = i; break; }
        }
        if(!p) {
            p = G.transferMarket.find(x=>x.id===id);
            inMarket = true;
        }
        if(p) {
            p.teamIndex = G.playerTeamIdx;
            p.isLoan = false; p.contract = 3; p.originalTeamIdx = -1;
            if(inMarket) G.transferMarket = G.transferMarket.filter(x=>x.id!==id);
            else if(Array.isArray(G.squads[sqIdx])) G.squads[sqIdx] = G.squads[sqIdx].filter(x=>x.id!==id);
            
            if(Array.isArray(G.squads[G.playerTeamIdx])) G.squads[G.playerTeamIdx].push(p);
            saveState(); closeModal(); renderAll(); showToast("⚡ Pemain ditarik ke klub Anda!");
        }
    }

    function startNewSeason(reward,finalPos,objectiveMet){
        const allPlayersHist=[]; G.squads.forEach((sq,ti)=>{if(Array.isArray(sq))sq.forEach(p=>allPlayersHist.push({...p,teamIdx:ti}));});
        const topScorerPlayer = [...allPlayersHist].sort((a,b)=>b.goals-a.goals)[0];
        G.history.push({

            weekPendingMatches=[]; weekPendingIndex=0;
            // The squad the manager is taking over may contain players who are currently "for
            // sale" listings (references) left over from when this club was AI-controlled. Clear
            // those listings now so the manager's own squad isn't shown as partially buyable and
            // can't later desync from the transfer market.
            if(Array.isArray(G.squads[newTeam])){
                G.squads[newTeam].forEach(p=>{ if(p._listed){ delete p._listed; } });
            }
            G.transferMarket = G.transferMarket.filter(p => !(p.teamIndex === newTeam && Array.isArray(G.squads[newTeam]) && G.squads[newTeam].includes(p)));
        }
        
        const finalStandingsTop4 = [...G.leagueTable].sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)).slice(0,4).map(x=>x.teamIdx);
    
        // ── Budget allocation for new season ──
        // Board gives a base allocation based on reputation & final position
        // Prize money is added on top of whatever budget remains
        const budgetAllocation = parseFloat((
            BASE_BUDGETS[G.playerTeamIdx] * (1 + G.reputation / 100) +
            (finalPos <= 3 ? 15 : finalPos <= 6 ? 8 : finalPos <= 10 ? 3 : 0) +
            (objectiveMet ? 5 : -2)
        ).toFixed(2));
        // Keep higher of: current budget or new allocation (don't punish good savers)
        const budgetBefore = G.budget;
        G.budget = parseFloat((Math.max(G.budget, budgetAllocation) + reward).toFixed(2));

        // ── Sponsors: expire old deals, generate new season offers ──
        const repFactor = Math.max(0.5, Math.min(2.0, G.reputation / 50));
        const newShirtValue = parseFloat((Math.random()*0.6+0.4+repFactor*0.3).toFixed(2));
        const newStadiumValue = parseFloat((Math.random()*0.4+0.2+repFactor*0.2).toFixed(2));
        const newShirtName = SPONSOR_NAMES_SHIRT[Math.floor(Math.random()*SPONSOR_NAMES_SHIRT.length)];
        const newStadiumName = SPONSOR_NAMES_STADIUM[Math.floor(Math.random()*SPONSOR_NAMES_STADIUM.length)];
        const oldShirt = G.sponsors && G.sponsors.shirt;
        const oldStadium = G.sponsors && G.sponsors.stadium;
        // Expire old sponsor
        if(oldShirt && oldShirt.weeksLeft <= 0){
            G.news.unshift({date:'Pra-Musim', title:'Sponsor Selesai', body:`Kontrak sponsor jersey dengan ${oldShirt.name} telah berakhir.`, tags:['club']});
        }
        if(oldStadium && oldStadium.weeksLeft <= 0){
            G.news.unshift({date:'Pra-Musim', title:'Sponsor Stadion Selesai', body:`Kontrak sponsor stadion dengan ${oldStadium.name} telah berakhir.`, tags:['club']});
        }
        // New season sponsor deals (auto-generated, inbox notification)
        G.sponsors = {
            shirt: { name: newShirtName, value: newShirtValue, weeksLeft: 30 },
            stadium: { name: newStadiumName, value: newStadiumValue, weeksLeft: 30 }
        };
        G.inbox.unshift({id:Math.random().toString(36).substr(2,9), isRead:false,
            title:'🤝 Kontrak Sponsor Baru',

            action:null, type:'sponsor_shirt'});

        G.budgetRequestsUsed = 0; G.season++; G.week=0; G.phase='preseason'; G.preseasonWeeksLeft=8;
        G.boardObjective = generateBoardObjective(finalPos);
        G.pcAvailable = true;

        G.leagueResults=[]; G.schedule=buildSchedule(); G.lcaTeamIndices=finalStandingsTop4;
        G.acl=null; G.cupBracket={"Round of 16":[...Array(16).keys()].sort(()=>Math.random()-.5).reduce((res,k,i,arr)=>i%2===0?[...res,[arr[i],arr[i+1]==15?99:arr[i+1]]]:res,[])}; G.cupResults={}; G.cupRoundsPlayed={}; G.cupWinner=null;
        
        G.squads.forEach((sq,ti)=>{

                    p.isLoan = false; p.teamIndex = p.originalTeamIdx;
                    if(p.teamIndex === -1) G.transferMarket.push(p); else if (G.squads[p.teamIndex]) G.squads[p.teamIndex].push(p);
                    sq.splice(i, 1);
                }

            sq.forEach(p=>{
                p.energy=100; p.contract--; p.age++; p.injury=0;
                let gro=0;
                if(p.age < 24 && p.ovr < p.pot) gro = rnd(1, 3);
                else if(p.age >= 24 && p.age < 30 && p.ovr < p.pot) gro = rnd(0, 2);
                else if(p.age >= 30) gro = rnd(-3, 0); 
                
                if(p.appearances > 15 && p.age < 30 && p.ovr < p.pot) gro += 1;
                if(p.goals > 10 && p.ovr < p.pot) gro += 1;
                
                p.ovr = clamp(p.ovr + gro, 40, 95);
                if(p.ovr > p.pot) p.pot = p.ovr;
                p.isStar = p.ovr >= 80;
                p.goals = 0; p.assists = 0; p.appearances = 0; p.cleanSheets = 0; p.totalRating=0; p.ratingCount=0;
                p.goals_league=0; p.goals_cup=0; p.goals_lca=0; p.assists_league=0; p.assists_cup=0; p.assists_lca=0;
                p.yellowCards = 0; // reset yellow card accumulation each season
                // suspension carries over if multi-match (decrement by season length would be too harsh, just keep remaining)
                p.price = getPrice(p.ovr, p.age);
            });
            for(let i=sq.length-1; i>=0; i--){
                const p = sq[i];
                if(p.age >= 34) {
                    let chance = p.age === 34 ? 0.3 : (p.age === 35 ? 0.5 : (p.age === 36 ? 0.75 : 1.0));
                    if(Math.random() < chance) {

                        // If this retiring player currently has a live transfer-market listing
                        // (a reference to this same object), remove that listing too — a retired
                        // player can no longer be bought.
                        if(p._listed){
                            const mIdx = G.transferMarket.indexOf(p);
                            if(mIdx >= 0) G.transferMarket.splice(mIdx, 1);
                        }
                        const origin = ti < 16 ? rollDomesticBiasedOrigin() : 'ID';
                        const regen = genPlayer(POS_MAP[p.pos].c, ti, false, origin);
                        regen.age = rnd(17, 21); regen.ovr = rnd(50, 85); regen.isStar = regen.ovr >= 80; regen.price = getPrice(regen.ovr, regen.age);
                        sq.splice(i, 1, regen);
                    }
                }
            }
            const expired = sq.filter(p=>p.contract<=0 && !p.isLoan);
            expired.forEach(p=>{
                const idx=sq.indexOf(p); p.teamIndex = -1; p.contract = rnd(2,4); p.price = getPrice(p.ovr, p.age);
                // If this player was already a live listing in the transfer market (still

                if(p._listed){ delete p._listed; }

                sq.splice(idx, 1);
                if(ti === G.playerTeamIdx) G.news.unshift({ date: 'Pra-Musim', title: 'Bebas Transfer', body: `${p.name} telah meninggalkan ${TEAMS[G.playerTeamIdx]} secara gratis setelah kontraknya habis.`, tags:['transfer']});
                const origin = ti < 16 ? rollDomesticBiasedOrigin() : 'ID';
                const np = genPlayer(POS_MAP[p.pos].c,ti,false, origin); np.price = getPrice(np.ovr, np.age); sq.push(np);
            });
            setDefaultXI(sq,G.tactics[ti]);

        for(let i=G.transferMarket.length-1; i>=0; i--){
             const p = G.transferMarket[i];
             // Players that are just a real-club listing (p._listed) are part of their club's
             // actual squad and already get aged/regenerated by the squad-processing loop above.
             // Aging them again here would double-age them and could desync them from their squad.
             if(p._listed) continue;
             p.age++; p.totalRating=0; p.ratingCount=0;
             if(p.age >= 34) {
                 let chance = p.age === 34 ? 0.3 : (p.age === 35 ? 0.5 : (p.age === 36 ? 0.75 : 1.0));
                 if(Math.random() < chance) {
                     const origin = rollDomesticBiasedOrigin();

                     regen.age = rnd(17, 21); regen.ovr = rnd(50, 85); regen.isStar = regen.ovr >= 80; regen.price = 0; 
                     G.transferMarket.splice(i, 1, regen);
                 }
             }
        }
        for(let i=0; i<30; i++) {
            const p = genTransferPlayer(G.squads, G.playerTeamIdx);

        }
        G.transferMarket.sort((a,b)=>b.ovr-a.ovr);
        // Enforce the market size cap AFTER all of this preseason's additions (expired-contract
        // releases + the 30 freshly generated listings) so the cap reflects the true total rather
        // than only limiting the generate-loop while expired-contract pushes bypass it entirely.
        while(G.transferMarket.length > 200){
            // Discard the lowest-OVR listing (market is sorted descending, so that's the last
            // entry) rather than the best one. If it was just a real-club listing, clear the
            // flag so that player simply remains a normal squad player, not "for sale" forever.
            const discarded = G.transferMarket.pop();
            if(discarded) delete discarded._listed;
        }

    }

    function openTeamModal(tid){
        const sq=G.squads[tid]||[];const xi=sq.filter(p=>p.inXI).sort((a,b)=>POS_ORDER[a.pos]-POS_ORDER[b.pos]);
        let html=`<div style="font-size:.75rem;color:var(--dim);margin-bottom:10px">Taktik: ${G.tactics[tid]} ${isDerby(tid,G.playerTeamIdx)?'<span class="derby-badge">RIVAL ANDA</span>':''}</div><div class="sec">XI Inti</div>`;
        xi.forEach(p=>{html+=`<div class="row bt" style="font-size:.75rem;border-bottom:1px solid var(--sf2);padding:4px 0;cursor:pointer" onclick="openPlayerModal('${p.id}')"><span><b style="color:var(--gold);display:inline-block;width:30px">${p.slotPos}</b> <span class="${p.injury>0?'injured-text':''}">${p.name}</span></span><b class="${ovrCls(p.ovr)}">${p.ovr}</b></div>`;});
        html+=`<div class="sec" style="margin-top:10px">Cadangan Terbaik</div>`;
        sq.filter(p=>!p.inXI).sort((a,b)=>b.ovr-a.ovr).forEach(p=>{
            const listedBadge = p._listed
                ? `<span style="font-size:.55rem;background:var(--gold);color:#000;border-radius:3px;padding:1px 4px;margin-left:4px">LISTED</span>`
                : '';
            html+=`<div class="row bt" style="font-size:.75rem;border-bottom:1px solid var(--sf2);padding:4px 0;cursor:pointer" onclick="openPlayerModal('${p.id}')"><span><b style="color:var(--dim);display:inline-block;width:30px">${p.pos}</b> <span class="${p.injury>0?'injured-text':''}">${p.name}</span>${listedBadge}</span><b class="${ovrCls(p.ovr)}">${p.ovr}</b></div>`;
        });
        document.getElementById('mtitle').innerHTML=`🛡️ ${TEAMS[tid]}`;
        document.getElementById('mbody').innerHTML=html;
        document.getElementById('mfoot').innerHTML=`<button class="btn btn-s btn-sm" onclick="closeModal()">Tutup</button>`;
        document.getElementById('mov').classList.add('show');
    }
    
    function selectTeamPrompt(){
        let html=`<div style="margin-bottom:15px"><div class="sec">1. Nama Manajer</div><input type="text" id="mgrNameInp" class="input-text" placeholder="Masukkan Nama..." value="Manajer"></div><div class="sec">2. Pilih Klub Anda</div><div style="display:flex;flex-direction:column;gap:5px;max-height:45vh;overflow-y:auto;padding-right:5px">`;
        TEAMS.forEach((name,i)=>{
            const bgt=Math.min(50,BASE_BUDGETS[i]+rnd(-5,5));const sq=G.squads[i];
            const effOvr=Math.round(sq.filter(p=>p.inXI).reduce((s,p)=>s+getEffOvr(p,p.slotPos),0)/11)||0;
            html+=`<button class="btn btn-s" style="justify-content:space-between;padding:10px 12px;display:flex;align-items:center;" onclick="applyTeam(${i},${bgt})"><div style="text-align:left;flex:1"><div style="font-weight:700;font-size:.9rem">${i+1}. ${name}</div><div style="font-size:.65rem;color:var(--wh);margin-top:4px">OVR: <b style="color:var(--gg)">${effOvr}</b></div></div><div style="text-align:right"><div style="font-size:.65rem;color:var(--dim)">Anggaran</div><div style="font-size:.9rem;font-weight:900;color:var(--gold)">${bgt} M</div></div></button>`;
        });
        html+=`</div>`;
        document.getElementById('mtitle').innerHTML=`<h2 style="color:var(--gold);margin:0">⚽ Mulai Karir</h2>`;
        document.getElementById('mbody').innerHTML=html;document.getElementById('mfoot').innerHTML='';
        document.getElementById('mov').classList.add('show');
    }
    function applyTeam(idx,budget){
        const mName=document.getElementById('mgrNameInp').value.trim()||'Manajer';
        G.managerName=mName;G.playerTeamIdx=idx;G.budget=parseFloat(budget.toFixed(1));
        G.tactics[idx]='4-3-3';setDefaultXI(G.squads[idx],'4-3-3');
        G.stadium.name = (TEAM_STADIUMS && TEAM_STADIUMS[idx]) ? TEAM_STADIUMS[idx] : TEAMS[idx]+' Stadium';
        // The initial transfer market was generated before the player's club was known, so it
        // may contain "for sale" listings that are really references to players in the squad the
        // user just took over. Clear those listings now so the user's own squad is never partially
        // shown as available to buy (and so it can't desync later when those players are sold/transferred).
        if(Array.isArray(G.squads[idx])){
            G.squads[idx].forEach(p=>{ if(p._listed){ delete p._listed; } });
        }
        G.transferMarket = G.transferMarket.filter(p => !(p.teamIndex === idx && Array.isArray(G.squads[idx]) && G.squads[idx].includes(p)));
        saveState();closeModal(true);renderAll();showToast(`Selamat datang di ${TEAMS[idx]}, ${mName}!`);
    }
    
    function isModalBlocking(){
        const movEl=document.getElementById('mov');
        if(!movEl.classList.contains('show')) return false;
        const titleHtml=document.getElementById('mtitle').innerHTML;
        const bodyHtml=document.getElementById('mbody').innerHTML;
        if(titleHtml.includes('Mulai Karir')) return true;
        if(bodyHtml.includes('Musim') && bodyHtml.includes('Berakhir')) return true;
        return false;
    }
    function refreshModalCloseBtn(){
        const btn=document.getElementById('mclose');
        if(!btn) return;
        btn.style.display = isModalBlocking() ? 'none' : 'flex';
    }
    (function watchModalBlocking(){
        const mov=document.getElementById('mov');
        const mbody=document.getElementById('mbody');
        if(!mov||!mbody) return;
        const obs1=new MutationObserver(refreshModalCloseBtn);
        obs1.observe(mov,{attributes:true,attributeFilter:['class']});
        const obs2=new MutationObserver(refreshModalCloseBtn);
        obs2.observe(mbody,{childList:true,subtree:false});
    })();
    function closeModal(force=false){
        if(isModalBlocking() && !force) return;
        document.getElementById('mov').classList.remove('show');
    }
    function handleModalBackdropClick(e){
        if(e.target && e.target.id==='mov') closeModal();
    }
    
    let activeTab='dash';
    const RENDERERS={dash:renderDash,squad:renderSquad,league:renderLeague,stats:renderStats,schedule:renderSchedule,cup:renderCup,lca:renderLCA,transfer:renderTransfer,news:renderNews,manager:renderManager, inbox:renderInbox};
    function renderTab(tab){
        try{
            if(isModalBlocking())return;
            activeTab=tab;
            document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
            const activeBtn=document.querySelector(`.tb[data-tab="${tab}"]`);
            if(activeBtn) activeBtn.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
            if(RENDERERS[tab])RENDERERS[tab]();
            const hint=document.getElementById('swipe-hint');
            if(hint) hint.innerHTML=TAB_ORDER.map(t=>`<span class="${t===activeTab?'cur':''}"></span>`).join('');
        }catch(e){console.error("Tab Error",e);}
    }
    function renderAll(){updateHeader();renderTab(activeTab);}
    function switchTab(tab, dir){
        swapIdA=null;
        const prevIdx=TAB_ORDER.indexOf(activeTab);
        const nextIdx=TAB_ORDER.indexOf(tab);
        if(!dir && prevIdx>=0 && nextIdx>=0) dir = nextIdx>prevIdx ? 'left' : nextIdx<prevIdx ? 'right' : null;
        renderTab(tab);
        const mainEl=document.getElementById('main');
        mainEl.scrollTop=0;
        if(dir && mainEl){
            mainEl.classList.remove('slide-in-left','slide-in-right');
            void mainEl.offsetWidth;
            mainEl.classList.add(dir==='left' ? 'slide-in-left' : 'slide-in-right');
            setTimeout(()=>mainEl.classList.remove('slide-in-left','slide-in-right'), 300);
        }
    }
    document.querySelectorAll('.tb').forEach(btn=>{btn.addEventListener('click',()=>switchTab(btn.dataset.tab));});
    
    (function setupSwipeNav(){
        const mainEl=document.getElementById('main');
        let touchStartX=0, touchStartY=0, touchActive=false, startedOnScrollable=false, dragX=0, isDragging=false;
        const DRAG_RESISTANCE=0.55; 
        const COMMIT_THRESHOLD=65;
    
        function resetDragVisual(){
            mainEl.style.transition='transform .22s cubic-bezier(.22,.68,0,1.01)';
            mainEl.style.transform='translateX(0)';
            mainEl.classList.remove('drag-tracking');
        }
    
        mainEl.addEventListener('touchstart', e=>{
            if(document.getElementById('mov').classList.contains('show')) { touchActive=false; return; }
            if(document.getElementById('live-board').classList.contains('show')) { touchActive=false; return; }
            const t=e.touches[0];
            touchStartX=t.clientX; touchStartY=t.clientY; touchActive=true; isDragging=false; dragX=0;
            let el=e.target;
            startedOnScrollable=false;
            while(el && el!==mainEl){
                if(el.scrollWidth>el.clientWidth+4 && getComputedStyle(el).overflowX!=='visible'){ startedOnScrollable=true; break; }
                el=el.parentElement;
            }
        }, {passive:true});
    
        mainEl.addEventListener('touchmove', e=>{
            if(!touchActive || startedOnScrollable) return;
            const t=e.touches[0];
            const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
            if(!isDragging){
                if(Math.abs(dx)>14 && Math.abs(dx)>Math.abs(dy)*1.6) isDragging=true;
                else if(Math.abs(dy)>14) { touchActive=false; return; } 
            }
            if(isDragging){
                const curIdx=TAB_ORDER.indexOf(activeTab);
                let allowedDx=dx;
                if(dx>0 && curIdx<=0) allowedDx=dx*0.25;
                if(dx<0 && curIdx>=TAB_ORDER.length-1) allowedDx=dx*0.25;
                dragX=allowedDx;
                mainEl.classList.add('drag-tracking');
                mainEl.style.transform=`translateX(${allowedDx*DRAG_RESISTANCE}px)`;
            }
        }, {passive:true});
    
        mainEl.addEventListener('touchend', e=>{
            if(!touchActive){ return; }
            touchActive=false;
            if(!isDragging){ return; }
            isDragging=false;
            const curIdx=TAB_ORDER.indexOf(activeTab);
            const committed = Math.abs(dragX) > COMMIT_THRESHOLD;
            if(committed && dragX<0 && curIdx<TAB_ORDER.length-1){
                mainEl.style.transition='transform .16s ease-out';
                mainEl.style.transform=`translateX(-40px)`;
                setTimeout(()=>{
                    mainEl.style.transition='none'; mainEl.style.transform='translateX(0)'; mainEl.classList.remove('drag-tracking');
                    switchTab(TAB_ORDER[curIdx+1],'left');
                },120);
            } else if(committed && dragX>0 && curIdx>0){
                mainEl.style.transition='transform .16s ease-out';
                mainEl.style.transform=`translateX(40px)`;
                setTimeout(()=>{
                    mainEl.style.transition='none'; mainEl.style.transform='translateX(0)'; mainEl.classList.remove('drag-tracking');
                    switchTab(TAB_ORDER[curIdx-1],'right');
                },120);
            } else {
                resetDragVisual();
            }
        }, {passive:true});
    
        mainEl.addEventListener('touchcancel', ()=>{ touchActive=false; isDragging=false; resetDragVisual(); }, {passive:true});
    })();
    
    function init(){
        try{
            const savedTheme = localStorage.getItem('fmweb_theme');
            applyTheme(savedTheme === 'light' ? 'light' : 'dark');
        }catch(e){}
        try{
            const legacy=localStorage.getItem('mliv16');
            if(legacy && !localStorage.getItem(slotKey(1))){
                localStorage.setItem(slotKey(1), legacy);
            }
        }catch(e){}
        if(!loadState()){G=freshState();selectTeamPrompt();}
        else{
            migrateState();
            weekPendingMatches=[];weekPendingIndex=0;
            // Safety net: if the page was reloaded/closed after advanceWeek() simulated the user's
            // match but before they pressed PLAY to watch it, the in-memory pending-match queue is
            // lost on reload. Rather than leave that match's result stuck "hidden" forever (which
            // would desync the league table), silently reveal it now so the game state stays consistent.
            if(Array.isArray(G.leagueResults)){
                G.leagueResults.forEach(r=>{ if(r && r._pendingReveal) applyMyMatchConsequences(r); });
            }
            updateHeader();renderTab('dash');
        }
    }

    init();
</script>

<!-- PWA: Service Worker registration for offline play -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('FM Web: offline support active', reg.scope))
      .catch(err => console.warn('FM Web: SW registration failed', err));
  });
}

// PWA: capture install prompt so we can trigger it at a good moment
let _fmInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _fmInstallPrompt = e;
  // Show a subtle install badge in the header after a short delay
  setTimeout(() => {
    const hdr = document.getElementById('hdr');
    if (hdr && _fmInstallPrompt) {
      const btn = document.createElement('button');
      btn.id = 'pwa-install-btn';
      btn.textContent = '📲 Install';
      btn.title = 'Install game untuk dimainkan offline';
      btn.style.cssText = 'font-size:.6rem;padding:3px 8px;border-radius:6px;border:1px solid var(--gg);background:rgba(61,186,130,.15);color:var(--gg);cursor:pointer;font-weight:700;flex-shrink:0';
      btn.addEventListener('click', () => {
        _fmInstallPrompt.prompt();
        _fmInstallPrompt.userChoice.then(r => {
          if (r.outcome === 'accepted') btn.remove();
          _fmInstallPrompt = null;
        });
      });
      // Insert before the last child (toast/etc) in header
      const badgeRow = hdr.querySelector('.row');
      if (badgeRow) badgeRow.appendChild(btn);
    }
  }, 4000);
});
</script>
