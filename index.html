    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --gd:#0d3b2e;--gm:#1a5c44;--gl:#2d8c63;--gg:#3dba82;
            --bd:#0a1f3c;--bm:#1a3a6b;--bl:#2d6abf;--bg2:#4a9eff;
            --gold:#f0c040;--red:#e85555;--orng:#e67e22;
            --bg:#0a1812;--sf:#0f2418;--sf2:#172e20;--card:#1c3828;--brd:#2a5040;
            --txt:#d4eadc;--dim:#7aab8a;--mut:#4a7a5a;--wh:#f0f8f2;
            --shd:0 4px 20px rgba(0,0,0,.5);--r:10px;--rs:6px;
        }
        /* ─── E6: Soft Light Theme ─────────────────────────────── */
        body.light-mode{
            --gd:#bfe0cf;--gm:#a8d6bd;--gl:#2d8c63;--gg:#1f9e63;
            --bd:#3a6ea8;--bm:#4a7fc0;--bl:#2d6abf;--bg2:#3a7fd1;
            --gold:#b8860b;--red:#cf3a3a;--orng:#d2691e;
            --bg:#f4f1ea;--sf:#ece7da;--sf2:#e3ddcb;--card:#fbf9f3;--brd:#d8d0bd;
            --txt:#2b2a26;--dim:#6b6657;--mut:#8a8472;--wh:#f0f8f2;
            --shd:0 4px 16px rgba(60,50,30,.12);
        }
        body.light-mode #live-board,body.light-mode #live-board *,body.light-mode #live-mini-bar,body.light-mode #live-mini-bar *{
            /* Live match broadcast view stays dark/immersive in both themes, like a TV overlay */
            --gd:#0d3b2e;--gm:#1a5c44;--gl:#2d8c63;--gg:#3dba82;
            --bd:#0a1f3c;--bm:#1a3a6b;--bl:#2d6abf;--bg2:#4a9eff;
            --bg:#0a1812;--sf:#0f2418;--sf2:#172e20;--card:#1c3828;--brd:#2a5040;
            --txt:#d4eadc;--dim:#7aab8a;--mut:#4a7a5a;--wh:#f0f8f2;
        }
        html,body,#hdr,#app,#tabs,.card,.badge,.btn{transition:background-color .25s ease,color .25s ease,border-color .25s ease;}

        html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Segoe UI',sans-serif;font-size:14px;overflow-x:hidden;overscroll-behavior:none;}
        #app{display:flex;flex-direction:column;height:100dvh;max-width:540px;margin:0 auto;position:relative;background:var(--bg)}
        @media(min-width:541px){#app{border-left:1px solid var(--brd);border-right:1px solid var(--brd)}}
        #hdr{background:linear-gradient(135deg,var(--gd),var(--bd));border-bottom:2px solid var(--gl);padding:8px 14px 6px;position:sticky;top:0;z-index:100}
        #hdr h1{font-size:.9rem;font-weight:800;color:var(--gg);letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
        #hdr-meta{display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap;}
        .badge{background:var(--sf2);border:1px solid var(--brd);border-radius:20px;padding:2px 10px;font-size:.72rem;color:var(--dim)}
        .badge.hi{border-color:var(--gl);color:var(--gg)}.badge.gld{border-color:var(--gold);color:var(--gold)}
        .badge.wthr{border-color:var(--bg2);color:var(--bg2)}
        #bgt{margin-left:auto}
        #tabs{display:flex;background:var(--sf);border-bottom:2px solid var(--brd);overflow-x:auto;scrollbar-width:none;flex-shrink:0;position:relative;}
        #tabs::-webkit-scrollbar{display:none}
        /* Diperbesar agar lebih mudah di-tap di HP */
        .tb{flex:1;min-width:65px;padding:12px 2px;font-size:.75rem;font-weight:700;color:var(--mut);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:color 0.2s;min-height:48px;}
        .tb.active{color:var(--gg);border-bottom-color:var(--gg)}
        .tb.has-notif { position: relative; }
        .tb.has-notif::after { content: ''; position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; border: 2px solid var(--sf); }
        #main{flex:1;overflow-y:auto;padding:10px;padding-bottom:30px;position:relative;}
        #main.slide-in-left{animation:slideInLeft .26s cubic-bezier(.22,.68,0,1.01);}
        #main.slide-in-right{animation:slideInRight .26s cubic-bezier(.22,.68,0,1.01);}
        @keyframes slideInLeft{from{transform:translateX(28px);opacity:.4}to{transform:translateX(0);opacity:1}}
        @keyframes slideInRight{from{transform:translateX(-28px);opacity:.4}to{transform:translateX(0);opacity:1}}
        #main.drag-tracking{transition:none!important;}
        #swipe-hint{display:flex;justify-content:center;gap:4px;padding:4px 0 8px;}
        #swipe-hint span{width:5px;height:5px;border-radius:50%;background:var(--brd);transition:all .2s}
        #swipe-hint span.cur{background:var(--gg);width:14px;border-radius:4px}
        .sec{font-size:.72rem;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--brd)}
        .card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:11px;margin-bottom:9px}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:10px 14px;border:none;border-radius:var(--rs);font-size:.78rem;font-weight:700;cursor:pointer;text-transform:uppercase;transition:all 0.15s;min-height:40px;}
        .btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;pointer-events:none}
        .btn-p{background:var(--gl);color:#fff}.btn-s{background:var(--bm);color:#fff}
        .btn-g{background:var(--gold);color:#1a1200}.btn-d{background:var(--red);color:#fff}
        .btn-sm{padding:6px 10px;font-size:.72rem;min-height:32px}.btn-blk{width:100%}
        .row{display:flex;gap:8px;align-items:center}.row.bt{justify-content:space-between}
        .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
        .g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
        .ovr{display:inline-block;min-width:30px;text-align:center;padding:2px 4px;border-radius:4px;font-size:.78rem;font-weight:800}
        .ovr-h{background:#1a5c1a;color:#6eff6e}.ovr-m{background:#4a3a00;color:var(--gold)}.ovr-l{background:#4a1515;color:#ff7777}
        .pos{font-size:.6rem;font-weight:800;padding:2px 5px;border-radius:3px}
        .pos-GK{background:#2a1a5a;color:#c0a0ff}.pos-DEF{background:#1a3a5a;color:#80c0ff}
        .pos-MID{background:#1a4a2a;color:#80ff90}.pos-FWD{background:#5a2020;color:#ff9090}
        .pill{background:var(--sf2);border-radius:20px;padding:2px 8px;font-size:.7rem;font-weight:600;border:1px solid var(--brd)}
        .input-text{background:var(--sf);color:var(--wh);border:1px solid var(--brd);padding:8px 12px;border-radius:var(--rs);width:100%;font-weight:bold;font-size:1rem}
        .tbl{width:100%;border-collapse:collapse;font-size:.74rem}
        .tbl th{color:var(--mut);text-align:left;padding:5px 4px;border-bottom:1px solid var(--brd)}
        .tbl td{padding:5px 4px;border-bottom:1px solid var(--sf2)}
        .tbl tr.me td{color:var(--gg);font-weight:700}
        .tbl td.n,.tbl th.n{text-align:right}
        .team-link{color:var(--bg2);cursor:pointer;text-decoration:underline;font-weight:600}
        .mlog{list-style:none}
        .mlog li{padding:6px 9px;background:var(--sf2);border-radius:var(--rs);margin-bottom:4px;font-size:.76rem;border-left:3px solid var(--brd)}
        .mlog li.win{border-left-color:var(--gg)}.mlog li.draw{border-left-color:var(--gold)}.mlog li.loss{border-left-color:var(--red)}
        .selected-swap{border:2px dashed var(--gold)!important;background-color:rgba(240,192,64,0.2)!important;box-shadow:0 0 12px var(--gold)!important;opacity:0.9;}
        .pdot-circle.selected-swap{border:3px dashed var(--gold)!important;transform:scale(1.15)!important;}
        .plc{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--sf2);border-radius:var(--rs);border:1px solid var(--brd);margin-bottom:5px;cursor:pointer;transition:all .15s}
        .pln{font-weight:700;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .info-btn{background:var(--brd);color:var(--wh);border:none;border-radius:50%;width:26px;height:26px;font-size:.68rem;font-weight:bold;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
        .info-btn::before{content:'';position:absolute;top:50%;left:50%;width:44px;height:44px;transform:translate(-50%,-50%);}
        .chem-bar { height: 6px; border-radius: 3px; background: var(--sf); overflow: hidden; margin-top: 5px; border: 1px solid var(--brd); }
        .chem-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--red), var(--gold), var(--gg)); transition: width 0.3s ease; }
        .stat-bar { height: 6px; border-radius: 3px; background: var(--sf); overflow: hidden; margin-top: 5px; border: 1px solid var(--brd); }
        .stat-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
        .pitch-wrap{position:relative;width:100%;background:linear-gradient(90deg,#1a6b30 0%,#1e7a35 50%,#1a6b30 100%);border-radius:8px;overflow:hidden;border:2px solid #3a9a50}
        .pitch-wrap.vertical{aspect-ratio:9/13}
        .pitch-wrap.horizontal{aspect-ratio:16/9;min-height:180px}
        .pitch-lines{position:absolute;inset:0;pointer-events:none}

function playWhistle() {
    try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
}
function playDoubleWhistle() {
    try {
        const ctx = getAudio();
        [0, 0.25].forEach(offset => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(1200, ctx.currentTime + offset);

}

            const gain = ctx.createGain();

}
function playAmbulance() {
    try {
        const ctx = getAudio();
        const freqs = [600, 480];
        const steps = 6;
        for (let s = 0; s < steps; s++) {
            const osc = ctx.createOscillator();

// ─── E2: Player Rating Heatmap ──────────────────────────────
// Continuous red->yellow->green gradient (vs. the 5-tier rating-chip classes) so the pitch heatmap
// reads as a smooth performance gradient rather than blocky color bands.
function getRatingColor(r){
    r = Math.max(4, Math.min(9.5, r));
    const t = (r - 4) / 5.5;
    let rr, gg, bb;
    if(t < 0.5){
        const tt = t / 0.5;
        rr = 220; gg = Math.round(40 + tt*150); bb = 40;
    } else {
        const tt = (t-0.5)/0.5;
        rr = Math.round(220 - tt*170); gg = Math.round(190 + tt*30); bb = Math.round(40 + tt*40);
    }
    return `rgb(${rr},${gg},${bb})`;
}

// Determines which question pool fits the upcoming opponent best. Checked in priority order:
// derby rivalry first (most distinctive context), then table-position stakes, then raw squad
// strength gap, then the user's recent form — falling back to the generic pool if nothing
// distinctive stands out about this particular fixture.
function getContextualPrematchPool(oppIdx){
    const myIdx = G.playerTeamIdx;
    if(isDerby(myIdx, oppIdx) || isDerby(oppIdx, myIdx)) return PRESS_QUESTIONS_DERBY;
    if(Array.isArray(G.leagueTable) && G.leagueTable.length >= 16){
        const myRow = G.leagueTable.find(x=>x.teamIdx===myIdx);
        const oppRow = G.leagueTable.find(x=>x.teamIdx===oppIdx);
        if(myRow && oppRow){
            const myRank = G.leagueTable.indexOf(myRow)+1;
            const oppRank = G.leagueTable.indexOf(oppRow)+1;
            const n = G.leagueTable.length;
            const rankGap = Math.abs(myRank - oppRank);
            // Close rivalry near the top of the table (title race) or bottom (relegation fight)
            if(rankGap <= 3 && myRank <= 6 && oppRank <= 6) return PRESS_QUESTIONS_TITLE_RIVAL;
            if(rankGap <= 3 && myRank >= n-5 && oppRank >= n-5) return PRESS_QUESTIONS_RELEGATION_RIVAL;
        }
    }
    const myStr = teamStrength(myIdx, getTeamTactic(myIdx));
    const oppStr = teamStrength(oppIdx, getTeamTactic(oppIdx));
    const strDiff = myStr - oppStr;
    if(strDiff >= 12) return PRESS_QUESTIONS_FAVOURITE;
    if(strDiff <= -12) return PRESS_QUESTIONS_UNDERDOG;
    if(Array.isArray(G.leagueResults)){
        const recent = G.leagueResults.filter(r=>!r._pendingReveal && (r.homeIdx===myIdx||r.awayIdx===myIdx)).slice(-3);
        if(recent.length === 3){
            const outcomes = recent.map(r=>{
                const isH = r.homeIdx===myIdx;
                const my = isH?r.homeScore:r.awayScore, opp = isH?r.awayScore:r.homeScore;
                return my>opp ? 'W' : my<opp ? 'L' : 'D';
            });
            if(outcomes.every(o=>o==='W')) return PRESS_QUESTIONS_WINNING_STREAK;
            if(outcomes.every(o=>o==='L')) return PRESS_QUESTIONS_LOSING_STREAK;
        }
    }
    return PRESS_QUESTIONS_PREMATCH;
}

// Buckets each formation into a broad attacking/balanced/defensive character so AI clubs can pick

// Called periodically during the league phase so AI opponents react to how their season is going:
// clubs near the top of the table lean attacking to press their advantage, clubs near the bottom
// lean defensive to avoid heavy defeats, and clubs out of form (3+ losses in last 5) shake things up.
function aiAdjustTactics(){
    if(!Array.isArray(G.leagueTable) || G.leagueTable.length < 16) return;
    const ranked = [...G.leagueTable].sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));
    const n = ranked.length;
    ranked.forEach((row, rank) => {
        const teamIdx = row.teamIdx;
        if(teamIdx === G.playerTeamIdx) return; // never override the user's own tactic choice
        const squad = G.squads[teamIdx];
        if(!Array.isArray(squad) || squad.length < 11) return;
        const recent = G.leagueResults.filter(r=>!r._pendingReveal && (r.homeIdx===teamIdx||r.awayIdx===teamIdx)).slice(-5);
        const recentLosses = recent.filter(r=>{
            const isH = r.homeIdx===teamIdx;
            const my = isH?r.homeScore:r.awayScore, opp = isH?r.awayScore:r.homeScore;
            return my < opp;
        }).length;
        let character;
        const positionRatio = rank / n; // 0 = top of table, ~1 = bottom
        if(recentLosses >= 3) character = pick(['attack','defensive']); // out of form: shake things up
        else if(positionRatio < 0.3) character = Math.random() < 0.65 ? 'attack' : 'balanced';
        else if(positionRatio > 0.7) character = Math.random() < 0.6 ? 'defensive' : 'balanced';
        else character = pick(['balanced','attack','defensive']);
        const newTactic = pickTacticByCharacter(character);
        if(G.tactics[teamIdx] !== newTactic){
            G.tactics[teamIdx] = newTactic;
            setDefaultXI(squad, newTactic);
        }
    });
}
// ─── Smarter AI: transfer market activity ──────────────────
// Without this, AI clubs never touch the transfer market — their squads sit static all season
// while the user is the only one buying/selling. This gives every Liga 1 club (besides the user)
// a small weekly chance, during the transfer window, to offload a fading/surplus player onto the
// market and to snap up a market player that would upgrade their own squad. Keeps the market feeling
// alive and creates real competition for good listings instead of them just waiting for the user.
function processAITransferActivity(){
    if(!Array.isArray(G.transferMarket)) return;
    const isPlayerBidPending = (pid) => {
        if(G.transferBids && G.transferBids.find(b=>b.id===pid)) return true;
        if(G.inbox && G.inbox.find(m=>(m.type==='transfer_bid_response'||m.type==='transfer_bid_accepted')&&m.playerId===pid)) return true;
        if(G.loanBids && G.loanBids.find(b=>b.id===pid)) return true;
        return false;
    };
    for(let teamIdx=0; teamIdx<16; teamIdx++){
        if(teamIdx === G.playerTeamIdx) continue;
        const squad = G.squads[teamIdx];
        if(!Array.isArray(squad) || squad.length < MIN_SQUAD_SIZE+1) continue; // never sell below the floor
        // --- AI sells a fading/surplus player onto the market ---
        if(Math.random() < 0.12){
            const sellable = squad.filter(p => !p.isLoan && !p._listed && (p.age >= 31 || (!p.inXI && p.ovr < 65)));
            if(sellable.length){
                const chosen = pick(sellable);
                chosen._listed = true;
                chosen.price = getPrice(chosen.ovr, chosen.age);
                chosen.clubName = TEAMS[teamIdx];
                chosen.teamIndex = teamIdx;
                G.transferMarket.push(chosen);
            }
        }
        // --- AI buys a market player who'd upgrade their own squad ---
        // (squad.length < MAX_SQUAD_SIZE here, not MAX-2: initial squads already sit around 24
        // players, so a tighter cap was silently blocking AI buying entirely from week one.
        // The real overflow guard is the squad.length < MAX_SQUAD_SIZE check right before the push.)
        if(Math.random() < 0.10 && squad.length < MAX_SQUAD_SIZE){
            const candidates = G.transferMarket.filter(p => p.teamIndex !== teamIdx && !isPlayerBidPending(p.id));
            if(candidates.length){
                // Look for a real upgrade: a market player noticeably better than this club's
                // current weakest starter in the same broad category.
                const byCat = {};
                candidates.forEach(p=>{ (byCat[p.mainCat] = byCat[p.mainCat]||[]).push(p); });
                const catsNeeded = Object.keys(byCat);
                if(catsNeeded.length){
                    const cat = pick(catsNeeded);
                    const ownInCat = squad.filter(p=>p.mainCat===cat);
                    const weakestOwn = ownInCat.length ? Math.min(...ownInCat.map(p=>p.ovr)) : 0;
                    const pool = byCat[cat].filter(p => p.ovr >= weakestOwn + 4 && p.ovr <= weakestOwn + 22);
                    if(pool.length){
                        const target = pick(pool);
                        const mIdx = G.transferMarket.findIndex(x=>x.id===target.id);
                        if(mIdx >= 0 && squad.length < MAX_SQUAD_SIZE){
                            const sellerIdx = target.teamIndex;
                            const sellerName = (sellerIdx>=0 && sellerIdx<16) ? TEAMS[sellerIdx] : (sellerIdx>=16 ? (FOREIGN_CLUBS[sellerIdx-16]||'European Club') : 'a free agent');
                            if(sellerIdx >= 0 && sellerIdx < 16 && Array.isArray(G.squads[sellerIdx])){
                                const origSq = G.squads[sellerIdx];
                                const origIdx = origSq.indexOf(target);
                                if(origIdx >= 0){
                                    origSq.splice(origIdx, 1);
                                    if(target.inXI) setDefaultXI(origSq, G.tactics[sellerIdx] || '4-3-3');
                                }
                            }
                            delete target._listed;
                            target.teamIndex = teamIdx;
                            target.contract = rnd(2,4);
                            target.isLoan = false; target.originalTeamIdx = -1; target.inXI = false; target.slotPos = null;
                            squad.push(target);
                            G.transferMarket.splice(mIdx,1);
                            G.news.unshift({
                                date: formatDate(G.currentDate),
                                title: 'Transfer Completed',
                                body: `${TEAMS[teamIdx]} have completed the signing of ${target.name} from ${sellerName}.`,
                                tags: ['transfer']
                            });
                        }
                    }
                }
            }
        }
    }
}
function genTransferPlayer(squads, excludeTeamIdx){
    const cat=pick(['GK','DEF','MID','FWD']);
    const rR = Math.random(); let origin = 'ID';
    if(rR < 0.40) origin = 'ID'; else if(rR < 0.55) origin = 'FR'; else if(rR < 0.63) origin = 'JP'; else if(rR < 0.71) origin = 'KR'; else if(rR < 0.79) origin = 'AR'; else if(rR < 0.87) origin = 'EU'; else if(rR < 0.93) origin = 'BR'; else origin = 'EU';
    const isFreeAgent = Math.random() < 0.15;
    // Transfer market players come from teams OTHER than player's team (or European clubs)
    // Use indices 0-15 for Indonesian league teams, avoid player's team
    // Add European "virtual" clubs with high indices (16-30 range used as foreign clubs)
    let tIdx;
    if(isFreeAgent){
        tIdx = -1;
    } else {
        // 55% chance from a foreign/European club, 45% from Indonesian league non-player clubs
        if(Math.random() < 0.55){
            // foreign club - use a stable index beyond league teams
            tIdx = rnd(16, 30); // virtual foreign clubs
        } else {
            // Indonesian league team (excluding player's team - will be handled at call time)
            tIdx = rnd(0, 15);
        }
    }
    // If this player is meant to belong to a REAL Liga 1 club (tIdx 0-15), list an ACTUAL
    // player from that club's real squad instead of fabricating a fictional one. The listing
    // is a reference to the real squad player (so it stays visible/consistent in the Squad tab,
    // keeps playing matches, etc.) and is only removed from its club once truly bought/loaned.
    // Foreign clubs and free agents have no simulated league/roster, so they remain procedurally generated.
    if(!isFreeAgent && tIdx >= 0 && tIdx < 16 && Array.isArray(squads)){
        const candidateTeams = [];
        for(let i=0;i<16;i++){
            if(i===excludeTeamIdx) continue;
            if(Array.isArray(squads[i]) && squads[i].length > 0) candidateTeams.push(i);
        }
        if(candidateTeams.length){
            const realTIdx = pick(candidateTeams);
            const realSquad = squads[realTIdx];
            // Prefer a player matching the rolled category, but fall back to anyone in that squad.
            let candidates = realSquad.filter(p=>p.mainCat===cat && !p.isLoan && !p._listed);
            if(!candidates.length) candidates = realSquad.filter(p=>!p.isLoan && !p._listed);
            if(candidates.length){
                const chosen = pick(candidates);
                chosen._listed = true; // mark so the same player isn't double-listed in this market refresh
                chosen.price = getPrice(chosen.ovr, chosen.age);
                chosen.clubName = TEAMS[realTIdx];
                return chosen;
            }
        }
        // No real candidate available — fall back to a foreign club listing instead of
        // fabricating a fake domestic player.
        tIdx = rnd(16, 30);
    }
    const p=genPlayer(cat, tIdx, false, origin);
    if(isFreeAgent){
        const r=Math.random();
        if(r<0.80) p.ovr=rnd(42,62); else if(r<0.95) p.ovr=rnd(63,72); else if(r<0.995) p.ovr=rnd(73,79); else p.ovr=rnd(80,83);
        if(p.ovr>=73) p.age = rnd(29,35);
    } else {
        const r=Math.random();
        if(r<0.7)p.ovr=rnd(45,65);else if(r<0.9)p.ovr=rnd(66,75);else p.ovr=rnd(76,85);
    }
    if(p.ovr > p.pot) p.pot = p.ovr;
    p.isStar=p.ovr>=80;
    p.price = isFreeAgent ? 0 : getPrice(p.ovr, p.age);
    p.clubName = tIdx >= 16 ? FOREIGN_CLUBS[tIdx-16] || 'European Club' : (tIdx >= 0 ? TEAMS[tIdx] : 'Free Agent');
    return p;
}
function genMarket(squads, excludeTeamIdx){
    const ps=[];

// Sample a goal count from a Poisson-like distribution for a given expected-goals value (lambda).
// This produces realistic, continuous-feeling scorelines instead of crude rnd() bracket tables —
// stronger teams reliably score and concede more, but variance never disappears entirely.
function poissonGoals(lambda){
    lambda = Math.max(0.05, Math.min(5, lambda));
    const L = Math.exp(-lambda);
    let k = 0, p = 1;
    do { k++; p *= Math.random(); } while (p > L);

function simulateMatch(hIdx,aIdx,weatherKey,derby){

    const at=typeof aIdx==='number'&&aIdx<16?(G.tactics[aIdx]||'4-3-3'):'4-3-3';
    const hStr=teamStrength(hIdx,ht);const aStr=teamStrength(aIdx,at);
    let diff=hStr-aStr;
    if(weatherKey) diff = weatherDiffAdjust(weatherKey, diff);

    const tacticalNoise = rnd(-30,30)/10; // small game-to-game variance, kept modest relative to the OVR gap
    diff += tacticalNoise;

    // expected-goals baseline; +0.045 per point of `diff` makes a ~20pt OVR gap a heavy (but not

            if(pool.length){ const cp=pick(pool); playerName=cp.name; cardPlayerId=cp.id; }
        }

    // G4: injury chance scales with the squad's average proneness instead of a flat global rate,

    const allXI = [];

    if(typeof aIdx === 'number' && aIdx < 16 && G.squads[aIdx]) G.squads[aIdx].filter(p=>p.inXI).forEach(p=>allXI.push({p,team:'away',idx:aIdx}));
    const avgProneness = allXI.length ? allXI.reduce((s,e)=>s+(e.p.injuryProneness||35),0)/allXI.length : 35;
    const injuryChance = clamp(0.06 + (avgProneness/100)*0.16, 0.04, 0.28); // ~0.06-0.28 per match
    const totalInjuries = Math.random() < injuryChance ? 1 : 0;
    for(let i=0; i<totalInjuries; i++){
        let playerName = '?'; let playerId = null; let team = 'home'; let idx = hIdx; let severityWeeks = 1;
        if(allXI.length){
            // Weighted pick: each player's chance of being the one hurt scales with their proneness.
            const weights = allXI.map(e => Math.max(5, e.p.injuryProneness || 35));
            const totalW = weights.reduce((s,w)=>s+w,0);
            let roll = Math.random()*totalW;
            let chosen = allXI[allXI.length-1];
            for(let j=0;j<allXI.length;j++){ roll -= weights[j]; if(roll<=0){ chosen = allXI[j]; break; } }
            playerName = chosen.p.name; playerId = chosen.p.id; team = chosen.team; idx = chosen.idx;
            // Severity: higher proneness skews toward longer lay-offs, but everyone can get unlucky.
            const pr = chosen.p.injuryProneness || 35;

            if(severityRoll > 95) severityWeeks = rnd(6, 10);       // major injury
            else if(severityRoll > 65) severityWeeks = rnd(3, 5);   // moderate injury
            else severityWeeks = rnd(1, 2);                          // minor knock

        if(playerId) evs.push({type:'injury', min:rnd(5,89), team, player:playerName, playerId, teamIdx: idx, severityWeeks});

            if(p.injury === undefined) p.injury = 0;

    while(G.squads.length <= G.playerTeamIdx) G.squads.push([]);
    G.squads.forEach((sq,ti)=>{

        if(!sq.some(p=>p.inXI)){

    // Ensure arrays that older saves might not have
    if(!Array.isArray(G.inbox)) G.inbox = [];
    if(!Array.isArray(G.loanBids)) G.loanBids = [];
    if(!Array.isArray(G.transferBids)) G.transferBids = [];
    if(!Array.isArray(G.scoutQueue)) G.scoutQueue = [];
    if(!Array.isArray(G.news)) G.news = [];
    if(!Array.isArray(G.log)) G.log = [];

    if(!Array.isArray(G.transferMarket)) G.transferMarket = [];
    if(!Array.isArray(G.leagueResults)) G.leagueResults = [];
    if(!Array.isArray(G.leagueTable) || !G.leagueTable.length){
        G.leagueTable = TEAMS.map((name,i)=>({teamIdx:i,name,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0}));
    }
    if(!Array.isArray(G.schedule) || G.schedule.length < 1) G.schedule = buildSchedule();
    if(!G.sponsors) G.sponsors = { shirt:{name:'Unnamed',value:0.5,weeksLeft:30}, stadium:{name:'Unnamed',value:0.3,weeksLeft:30} };
    if(!G.sponsors.shirt) G.sponsors.shirt = {name:'Unnamed',value:0.5,weeksLeft:30};

function applyTrainingEffects(){
    const sq=G.squads[G.playerTeamIdx];
    if(!sq) return;
    if(G.training==='fitness'){
        sq.forEach(p=>{ p.energy=clamp(p.energy+12,0,100); });
    } else if(G.training==='tactical'){
        sq.forEach(p=>{ p.chem=clamp(p.chem+rnd(2,4),0,100); });
    } else if(G.training==='attack'){
        sq.filter(p=>p.mainCat==='FWD'||p.mainCat==='MID').forEach(p=>{ if(Math.random()<0.15 && p.ovr<p.pot) p.ovr=clamp(p.ovr+1,1,99); });
    } else if(G.training==='defense'){
        sq.filter(p=>p.mainCat==='DEF'||p.mainCat==='GK').forEach(p=>{ if(Math.random()<0.15 && p.ovr<p.pot) p.ovr=clamp(p.ovr+1,1,99); });

function payWeeklyIncome(isHomeMatchThisWeek){
    let income=0;
    if(G.sponsors){
        if(G.sponsors.shirt && G.sponsors.shirt.weeksLeft>0){ income+=G.sponsors.shirt.value; G.sponsors.shirt.weeksLeft--; }
        if(G.sponsors.stadium && G.sponsors.stadium.weeksLeft>0){ income+=G.sponsors.stadium.value; G.sponsors.stadium.weeksLeft--; }
    }
    if(isHomeMatchThisWeek && G.stadium){
        const cap=G.stadium.capacityLevel||1;
        const attendanceRevenue = parseFloat((cap * 0.18 * (G.fanSupport/100)).toFixed(2));
        income += attendanceRevenue;
    }
    if(income>0){ G.budget=parseFloat((G.budget+income).toFixed(2)); }
    return income;
}

function isMatchWeekNext(){

function advanceWeek(){

    // If there are still pending matches this week, play next match (with pre-match presser)
    if(weekPendingMatches.length > 0 && weekPendingIndex < weekPendingMatches.length){
        playNextPendingMatch();
        return;
    }

    if(hasInboxTransferEvent()){
        showToast('📬 Check your inbox first! There are events waiting for your response.');
        switchTab('inbox');

    }

    // Check if week limit reached
    if(G.week >= SEASON_WEEKS){

function processInjuriesAndAutoSub() {
    const medLvl = (G.stadium && G.stadium.medicalLevel) || 1;
    if(!Array.isArray(G.squads)) return;
    G.squads.forEach((sq, idx) => {
        if(!Array.isArray(sq)) return;
        sq.forEach(p => {
            if(p.injury > 0){
                p.injury--;
                if(idx===G.playerTeamIdx && medLvl>=3 && Math.random()<0.25 && p.injury>0) p.injury--;
                if(p.injury === 0) p.injuryTotalWeeks = 0;
            }
            // Decrement suspension counter each week (a match was played)
            if((p.suspensionMatchesLeft || 0) > 0){
                p.suspensionMatchesLeft--;
            }
            // ── Age-based development ──
            const growth = getWeeklyGrowth(p);
            if (Math.random() < growth.chance) {
                const delta = growth.amount();
                if (delta > 0 && p.ovr < p.pot) {
                    p.ovr = clamp(p.ovr + delta, 1, 99);
                    p.isStar = p.ovr >= 80;
                } else if (delta < 0) {
                    p.ovr = clamp(p.ovr + delta, 40, 99);
                    p.isStar = p.ovr >= 80;
                    if (p.pot > p.ovr - 2) p.pot = p.ovr - 1;
                }
            }
        });
        // Auto-bench injured players in XI
        const injuredInXI = sq.filter(p => p.inXI && p.injury > 0);
        injuredInXI.forEach(p => {
            const bench = sq.filter(b => !b.inXI && b.injury === 0 && POS_MAP[b.pos].c === p.mainCat).sort((a,b)=>b.ovr-a.ovr);
            if(bench.length > 0) {
                const sub = bench[0]; sub.inXI = true; sub.slotPos = p.slotPos; p.inXI = false; p.slotPos = null;
            } else {
                const anyBench = sq.filter(b => !b.inXI && b.injury === 0).sort((a,b)=>b.ovr-a.ovr);
                if(anyBench.length > 0) {
                    const sub = anyBench[0]; sub.inXI = true; sub.slotPos = p.slotPos; p.inXI = false; p.slotPos = null;
                }
            }
        });
        // Auto-bench suspended players in XI
        const suspendedInXI = sq.filter(p => p.inXI && (p.suspensionMatchesLeft || 0) > 0);
        suspendedInXI.forEach(p => {
            const bench = sq.filter(b => !b.inXI && b.injury === 0 && (b.suspensionMatchesLeft || 0) === 0 && POS_MAP[b.pos] && POS_MAP[b.pos].c === p.mainCat).sort((a,b)=>b.ovr-a.ovr);
            if(bench.length > 0) {
                const sub = bench[0]; sub.inXI = true; sub.slotPos = p.slotPos; p.inXI = false; p.slotPos = null;
            } else {
                const anyBench = sq.filter(b => !b.inXI && b.injury === 0 && (b.suspensionMatchesLeft || 0) === 0).sort((a,b)=>b.ovr-a.ovr);
                if(anyBench.length > 0) {
                    const sub = anyBench[0]; sub.inXI = true; sub.slotPos = p.slotPos; p.inXI = false; p.slotPos = null;
                } else {
                    // No valid replacement — just bench the suspended player
                    p.inXI = false; p.slotPos = null;
                }
            }
        });
    });
    // Check milestones
    try { checkMilestones(); } catch(e) {}
}
function applyPostMatchEvents(events, baseDate, compType) {
    if(!Array.isArray(events)) return;
    applyGoalsToScorers(events, compType);
    events.forEach(e => {
        if (e.type === 'injury' && e.teamIdx !== undefined && e.teamIdx < 16) {
            const teamSq = G.squads[e.teamIdx];
            const p = teamSq ? teamSq.find(x => x.id === e.playerId) : null;
            if (p && p.injury === 0) {
                p.injury = e.severityWeeks || rnd(1, 4);
                p.injuryTotalWeeks = p.injury;
                p.injuryHistory = (p.injuryHistory || 0) + 1;
                const medLvl = (G.stadium && e.teamIdx===G.playerTeamIdx) ? G.stadium.medicalLevel : 1;
                if(medLvl>=4) p.injury = Math.max(1, p.injury-1);
                const severityLabel = p.injury >= 6 ? 'a major injury' : p.injury >= 3 ? 'a moderate injury' : 'a minor knock';
                G.news.unshift({
                    date: formatDate(baseDate),
                    title: 'A Heavy Blow! (Injury)',
                    body: `Bad news for ${TEAMS[e.teamIdx]}! Key player ${p.name} has suffered ${severityLabel} and will be out for ${p.injury} weeks.`,
                    tags: ['injury']
                });
            }
        }
        // ── Card suspensions ──
        if (e.type === 'card' && e.playerId && e.teamIdx !== undefined && e.teamIdx < 16) {
            const teamSq = G.squads[e.teamIdx];
            const p = teamSq ? teamSq.find(x => x.id === e.playerId) : null;
            if (p) {
                if (e.card === 'red') {
                    // Red card: 1-4 match suspension (applied immediately from in-match logic too, but also here for skipped matches)
                    if (!p.sentOff) { // avoid double-counting from live event processing
                        p.suspensionMatchesLeft = (p.suspensionMatchesLeft || 0) + rnd(1, 4);
                        if (e.teamIdx === G.playerTeamIdx) {
                            G.news.unshift({
                                date: formatDate(baseDate),
                                title: '🟥 Red Card Suspension!',
                                body: `${p.name} received a red card and will serve a suspension of ${p.suspensionMatchesLeft} match(es).`,
                                tags: ['match']
                            });
                        }
                    }
                    p.sentOff = false; // reset flag for next match
                } else if (e.card === 'yellow') {
                    // Yellow card accumulation: 3 yellows = 1 match suspension, reset counter
                    p.yellowCards = (p.yellowCards || 0) + 1;
                    if (p.yellowCards >= 3) {
                        p.yellowCards = 0;
                        p.suspensionMatchesLeft = (p.suspensionMatchesLeft || 0) + 1;
                        if (e.teamIdx === G.playerTeamIdx) {
                            G.news.unshift({
                                date: formatDate(baseDate),
                                title: '🟨 Accumulated Yellow Cards!',
                                body: `${p.name} has reached 3 yellow cards and will be suspended for 1 match.`,
                                tags: ['match']
                            });
                        }
                    }
                }
            }
        }
    });
    // ── Decrement suspension counters for player team after each match ──
    // (only for the player's own team — AI teams are not tracked this precisely)
    if (G.squads[G.playerTeamIdx]) {
        G.squads[G.playerTeamIdx].forEach(p => {
            if ((p.suspensionMatchesLeft || 0) > 0 && p.inXI) {
                // Player is suspended but listed in XI — remove them
                p.inXI = false;
                p.slotPos = null;
            }
        });
    }
}
function _simulateLeagueWeek(leagueMatches,baseDate){
    let myMatch=null;
    leagueMatches.forEach(([h,a])=>{
        const derby = isDerby(h,a);
        const weather = rollWeather();
        const score=simulateMatch(h,a,weather.key,derby);
        const isMyMatch = (h===G.playerTeamIdx||a===G.playerTeamIdx);
        // For AI-vs-AI matches (which the user never "watches"), apply table/news effects immediately as before.

                } else {

                }
            });
            aT.forEach(p=>{
                p.energy=clamp(p.energy-rnd(10,15)-(weather.key==='hot'?6:0),0,100);
                if(p.inXI) {
                    if(score.away > score.home) p.moral = clamp(p.moral + rnd(3,7), 0, 100);
                    else if(score.away < score.home) p.moral = clamp(p.moral - rnd(2,5), 0, 100);
                    p.appearances++; p.careerAppearances=(p.careerAppearances||0)+1; p.chem=clamp(p.chem+rnd(0,2),0,100);
                    if(aCleanSheet && (p.mainCat==='GK'||p.mainCat==='DEF')){ p.cleanSheets=(p.cleanSheets||0)+1; p.careerCleanSheets=(p.careerCleanSheets||0)+1; }
                } else {

            });

        } else {

            r._pendingReveal = true;
            r._weather = weather.key;
            myMatch=r;
        }
    });
    G.leagueTable.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));
    return myMatch;
}

        if(p.inXI) {
            if(score.away > score.home) p.moral = clamp(p.moral + rnd(3,7), 0, 100);
            else if(score.away < score.home) p.moral = clamp(p.moral - rnd(2,5), 0, 100);
            p.appearances++; p.careerAppearances=(p.careerAppearances||0)+1; p.chem=clamp(p.chem+rnd(0,2),0,100);
            if(aCleanSheet && (p.mainCat==='GK'||p.mainCat==='DEF')){ p.cleanSheets=(p.cleanSheets||0)+1; p.careerCleanSheets=(p.careerCleanSheets||0)+1; }
        } else {

        }
    });
    applyPostMatchEvents(r.events, baseDate, 'league');
    const isH=h===G.playerTeamIdx;
    const my=isH?score.home:score.away,op=isH?score.away:score.home;
    const derbyTag = derby?` [DERBY]`:'';
    G.log.unshift({cls:my>op?'win':my<op?'loss':'draw',text:`W${r.week}: ${TEAMS[G.playerTeamIdx]} ${my}–${op} ${TEAMS[isH?a:h]}${derbyTag}`});
    if(derby){
        if(my>op){ G.fanSupport=clamp(G.fanSupport+6,0,100); G.boardConfidence=clamp(G.boardConfidence+3,0,100); G.reputation=clamp(G.reputation+1,0,100);
            G.news.unshift({date:formatDate(baseDate),title:`🔥 Derby Glory!`,body:`${TEAMS[G.playerTeamIdx]} triumphed in the ${getDerbyName(h,a)}, sending the fans into raptures!`,tags:['match']});
        } else if(my<op){ G.fanSupport=clamp(G.fanSupport-6,0,100); G.boardConfidence=clamp(G.boardConfidence-3,0,100);
            G.news.unshift({date:formatDate(baseDate),title:`💔 Derby Heartbreak`,body:`${TEAMS[G.playerTeamIdx]} suffered a painful defeat in the ${getDerbyName(h,a)}.`,tags:['match']});
        }
    } else {
        if(my>op) G.fanSupport=clamp(G.fanSupport+1.5,0,100);
        else if(my<op) G.fanSupport=clamp(G.fanSupport-1.5,0,100);
    }
    r._pendingReveal = false;
    G.leagueTable.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));

// ─── H4: Confidence Meter Visual ────────────────────────────
// Keeps a rolling weekly history of board confidence / fan support so the dashboard can show a
// trend (rising/falling/stable) rather than just a single static snapshot number.
function pushConfidenceSnapshot(){
    if(!Array.isArray(G.confidenceHistory)) G.confidenceHistory = [];
    G.confidenceHistory.push({week:G.week, board:Math.round(G.boardConfidence), fan:Math.round(G.fanSupport)});
    if(G.confidenceHistory.length > 12) G.confidenceHistory.shift(); // keep a manageable rolling window
}
function getConfidenceTrend(key){
    if(!Array.isArray(G.confidenceHistory) || G.confidenceHistory.length < 2) return 0;
    const cur = G[key === 'board' ? 'boardConfidence' : 'fanSupport'];
    const prev = G.confidenceHistory[G.confidenceHistory.length-2][key];
    return Math.round(cur - prev);
}
function confidenceStatus(boardConfidence, failStreak){
    if(failStreak >= 1 && boardConfidence < 35) return {label:'Critical — Job at Risk', cls:'rt-4', icon:'🔴'};
    if(boardConfidence < 30) return {label:'Very Low', cls:'rt-4', icon:'🔴'};
    if(boardConfidence < 45) return {label:'Under Pressure', cls:'rt-5', icon:'🟠'};
    if(boardConfidence < 65) return {label:'Stable', cls:'rt-6', icon:'🟡'};
    if(boardConfidence < 85) return {label:'Strong', cls:'rt-7', icon:'🟢'};
    return {label:'Excellent', cls:'rt-9', icon:'🟢'};
}
function renderConfidenceMeter(compact){
    const board = Math.round(G.boardConfidence);
    const fan = Math.round(G.fanSupport);
    const boardTrend = getConfidenceTrend('board');
    const fanTrend = getConfidenceTrend('fan');
    const status = confidenceStatus(G.boardConfidence, G.objectiveFailStreak||0);
    const trendArrow = (t) => t > 0 ? `<span style="color:var(--gg)">▲${Math.abs(t)}</span>` : t < 0 ? `<span style="color:var(--red)">▼${Math.abs(t)}</span>` : `<span style="color:var(--dim)">—</span>`;
    const warningHtml = (G.objectiveFailStreak||0) >= 1
        ? `<div style="margin-top:8px;padding:6px 8px;background:rgba(220,40,40,.12);border:1px solid var(--red);border-radius:6px;font-size:.65rem;color:var(--red);font-weight:bold">
             ⚠️ Failed objective ${G.objectiveFailStreak} season(s) running — one more failure risks the sack!
           </div>` : '';
    return `
        <div class="card" style="margin-bottom:10px">
            <div class="row bt" style="margin-bottom:6px">
                <div class="sec" style="margin-bottom:0">🎯 Board Objective</div>
                <span class="rating-chip ${status.cls}">${status.icon} ${status.label}</span>
            </div>
            <div style="font-size:.78rem;margin-bottom:10px">${G.boardObjective.desc}</div>
            <div class="g2">
                <div>
                    <div class="row bt" style="font-size:.6rem;color:var(--dim)"><span>Board Confidence</span><span>${trendArrow(boardTrend)}</span></div>
                    <div class="stat-bar"><div class="stat-fill" style="width:${board}%;background:${board>=65?'var(--gg)':board>=45?'var(--gold)':'var(--red)'}"></div></div>
                    <div style="font-size:.68rem;margin-top:2px;font-weight:bold">${board}%</div>
                </div>
                <div>
                    <div class="row bt" style="font-size:.6rem;color:var(--dim)"><span>Fan Support</span><span>${trendArrow(fanTrend)}</span></div>
                    <div class="stat-bar"><div class="stat-fill" style="width:${fan}%;background:var(--gold)"></div></div>
                    <div style="font-size:.68rem;margin-top:2px;font-weight:bold">${fan}%</div>
                </div>
            </div>
            ${warningHtml}
        </div>`;
}
function playNextPendingMatch(){
    if(weekPendingIndex>=weekPendingMatches.length){
        renderAll();showToast("All matches for this week are complete!");return;
    }
    const item=weekPendingMatches[weekPendingIndex];

    // Resolve cup/acl items first (simulate scores)
    if(item._cupRound){
        const cupRound=item._cupRound;
        const next={"Round of 16":"Quarter-Final","Quarter-Final":"Semi-Final","Semi-Final":"Final"}[cupRound];
        const res=playKnockout(G.cupBracket,G.cupResults,G.cupRoundsPlayed,cupRound,next);
        if(!next&&res.length)G.cupWinner=res[0].winner;
        res.forEach(m => { applyPostMatchEvents(m.events, item.dateStr, 'cup'); applyMatchRatingsToPlayers(m.ratings); });
        const myMatch=res.find(m=>m.homeIdx===G.playerTeamIdx||m.awayIdx===G.playerTeamIdx);
        item.myMatch=myMatch||null;
        delete item._cupRound;
        saveState();
    }
    if(item._aclGroup){
        const aclRes=simulateACLGroups();
        aclRes.forEach(m => applyPostMatchEvents(m.events, item.dateStr, 'lca'));
        item.myMatch=aclRes.length?aclRes[0]:null;
        delete item._aclGroup;
        saveState();
    }
    if(item._aclKnock){
        const lcaKnock=item._aclKnock;
        const nextR={"Round of 16":"Quarter-Final","Quarter-Final":"Semi-Final","Semi-Final":"Final"}[lcaKnock];
        const aclRes=playKnockout(G.acl.knockout,G.acl.knockout,G.acl.played,lcaKnock,nextR);
        if(!nextR&&aclRes.length)G.acl.winner=aclRes[0].winner;
        aclRes.forEach(m => { applyPostMatchEvents(m.events, item.dateStr, 'lca'); applyMatchRatingsToPlayers(m.ratings); });
        const myAcl=aclRes.find(r=>r.homeIdx===G.playerTeamIdx||r.awayIdx===G.playerTeamIdx);
        item.myMatch=myAcl||null;
        delete item._aclKnock;
        saveState();
    }

    // If no match for user's team, skip this item
    if(!item.myMatch){
        weekPendingIndex++;
        renderAll();
        showToast(item.label + " — No match for your team this round.");
        return;
    }

    // Show pre-match presser before launching the live board
    openPreMatchPressAndPlay();

    function continueToNext(){

    function playKnockout(bracketObj,resObj,playedTracker,roundName,nextRoundName){

            winners.push(win);
        });
        resObj[roundName]=results;playedTracker[roundName]=true;
        if(nextRoundName){
            const nextPairs=[];
            for(let i=0;i<winners.length;i+=2)nextPairs.push([winners[i],winners[i+1]]);

        const hScore = isFT ? my.homeScore : myEvs.filter(e=>e.team==='home'&&e.type==='goal').length;
        const aScore = isFT ? my.awayScore : myEvs.filter(e=>e.team==='away'&&e.type==='goal').length;
        const hName = getTeamName(my.homeIdx), aName = getTeamName(my.awayIdx);
        bar.innerHTML = `
            <span class="lmb-live-dot"></span>
            <span class="lmb-min">${isFT?'FT':st.min+"'"}</span>
            <span class="lmb-teams">${hName} <span class="lmb-score">${hScore} - ${aScore}</span> ${aName}</span>
            <span class="lmb-expand">▴ Expand</span>
        `;
        if(isFT){
            // Auto-expand once the match finishes, so the user doesn't miss the result/press conference flow.
            setTimeout(()=>{ if(document.getElementById('live-mini-bar').classList.contains('show')) expandLiveMatch(); }, 600);
        }
    }

    function applyShout(key) {
        liveMatchState.shout = key;
        liveMatchState.shoutUsed = true;
        closeModal(true);
        const labels = { press:'Press Higher!', deep:'Sit Deep!', counter:'Counter!', calm:'Calm Down!' };
        showToast(`🎤 ${labels[key]} — instruksi diterapkan!`);
        // Apply modifiers to match result
        const my = liveMatchState.myMatch;
        if (!my) return;
        const isHome = my.homeIdx === G.playerTeamIdx;
        const hScore = my.homeScore, aScore = my.awayScore;
        if (key === 'press') {
            // More likely to score, slightly more likely to concede
            if (Math.random() < 0.35) { if(isHome) my.homeScore++; else my.awayScore++; }
        } else if (key === 'deep') {
            // Less likely to concede
            if (Math.random() < 0.3) { if(isHome && my.awayScore > 0) my.awayScore--; else if(!isHome && my.homeScore > 0) my.homeScore--; }
        } else if (key === 'counter') {
            // If losing, comeback chance
            const myScore = isHome ? my.homeScore : my.awayScore;
            const opScore = isHome ? my.awayScore : my.homeScore;
            if (myScore < opScore && Math.random() < 0.45) {
                if(isHome) my.homeScore++; else my.awayScore++;
            }
        } else if (key === 'calm') {
            // Reduce chance of late card events for player team
            my.events = my.events.filter(e => !(e.type==='card' && e.min > liveMatchState.min && e.teamIdx === G.playerTeamIdx && Math.random() < 0.5));
        }
        renderLiveBoardFull();
    }

    // ─── GENERATE MATCH HIGHLIGHTS TEXT ──────────────────────
    function buildMatchHighlights(my) {
        if (!my) return [];
        const lines = [];
        const evs = [...my.events].sort((a,b) => a.min - b.min);
        evs.forEach(e => {
            if (e.type === 'goal') {
                const teamName = getTeamName(e.teamIdx);
                const assist = e.assistPlayer ? ` (assist: ${e.assistPlayer})` : '';
                lines.push(`⚽ ${e.min}' — <b>GOOAL!</b> ${e.player} untuk ${teamName}${assist}`);
            } else if (e.type === 'card') {
                lines.push(`${e.card==='red'?'🟥':'🟨'} ${e.min}' — Kartu ${e.card==='red'?'merah':'kuning'} untuk ${e.player}`);
            } else if (e.type === 'injury') {
                lines.push(`🚑 ${e.min}' — Cedera: ${e.player}`);
            }
        });
        lines.push(`🔚 FT — ${getTeamName(my.homeIdx)} ${my.homeScore}-${my.awayScore} ${getTeamName(my.awayIdx)}`);
        return lines;
    }

    // ─── E2: Player Rating Heatmap (Match Report) ──────────────
    // Renders one compact horizontal mini-pitch per team, with each player's dot colored along a
    // red->green gradient by their match rating instead of showing OVR — a heatmap of who actually
    // performed well, at a glance, rather than reading a flat list of numbers.
    function renderRatingHeatmapMiniPitch(squad, tacticName, ratings, motm, teamLabel, isHomeSide){
        const slots = FORMATIONS[TACTICS_MAP[tacticName] || '4-3-3'];
        const coords = H_POS[TACTICS_MAP[tacticName] || '4-3-3'];
        let dots = '';
        let placed = new Set();
        slots.forEach((slot, i) => {
            const p = squad.find(x => x.inXI && x.slotPos === slot && !placed.has(x.id));
            // Always orient this team attacking left-to-right within its own mini-pitch for readability.
            const bx = coords.x[i], by = coords.y[i];
            if(p){
                placed.add(p.id);
                const rating = ratings[p.id] || 6.0;
                const color = getRatingColor(rating);
                const isMotm = motm && motm.playerId === p.id;
                dots += `<div class="pdot" style="left:${bx}%;top:${by}%;" onclick="event.stopPropagation();showToast('${p.name.replace(/'/g,"")} — ${rating.toFixed(1)}')">
                  <div class="pdot-circle" style="background:${color};border-color:rgba(255,255,255,.7);${isMotm?'box-shadow:0 0 0 2px var(--gold)':''}">${rating.toFixed(1)}</div>
                  <div class="pdot-name">${p.name.split(' ')[0]}${isMotm?'⭐':''}</div>
                </div>`;
            }
        });
        return `
        <div style="margin-bottom:10px">
          <div style="font-size:.7rem;font-weight:700;color:var(--dim);margin-bottom:3px;padding:0 4px">${teamLabel}</div>
          <div class="pitch-wrap horizontal heatmap-mini" style="aspect-ratio:16/8">
            <div class="pitch-lines">
              <div class="pl-hw"></div><div class="pl-cc"></div>
              <div class="pl-pb-top"></div><div class="pl-pb-bot"></div>
              <div class="pl-gb-top"></div><div class="pl-gb-bot"></div>
            </div>
            ${dots}
          </div>
        </div>`;
    }

    let pitchAnim = { possessionTeam: 'home', possessionPid: null, lastSwitchAt: 0 };
    function resetPitchAnim(){ pitchAnim = { possessionTeam: 'home', possessionPid: null, lastSwitchAt: 0 }; }
    function tickPitchAnimation(){
        const dots = Array.from(document.querySelectorAll('.pdot-live'));
        if(!dots.length) return;
        const ball = document.getElementById('live-ball');
        if(!ball) return;
    
        const now = liveMatchState.min;
        const sinceSwitch = now - pitchAnim.lastSwitchAt;
        const shouldRoll = !pitchAnim.possessionPid || sinceSwitch >= 1; 
        if(shouldRoll){
            const turnover = Math.random() < 0.18; 
            const team = turnover ? (pitchAnim.possessionTeam==='home'?'away':'home') : pitchAnim.possessionTeam;
            const teamDots = dots.filter(d=>d.dataset.team===team);
            if(teamDots.length){
                let candidate;
                if(pitchAnim.possessionPid && !turnover && Math.random() < 0.7){
                    const cur = teamDots.find(d=>d.dataset.pid===pitchAnim.possessionPid);
                    if(cur){
                        const cx=parseFloat(cur.style.left), cy=parseFloat(cur.style.top);
                        candidate = teamDots
                            .filter(d=>d.dataset.pid!==pitchAnim.possessionPid)
                            .map(d=>({d, dist: Math.hypot(parseFloat(d.style.left)-cx, parseFloat(d.style.top)-cy)}))
                            .sort((a,b)=>a.dist-b.dist)[0];
                        candidate = candidate ? candidate.d : pick(teamDots);
                    } else candidate = pick(teamDots);
                } else {
                    candidate = pick(teamDots);
                }
                pitchAnim.possessionTeam = team;
                pitchAnim.possessionPid = candidate.dataset.pid;
                pitchAnim.lastSwitchAt = now;
                // Track possession ticks
                if (pitchAnim.possessionTeam === 'home') {
                    liveMatchState.homePossessionTicks++;
                } else {
                    liveMatchState.awayPossessionTicks++;
                }
            }
        }
    
        dots.forEach(dot=>{
            if(dot.dataset.pid===pitchAnim.possessionPid) return; 
            const bx=parseFloat(dot.dataset.bx), by=parseFloat(dot.dataset.by);
            const curX=parseFloat(dot.style.left)||bx, curY=parseFloat(dot.style.top)||by;
            const ballCarrier = dots.find(d=>d.dataset.pid===pitchAnim.possessionPid);
            let pullX=0, pullY=0;
            if(ballCarrier && dot.dataset.team===pitchAnim.possessionTeam){
                const bcx=parseFloat(ballCarrier.style.left)||bx, bcy=parseFloat(ballCarrier.style.top)||by;
                pullX=(bcx-bx)*0.08; pullY=(bcy-by)*0.08;
            }
            const targetX = clamp(bx + pullX + rnd(-5,5), 2, 98);
            const targetY = clamp(by + pullY + rnd(-5,5), 2, 98);
            dot.style.left = `${targetX}%`;
            dot.style.top = `${targetY}%`;
        });
    
        const carrier = dots.find(d=>d.dataset.pid===pitchAnim.possessionPid);
        if(carrier){
            const bx=parseFloat(carrier.dataset.bx), by=parseFloat(carrier.dataset.by);
            const forwardBias = pitchAnim.possessionTeam==='home' ? 3 : -3;
            const targetX = clamp(bx + forwardBias + rnd(-4,4), 2, 98);
            const targetY = clamp(by + rnd(-4,4), 2, 98);
            carrier.style.left = `${targetX}%`;
            carrier.style.top = `${targetY}%`;
            ball.style.left = `${clamp(targetX + rnd(-2,2), 2, 98)}%`;
            ball.style.top = `${clamp(targetY + rnd(-2,2), 2, 98)}%`;
            ball.style.transform = `translate(-50%, -50%) rotate(${rnd(0,360)}deg) scale(1)`;
        }
    }

    function updateLiveBoardDynamic(){
        const st=liveMatchState;const my=st.myMatch;
        const minDisplay=document.getElementById('lb-min-display');
        if(minDisplay)minDisplay.innerHTML=st.min>=90?'FT — FULL TIME':`LIVE — MINUTE ${st.min}'`;
        if(my){
            const myEvs=my.events.filter(e=>e.min<=st.min);
            const hScore=st.min>=90?my.homeScore:myEvs.filter(e=>e.team==='home'&&e.type==='goal').length;
            const aScore=st.min>=90?my.awayScore:myEvs.filter(e=>e.team==='away'&&e.type==='goal').length;
            const hEl=document.getElementById('lb-h-score');const aEl=document.getElementById('lb-a-score');
            if(hEl)hEl.innerText=hScore;if(aEl)aEl.innerText=aScore;

            // ── Possession bar ──
            const totalTicks = st.homePossessionTicks + st.awayPossessionTicks;
            if (totalTicks > 0) {
                const isHome = my.homeIdx === G.playerTeamIdx;
                const myPct  = Math.round((isHome ? st.homePossessionTicks : st.awayPossessionTicks) / totalTicks * 100);
                const oppPct = 100 - myPct;
                const posEl  = document.getElementById('lb-possession');
                if (posEl) {
                    posEl.innerHTML = `
                        <div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--dim);margin-bottom:2px">
                            <span style="color:var(--gg)"><b>${myPct}%</b> Possession</span>
                            <span>${oppPct}%</span>
                        </div>
                        <div style="height:5px;background:var(--sf);border-radius:3px;overflow:hidden">
                            <div style="width:${myPct}%;height:100%;background:var(--gg);border-radius:3px;transition:width .4s"></div>
                        </div>`;
                }
            }

            // ── Newly revealed events — sounds + forced sub ──
            const myTeamIsHome = my.homeIdx === G.playerTeamIdx;
            const myTeamSide   = myTeamIsHome ? 'home' : 'away';
            const oppSide      = myTeamIsHome ? 'away' : 'home';

            myEvs.forEach(e => {
                const eid = e.min + '_' + e.type + '_' + (e.player||'?');
                if (st.processedEventIds.has(eid)) return;
                st.processedEventIds.add(eid);

                // ── Sounds ──
                if (e.type === 'goal') {
                    if (e.team === myTeamSide) { playCrowdCheer(); }
                    else { playCrowdBoo(); }
                    if(document.getElementById('live-mini-bar').classList.contains('show')){
                        showToast(e.team===myTeamSide ? `⚽ GOAL! ${e.player} (${e.min}')` : `😬 ${e.min}' Lawan mencetak gol`);
                    }
                }
                if (e.type === 'card') {
                    if (e.card === 'red') {
                        playDoubleWhistle();
                        if (e.team === oppSide) playCrowdBoo();
                    } else {
                        playWhistle();
                    }
                }
                if (e.type === 'injury') { playAmbulance(); }

                // ── Forced sub: red card on own team ──
                if (e.type === 'card' && e.card === 'red' && e.team === myTeamSide && e.playerId) {
                    const sq = G.squads[G.playerTeamIdx];
                    const p  = sq ? sq.find(x => x.id === e.playerId) : null;
                    if (p && p.inXI) {
                        p.inXI    = false;
                        p.slotPos = null;
                        p.sentOff = true;
                        // Accumulate red card suspension (1-4 matches)
                        p.suspensionMatchesLeft = (p.suspensionMatchesLeft || 0) + rnd(1, 4);
                        st.isPaused = true;
                        if(document.getElementById('live-mini-bar').classList.contains('show')) expandLiveMatch();
                        document.getElementById('mtitle').innerHTML = '🟥 Kartu Merah!';
                        document.getElementById('mbody').innerHTML  =
                            `<p style="text-align:center;color:var(--red);font-size:.9rem;font-weight:bold">
                                ${p.name} dikeluarkan dari lapangan!
                             </p>
                             <p style="text-align:center;font-size:.75rem;color:var(--dim)">
                                Atur ulang susunan pemain Anda.<br>Sisa Substitusi: <b>${st.subsLeft}</b>
                             </p>
                             <p style="text-align:center;font-size:.7rem;color:var(--red)">
                                ⚠️ ${p.name} akan menjalani suspensi <b>${p.suspensionMatchesLeft} pertandingan</b>.
                             </p>`;
                        document.getElementById('mfoot').innerHTML  =
                            `<button class="btn btn-p btn-sm" onclick="openForcedSubModal()">🔄 Atur Pemain</button>
                             <button class="btn btn-s btn-sm" onclick="closeForcedModal()">Lanjutkan Tanpa Sub</button>`;
                        document.getElementById('mov').classList.add('show');
                    }
                }

                // ── Forced sub: injury on own team ──
                if (e.type === 'injury' && e.team === myTeamSide && e.playerId) {
                    const sq = G.squads[G.playerTeamIdx];
                    const p  = sq ? sq.find(x => x.id === e.playerId) : null;
                    if (p && p.inXI) {
                        p.injury = e.severityWeeks || rnd(1,3);
                        p.injuryTotalWeeks = p.injury;
                        p.injuryHistory = (p.injuryHistory || 0) + 1;
                        st.isPaused = true;
                        if(document.getElementById('live-mini-bar').classList.contains('show')) expandLiveMatch();
                        const severityLabel = p.injury >= 6 ? 'Cedera Parah' : p.injury >= 3 ? 'Cedera Sedang' : 'Cedera Ringan';
                        document.getElementById('mtitle').innerHTML = '🚑 Pemain Cedera!';
                        document.getElementById('mbody').innerHTML  =
                            `<p style="text-align:center;color:var(--gold);font-size:.9rem;font-weight:bold">
                                ${p.name} mengalami cedera!
                             </p>
                             <p style="text-align:center;font-size:.7rem;color:var(--red);font-weight:bold">
                                ${severityLabel} — diperkirakan absen ${p.injury} minggu
                             </p>
                             <p style="text-align:center;font-size:.75rem;color:var(--dim)">
                                Disarankan segera diganti.<br>Sisa Substitusi: <b>${st.subsLeft}</b>
                             </p>`;
                        document.getElementById('mfoot').innerHTML  =
                            `<button class="btn btn-p btn-sm" onclick="openForcedSubModal()">🔄 Ganti Pemain</button>
                             <button class="btn btn-s btn-sm" onclick="closeForcedModal()">Lanjutkan (Risiko)</button>`;
                        document.getElementById('mov').classList.add('show');
                    }
                }
            });

            const logEl=document.getElementById('event-log');
            if(logEl){
                logEl.innerHTML=myEvs.sort((a,b)=>a.min-b.min).map(e=>{
                    if(e.type==='goal')return`<div class="event-item"><span>⚽ ${e.min}' ${e.player}</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;
                    if(e.type==='card')return`<div class="event-item"><span class="${e.card==='red'?'red-card':'yellow-card'}">${e.card==='red'?'🟥':'🟨'} ${e.min}' ${e.player}</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;
                    if(e.type==='injury')return`<div class="event-item"><span class="injury-event">🚑 ${e.min}' ${e.player} (Injury)</span><span>${e.team==='home'?'🏠':'✈️'}</span></div>`;
                    return'';
                }).join('');
            }
            if(st.min<90&&!st.isPaused){
                tickPitchAnimation();
            }
            const lastGoalEvent=myEvs.filter(e=>e.type==='goal').slice(-1)[0];
            if(lastGoalEvent&&lastGoalEvent.min===st.min&&st.min>0){
                const pitch=document.getElementById('live-pitch-wrap');
                if(pitch&&!document.getElementById('goal-flash')){
                    const flash=document.createElement('div');
                    flash.className='goal-flash';flash.id='goal-flash';flash.textContent='⚽ GOAL!';
                    pitch.appendChild(flash);
                    setTimeout(()=>{if(flash)flash.remove();},1200);
                }
                resetPitchAnim();
            }
        }
        // Keep the mini-bar's score/minute in sync every tick, even while the user is on another tab.
        if(document.getElementById('live-mini-bar').classList.contains('show')) renderMiniBar();
    }

    function renderSquadPitchVertical(squad,tacticName,mode){
        const tacticKey = TACTICS_MAP[tacticName] || '4-3-3';
        const slots=FORMATIONS[tacticKey];
        // Unified coordinate maps for all formations (11 positions)
        // y: % from top (0=top/opponent goal, 100=bottom/own goal)
        // x: % from left
        const FORMATION_COORDS = {
            '4-3-3':     { y:[92,74,74,74,74,53,44,53,18,18,18], x:[50,83,63,37,17,78,50,22,80,50,20] },
            '4-3-3 Attack':{ y:[92,74,74,74,74,53,44,53,18,18,18], x:[50,83,63,37,17,65,50,35,82,50,18] },
            '4-4-2':     { y:[92,74,74,74,74,52,52,52,52,20,20],   x:[50,83,63,37,17,83,57,43,17,63,37] },
            '4-2-3-1':   { y:[92,74,74,74,74,60,60,40,48,40,18],   x:[50,83,63,37,17,65,35,80,50,20,50] },
            '4-2-3-1 Wide':{ y:[92,74,74,74,74,60,60,38,48,38,18], x:[50,83,63,37,17,65,35,85,50,15,50] },
            '3-5-2':     { y:[92,74,74,74,55,60,53,60,55,20,20],   x:[50,72,50,28,90,68,50,32,10,62,38] },
            '3-4-3':     { y:[92,74,74,74,53,53,53,53,18,18,18],   x:[50,72,50,28,83,61,39,17,80,50,20] },
            '5-3-2':     { y:[92,74,72,70,72,74,52,44,52,20,20],   x:[50,90,70,50,30,10,78,50,22,63,37] }
        };
        const coords = FORMATION_COORDS[tacticKey] || FORMATION_COORDS['4-3-3'];
        const yMap = coords.y;
        const xMap = coords.x;
        let placedIds=new Set();
        const isLiveSub=mode==='sub';
        let dots=slots.map((slotName,i)=>{
            const p=squad.find(x=>x.inXI&&x.slotPos===slotName&&!placedIds.has(x.id));
            if(p){
                placedIds.add(p.id);const isSel=swapIdA===p.id;const eff=getEffOvr(p,slotName);
                return`<div class="pdot ${isSel?'selected-swap':''}" data-bx="${xMap[i]}" data-by="${yMap[i]}" style="left:${xMap[i]}%;top:${yMap[i]}%;" onclick="handleSwapClick('${p.id}',${isLiveSub})">
                  <div class="pdot-circle home-dot ${isSel?'selected-swap':''}">${eff}</div>
                  <div class="pdot-name">${p.name.split(' ')[0]}${p.isStar?'⭐':''}${p.injury>0?' 🚑':''}</div>
                  <div class="pdot-ovr" style="${eff<p.ovr?'color:var(--red)':''}">${slotName}</div>
                </div>`;
            }else{
                return`<div class="pdot" style="left:${xMap[i]}%;top:${yMap[i]}%;opacity:0.5"><div class="pdot-circle" style="background:#555;border-color:#777">-</div><div class="pdot-ovr">${slotName}</div></div>`;
            }
        }).join('');
        const bench=squad.filter(p=>!p.inXI);
        return`
        <div class="pitch-wrap vertical">
          <div class="pitch-lines"><div class="pl pl-hw"></div><div class="pl pl-cc"></div><div class="pl pl-pb-top"></div><div class="pl pl-pb-bot"></div><div class="pl pl-gb-top"></div><div class="pl pl-gb-bot"></div></div>
          ${dots}
        </div>
        <div style="margin-top:8px"><div style="font-size:.65rem;color:var(--dim);margin-bottom:5px">🪑 Bench (${bench.length})</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">${bench.map(p=>`<div class="pill ${swapIdA===p.id?'selected-swap':''}" style="cursor:pointer;font-size:.65rem;border-color:var(--brd);padding:4px 8px;display:flex;align-items:center;gap:4px;" onclick="handleSwapClick('${p.id}',${isLiveSub})"><span style="color:var(--gold);font-weight:bold">${p.pos}</span><span class="${p.injury>0?'injured-text':''}">${p.name.split(' ')[0]}${p.isStar?'⭐':''}</span><span class="${ovrCls(p.ovr)}">${p.ovr}</span></div>`).join('')}</div></div>`;
    }

              <div style="font-size:.6rem;color:var(--dim);margin-top:2px">${effStr} | Contract: ${p.contract}y | Rtg: <b style="color:var(--gold)">${avgR}</b> | ${injStr}${ycStr}</div>
              ${traitsHtml}

          <div class="ovr ${ovrCls(p.ovr)}">${p.ovr}</div>
          <button class="info-btn" onclick="event.stopPropagation();openPlayerModal('${p.id}')">i</button>
        </div>`;
    }

    function submitLoanBid(pid) {
        let feeK = parseFloat(document.getElementById('user-loan-fee').value);
        if(isNaN(feeK) || feeK < 100) feeK = 100;
        let feeM = feeK / 1000;
        
        if(G.budget < feeM) { showToast("❌ Not enough budget!"); return; }
        
        G.loanBids.push({ id: pid, fee: feeM });
        closeModal();
        showToast("✅ Offer sent! Check your inbox next week.");
    }
    function finalizeUserLoan(msgId) {
        let msgIdx = G.inbox.findIndex(m => m.id === msgId);
        if(msgIdx < 0) return;
        let msg = G.inbox[msgIdx];
        
        let pIdx = G.transferMarket.findIndex(x => x.id === msg.playerId);
        if (pIdx < 0) { showToast("This player is no longer available."); G.inbox.splice(msgIdx, 1); saveState(); renderAll(); return; }
        
        const p = G.transferMarket[pIdx];
        if (G.budget < msg.fee) { showToast("❌ Not enough budget!"); return; }
        const capCheck=checkSquadMaximum(G.squads[G.playerTeamIdx]);
        if(!capCheck.ok){showToast('❌ '+capCheck.reason);return;}
        
        G.budget = parseFloat((G.budget - msg.fee).toFixed(2));
        // If this listing referenced a real Liga 1 club's actual squad player, remove them
        // from that club's real roster for the duration of the loan.
        if(p.teamIndex >= 0 && p.teamIndex < 16 && Array.isArray(G.squads[p.teamIndex])){
            const origSq = G.squads[p.teamIndex];
            const origIdx = origSq.indexOf(p);
            if(origIdx >= 0){
                origSq.splice(origIdx, 1);
                if(p.inXI) setDefaultXI(origSq, G.tactics[p.teamIndex] || '4-3-3');
            }
        }
        delete p._listed;
        p.originalTeamIdx = p.teamIndex;
        p.teamIndex = G.playerTeamIdx;
        p.isLoan = true; p.loanDuration = 1; p.inXI = false; p.slotPos = null;
        if(Array.isArray(G.squads[G.playerTeamIdx])) G.squads[G.playerTeamIdx].push(p);
        G.transferMarket.splice(pIdx, 1);
        
        G.inbox.splice(msgIdx, 1);
        saveState(); showToast(`✅ ${p.name} has joined on loan!`); renderAll();
    }
    function finalizeUserTransferBid(msgId) {
        let msgIdx = G.inbox.findIndex(m => m.id === msgId);
        if(msgIdx < 0) return;
        let msg = G.inbox[msgIdx];
        
        let pIdx = G.transferMarket.findIndex(x => x.id === msg.playerId);
        if (pIdx < 0) { showToast("This player is no longer available."); G.inbox.splice(msgIdx, 1); saveState(); renderAll(); return; }
        
        const p = G.transferMarket[pIdx];
        if (G.budget < msg.finalFee) { showToast("❌ Not enough budget!"); return; }
        const capCheck=checkSquadMaximum(G.squads[G.playerTeamIdx]);
        if(!capCheck.ok){showToast('❌ '+capCheck.reason);return;}
        
        const sellerName = p.teamIndex >= 16 ? (FOREIGN_CLUBS[p.teamIndex-16]||'European Club') : TEAMS[p.teamIndex];
        G.budget = parseFloat((G.budget - msg.finalFee).toFixed(2));
        if(p.teamIndex >= 0 && p.teamIndex < 16 && Array.isArray(G.squads[p.teamIndex])){
            const origSq = G.squads[p.teamIndex];
            const origIdx = origSq.indexOf(p);
            if(origIdx >= 0){
                origSq.splice(origIdx, 1);
                if(p.inXI) setDefaultXI(origSq, G.tactics[p.teamIndex] || '4-3-3');
            }
        }
        delete p._listed;
        p.teamIndex = G.playerTeamIdx;
        p.contract = rnd(2,4);
        p.isLoan = false; p.originalTeamIdx = -1; p.inXI = false; p.slotPos = null;
        if(Array.isArray(G.squads[G.playerTeamIdx])) G.squads[G.playerTeamIdx].push(p);
        G.transferMarket.splice(pIdx, 1);
        G.inbox.splice(msgIdx, 1);
        G.news.unshift({
            date: formatDate(G.currentDate),
            title: 'New Signing!',
            body: `${TEAMS[G.playerTeamIdx]} have agreed a deal with ${sellerName} to sign ${p.name} for ${fmt(msg.finalFee)}.`,
            tags: ['transfer']
        });
        saveState(); showToast(`✅ Deal done! ${p.name} signed for ${fmt(msg.finalFee)}.`); renderAll();
    }
